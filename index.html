<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GolfCat - 球隊管理</title>

    <!-- 外部資源 -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #04432C;
            --secondary: #10B981;
            --background: #F3F4F6;
            --surface: #FFFFFF;
            --on-background: #1F2937;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--background);
            color: var(--on-background);
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #10B981 !important; opacity: 1 !important; }
        /* 修改指示器：位於 Tab 頂部 */
        .tab-indicator { height: 4px; width: 32px; background-color: #10B981; border-radius: 2px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }

        /* 球隊選單樣式 */
        #team-menu { transition: all 0.2s ease-in-out; transform-origin: top; }
        .menu-item { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
        .menu-item:last-child { border-bottom: none; }

        /* 模擬 App 切換動畫 */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 輔助樣式：Header 頭像 */
        .avatar-small { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body class="antialiased">

<!-- 主要容器 -->
<div class="max-w-md mx-auto h-screen bg-[#F3F4F6] flex flex-col relative shadow-2xl border-x border-gray-200">

    <!-- Header (1:1 還原 App 頂部) -->
    <header id="app-header" class="bg-[#04432C] text-white p-4 text-center font-bold text-lg tracking-wider shadow-md shrink-0 flex justify-between items-center px-4 relative z-[60]">
        <!-- 左側：Logo -->
        <div id="header-left" class="flex items-center space-x-2 cursor-pointer">
            <div class="w-6 h-7 bg-red-600 rounded-sm flex items-center justify-center text-[10px] shadow-sm">🛡️</div>
        </div>

        <!-- 中間：標題與下拉 -->
        <div class="flex items-center cursor-pointer ml-4" onclick="toggleTeamMenu()">
            <span id="header-title" class="font-black">載入中...</span>
            <span class="ml-1 text-[8px] opacity-70">▼</span>
        </div>

        <!-- 右側：頭像與登出 -->
        <div id="header-right" class="flex items-center space-x-3">
            <img id="user-avatar" src="" class="avatar-small hidden">
            <span onclick="liff.logout(); location.reload();" class="text-[10px] text-rose-400 font-bold cursor-pointer">登出</span>
        </div>

        <!-- 球隊下拉選單 -->
        <div id="team-menu" class="hidden absolute top-14 left-1/2 -translate-x-1/2 w-64 bg-white text-gray-800 rounded-2xl shadow-2xl border border-gray-100 overflow-hidden py-2">
            <div id="team-list-container"></div>
            <div class="border-t border-gray-100 mt-2">
                <div class="menu-item text-[#04432C] text-sm font-bold flex items-center" onclick="switchTab(3)">
                    <span class="mr-2">➕</span> 加入/建立球隊
                </div>
            </div>
        </div>
    </header>

    <!-- 主內容區 -->
    <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar pb-20 bg-[#F3F4F6]">
        <div id="loading-screen" class="flex flex-col items-center justify-center h-full space-y-4">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#04432C]"></div>
            <p class="text-gray-500 text-sm">正在同步球員資料...</p>
        </div>
        <div id="page-container" class="hidden p-4 space-y-4">
        </div>
    </main>

    <!-- Bottom Navigation (對齊 App 顏色與指示器) -->
    <nav id="bottom-nav" class="absolute bottom-0 left-0 right-0 bg-[#04432C] h-16 flex items-center justify-around text-white shadow-2xl z-50">
        <div onclick="switchTab(0)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">賽事列表</span>
        </div>
        <div onclick="switchTab(1)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">排行榜</span>
        </div>
        <div onclick="switchTab(2)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">歷史成績</span>
        </div>
        <div onclick="switchTab(3)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">球隊管理</span>
        </div>
        <div onclick="switchTab(4)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">使用說明</span>
        </div>
    </nav>
</div>

<script>
    // --- 配置與狀態 ---
    const SUPABASE_URL = "https://qyhtllcncbnzykzbvlhu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5aHRsbGNuY2JuenlremJ2bGh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDUxMTYsImV4cCI6MjA5NTIyMTExNn0.T97-3knhVMg4-Ec6XSjHKI8xrDrdYMJryklcyQkXTJc";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let state = {
        userProfile: null, // LINE Profile
        dbUser: null,      // Supabase User
        currentTab: 0,
        myTeams: [],
        activeTeam: null,
        myRole: "member", // 目前在 activeTeam 的角色
        myMemberId: null,

        // 計分狀態
        scoring: {
            eventId: null,
            groupId: null,
            currentHole: 1,
            players: [],
            opponentPlayers: [],
            playerScores: {}, // { memberId: [hole1, hole2, ...] }
            eventPars: Array(18).fill(4),
            isMatchPlay: false,
            eventObj: null
        }
    };

    // --- 工具函式 ---
    function isAdmin() {
        const r = state.myRole;
        return r === "admin" || r === "president" || r === "vice_president" || r === "vice_admin";
    }

    // --- 初始化 ---
    async function initApp() {
        try {
            await liff.init({ liffId: "2010382913-rCaKoQcE" });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            state.userProfile = await liff.getProfile();
            await syncUserData();
        } catch (err) {
            console.error("Init failed", err);
            document.getElementById('loading-screen').innerHTML = `<p class='text-red-500'>連線失敗: ${err.message}</p>`;
        }
    }

    // --- 資料同步 (對齊 sharedLogic) ---
    async function syncUserData() {
        const { data: user, error } = await supabaseClient
            .from('users')
            .select('*')
            .eq('line_uid', state.userProfile.userId)
            .maybeSingle();

        if (error) throw error;

        if (!user) {
            renderProfileSetup();
            return;
        }

        state.dbUser = user;

        // 獲取所屬球隊與角色
        const { data: members } = await supabaseClient
            .from('team_members')
            .select('*, teams(*)')
            .eq('user_id', user.id);

        if (members && members.length > 0) {
            state.myTeams = members.map(m => m.teams) || [];
            state.activeTeam = state.myTeams[0];
            state.myMemberId = members[0].id;
            state.myRole = members[0].role;
        }

        hideLoading();
        switchTab(0);
    }

    // --- UI 渲染邏輯 ---
    function hideLoading() {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('page-container').classList.remove('hidden');

        // [第一階段新增] 更新 Header 頭像
        if (state.userProfile?.pictureUrl) {
            const avatar = document.getElementById('user-avatar');
            avatar.src = state.userProfile.pictureUrl;
            avatar.classList.remove('hidden');
        }
    }

    // [第一階段新增] ScoreBadge 渲染器
    function renderScoreBadge(score, par) {
        if (!score || score <= 0) return `<div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs bg-gray-50 text-gray-300">-</div>`;

        const diff = score - par;
        let styleClass = "bg-gray-50 text-gray-900";
        let symbolHtml = '';

        if (diff <= -1) {
            // Birdie or better (圓圈)
            styleClass = "bg-amber-100 text-amber-700 font-bold border border-amber-300 relative";
            symbolHtml = `<div class="absolute inset-0 border-2 border-amber-400 rounded-full m-1"></div>`;
        } else if (diff >= 1) {
            // Bogey or worse (方塊)
            styleClass = "bg-gray-200 text-gray-500 border border-gray-400 relative";
            symbolHtml = `<div class="absolute inset-0 border-2 border-gray-400 m-1"></div>`;
        }

        return `
            <div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs ${styleClass}">
                ${symbolHtml}
                <span class="relative z-10">${score}</span>
            </div>
        `;
    }

    // --- 導覽與球隊切換邏輯 ---
    function toggleTeamMenu() {
        const menu = document.getElementById('team-menu');
        menu.classList.toggle('hidden');
        if (!menu.classList.contains('hidden')) {
            renderTeamList();
        }
    }

    function renderTeamList() {
        const container = document.getElementById('team-list-container');
        container.innerHTML = state.myTeams.map(t => `
            <div class="menu-item flex justify-between items-center cursor-pointer hover:bg-gray-50 ${state.activeTeam?.id === t.id ? 'bg-emerald-50 text-[#133B2B]' : 'text-gray-600'}"
                 onclick="selectTeam('${t.id}')">
                <span class="text-sm font-medium">${t.name}</span>
                ${state.activeTeam?.id === t.id ? '<span>✅</span>' : ''}
            </div>
        `).join('');
    }

    function selectTeam(teamId) {
        const team = state.myTeams.find(t => t.id === teamId);
        if (team) {
            state.activeTeam = team;
            // 重新同步該球隊的角色 (這裡簡化處理，實際可能需要重新查詢)
            document.getElementById('header-title').innerText = team.name;
            toggleTeamMenu();
            switchTab(state.currentTab); // 刷新當前頁面
        }
    }

    function switchTab(index) {
        state.currentTab = index;
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach((item, i) => {
            const indicator = item.querySelector('.tab-indicator');
            if (i === index) {
                item.classList.add('active-tab');
                indicator.classList.remove('hidden');
            } else {
                item.classList.remove('active-tab');
                indicator.classList.add('hidden');
            }
        });

        // 根據 Tab 渲染不同頁面 (按新順序)
        const container = document.getElementById('page-container');
        container.innerHTML = '';
        container.className = "p-4 space-y-4 fade-in";

        if (state.activeTeam) {
            document.getElementById('header-title').innerText = state.activeTeam.name;
        }

        switch(index) {
            case 0: renderEvents(); break;
            case 1: renderLeaderboard(); break;
            case 2: renderHistory(); break;
            case 3: renderTeams(); break; // 球隊管理
            case 4: renderInstructions(); break;
        }
    }

    async function renderHistory() {
        document.getElementById('header-title').innerText = "歷史成績";
        // 複用原本 renderMe 裡的統計與列表邏輯
        showLoading("正在統計戰績...");
        try {
            const { data: scores } = await supabaseClient
                .from('scores')
                .select('*, events(*)')
                .eq('team_member_id', state.myMemberId)
                .order('created_at', { ascending: false });

            hideLoading();
            const container = document.getElementById('page-container');
            let historyHtml = scores?.map(s => `
                <div onclick="viewScorecard('${s.id}')" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center active:bg-gray-50 transition-all">
                    <div>
                        <p class="font-bold text-gray-900 text-sm">${s.events.title}</p>
                        <p class="text-[10px] text-gray-400 mt-1">📅 ${s.events.date}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-black text-[#133B2B]">${s.gross_score}</p>
                        <p class="text-[9px] text-gray-400 uppercase">Gross</p>
                    </div>
                </div>
            `).join('') || "<p class='text-center py-10 text-gray-400'>尚無參賽紀錄</p>";

            container.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-[#133B2B] text-white p-5 rounded-2xl shadow-lg">
                        <h4 class="text-[10px] opacity-70 uppercase tracking-widest mb-1">我的表現彙總</h4>
                        <p class="text-lg font-bold">歷史戰績牆 (History)</p>
                    </div>
                    ${historyHtml}
                    <div id="scorecard-modal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm"></div>
                </div>
            `;
        } catch (e) {
            hideLoading();
            alert("載入歷史失敗");
        }
    }

    function renderInstructions() {
        document.getElementById('header-title').innerText = "使用說明";
        const container = document.getElementById('page-container');
        container.innerHTML = `
            <div class="bg-white p-6 rounded-3xl shadow-sm space-y-6">
                <div class="flex items-center space-x-4 border-b pb-4">
                    <div class="text-3xl">⛳</div>
                    <div>
                        <h3 class="font-bold text-lg text-gray-800">歡迎來到 GolfCat</h3>
                        <p class="text-xs text-gray-500">LINE 內置球隊管理系統</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="flex items-start space-x-3">
                        <div class="bg-emerald-100 text-emerald-700 rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs shrink-0">1</div>
                        <p class="text-sm text-gray-600">在<b>「賽事列表」</b>查看最新球賽並完成報名。</p>
                    </div>
                    <div class="flex items-start space-x-3">
                        <div class="bg-emerald-100 text-emerald-700 rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs shrink-0">2</div>
                        <p class="text-sm text-gray-600">比賽當天，點擊<b>「成績登錄」</b>即可代表本組成員計分。</p>
                    </div>
                    <div class="flex items-start space-x-3">
                        <div class="bg-emerald-100 text-emerald-700 rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs shrink-0">3</div>
                        <p class="text-sm text-gray-600">透過<b>「排行榜」</b>即時追蹤當日戰況，所有數據與 Android 版同步。</p>
                    </div>
                </div>
                <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                    <p class="text-xs text-amber-800 leading-relaxed">
                        💡 <b>溫馨提醒：</b>若您是球隊管理員，請進入「球隊管理」分頁進行賽事建立與成員審核。
                    </p>
                </div>
            </div>
        `;
    }

    // --- 頁面模組 ---
    async function renderEvents() {
        document.getElementById('header-title').innerText = "賽事行程";
        const container = document.getElementById('page-container');
        container.innerHTML = `
            <div id="event-loading" class="flex flex-col items-center py-20 text-gray-400">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-gray-300 mb-2"></div>
                <p class="text-xs">同步行程中...</p>
            </div>
            <div id="event-list" class="space-y-4"></div>
        `;

        await fetchTournaments();
    }

    async function fetchTournaments() {
        try {
            // 1. 撈取所有球賽
            const { data: events, error } = await supabaseClient
                .from('events')
                .select('*')
                .order('date', { ascending: false });

            if (error) throw error;

            // 2. 撈取我的報名紀錄 (使用 dbUser.id 對齊)
            // 這裡需要先獲取 team_member_id，為了簡化邏輯我們先假定 user_id 直接對應
            // 正確做法是去查 team_members 表
            const { data: myMember } = await supabaseClient
                .from('team_members')
                .select('id')
                .eq('user_id', state.dbUser.id)
                .maybeSingle();

            const memberId = myMember ? myMember.id : null;

            const { data: myRegs } = await supabaseClient
                .from('event_registrations')
                .select('event_id')
                .eq('team_member_id', memberId);

            const registeredIds = new Set(myRegs?.map(r => r.event_id) || []);

            const listContainer = document.getElementById('event-list');
            document.getElementById('event-loading').classList.add('hidden');
            listContainer.innerHTML = '';

            if (!events || events.length === 0) {
                listContainer.innerHTML = `<div class='text-center py-20 text-gray-400'>目前無任何排定賽事</div>`;
                return;
            }

            events.forEach(event => {
                const isRegistered = registeredIds.has(event.id);
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex flex-col space-y-4";

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-gray-900 text-lg">${event.title}</h3>
                            <div class="flex items-center text-gray-500 text-xs mt-1 space-x-3">
                                <span class="flex items-center">📅 ${event.date}</span>
                                <span class="flex items-center">📍 ${event.location}</span>
                            </div>
                        </div>
                        <span class="px-2 py-1 rounded-md text-[10px] font-bold ${isRegistered ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-400'}">
                            ${isRegistered ? '已報名' : '未報名'}
                        </span>
                    </div>

                    <div class="grid grid-cols-2 gap-2 text-[11px] text-gray-500 bg-gray-50 p-3 rounded-xl">
                        <div>開球：<span class="text-gray-900 font-medium">${event.start_time || '06:00'}</span></div>
                        <div>規則：<span class="text-gray-900 font-medium">${event.handicap_rule}</span></div>
                    </div>

                    ${isRegistered
                        ? `
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="cancelReg('${event.id}', '${memberId}')" class="w-full py-3 bg-white border border-red-200 text-red-500 rounded-xl font-bold text-sm transition-all active:scale-95">取消報名</button>
                            <button onclick="startScoring('${event.id}')" class="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold text-sm shadow-md transition-all active:scale-95">成績登錄</button>
                        </div>
                        `
                        : `<button onclick="doReg('${event.id}', '${memberId}')" class="w-full py-3 bg-[#133B2B] text-white rounded-xl font-bold text-sm shadow-md transition-all active:scale-95">我要報名</button>`
                    }
                `;
                listContainer.appendChild(card);
            });

        } catch (err) {
            console.error("Fetch events failed", err);
            document.getElementById('event-loading').innerHTML = `<p class='text-red-500'>資料載入失敗</p>`;
        }
    }

    // --- 互動動作 ---
    async function doReg(eventId, memberId) {
        if (!memberId) { alert("無法取得球員資料，請重新登入"); return; }
        try {
            const { error } = await supabaseClient
                .from('event_registrations')
                .insert([{ event_id: eventId, team_member_id: memberId, status: '已報名' }]);

            if (error) throw error;
            renderEvents(); // 重新渲染
        } catch (err) {
            alert("報名失敗：" + err.message);
        }
    }

    async function cancelReg(eventId, memberId) {
        if (!confirm("確定要取消報名嗎？")) return;
        try {
            const { error } = await supabaseClient
                .from('event_registrations')
                .delete()
                .eq('event_id', eventId)
                .eq('team_member_id', memberId);

            if (error) throw error;
            renderEvents(); // 重新渲染
        } catch (err) {
            alert("取消失敗：" + err.message);
        }
    }

    // --- 計分模組 ---
    async function startScoring(eventId) {
        showLoading("正在載入計分板...");
        try {
            const event = await supabaseClient.from('events').select('*').eq('id', eventId).maybeSingle();
            state.scoring.eventObj = event.data;
            state.scoring.eventId = eventId;
            state.scoring.isMatchPlay = event.data.handicap_rule === "Match_Play";
            state.scoring.eventPars = event.data.pars || Array(18).fill(4);

            // 獲取目前用戶所在的組別
            const { data: myMember } = await supabaseClient.from('team_members').select('id').eq('user_id', state.dbUser.id).maybeSingle();
            const { data: groupMember } = await supabaseClient.from('event_group_members').select('group_id').eq('team_member_id', myMember.id).maybeSingle();

            if (!groupMember) {
                alert("您尚未被分配到此賽事的組別中，無法計分。");
                hideLoading();
                return;
            }
            state.scoring.groupId = groupMember.group_id;

            // 獲取同組組員
            const { data: members } = await supabaseClient.from('event_group_members').select('*, team_members(*, users(*))').eq('group_id', state.scoring.groupId);
            state.scoring.players = members.map(m => m.team_members);

            // [任務4新增] 對抗賽對手偵測邏輯
            state.scoring.opponentPlayers = [];
            if (state.scoring.isMatchPlay) {
                const { data: pairings } = await supabaseClient.from('match_pairings').select('*').eq('event_id', eventId);
                const pairing = pairings?.find(p => p.group_a_id === state.scoring.groupId || p.group_b_id === state.scoring.groupId);
                if (pairing) {
                    const opponentGroupId = pairing.group_a_id === state.scoring.groupId ? pairing.group_b_id : pairing.group_a_id;
                    const { data: oppMembers } = await supabaseClient.from('event_group_members').select('*, team_members(*, users(*))').eq('group_id', opponentGroupId);
                    state.scoring.opponentPlayers = oppMembers.map(m => m.team_members);
                }
            }

            // 初始化成績 Map (包含隊友與對手)
            state.scoring.playerScores = {};
            [...state.scoring.players, ...state.scoring.opponentPlayers].forEach(p => {
                state.scoring.playerScores[p.id] = Array(18).fill(0);
            });

            // 載入現有成績
            const { data: scores } = await supabaseClient.from('scores').select('*').eq('event_id', eventId);
            scores.forEach(s => {
                if (state.scoring.playerScores[s.team_member_id]) {
                    state.scoring.playerScores[s.team_member_id] = [...s.hole_scores];
                }
            });

            renderScoringUI();
            hideLoading();
        } catch (err) {
            console.error("Start scoring failed", err);
            alert("計分板載入失敗");
            hideLoading();
        }
    }

    function renderScoringUI() {
        document.getElementById('header-title').innerText = `第 ${state.scoring.currentHole} 洞 (Par ${state.scoring.eventPars[state.scoring.currentHole-1]})`;

        // 隱藏 Bottom Nav
        document.getElementById('bottom-nav').classList.add('hidden');

        // 修改 Header Action 為 Save 按鈕
        document.getElementById('header-action').innerHTML = `<button onclick="saveScores()" class="text-sm bg-white text-[#133B2B] px-3 py-1 rounded-full font-bold">儲存</button>`;

        const container = document.getElementById('page-container');

        // [任務4新增] 對抗賽積分計算區
        let matchHeaderHtml = '';
        if (state.scoring.isMatchPlay && state.scoring.opponentPlayers.length > 0) {
            const par = state.scoring.eventPars[state.scoring.currentHole - 1];
            const myBest = Math.min(...state.scoring.players.map(p => state.scoring.playerScores[p.id][state.scoring.currentHole - 1]).filter(s => s > 0));
            const oppBest = Math.min(...state.scoring.opponentPlayers.map(p => state.scoring.playerScores[p.id][state.scoring.currentHole - 1]).filter(s => s > 0));

            // 計算成就加分
            let myBonus = 0;
            state.scoring.players.forEach(p => {
                const s = state.scoring.playerScores[p.id][state.scoring.currentHole - 1];
                if (s > 0) {
                    if (s === 1 || s <= par - 2) myBonus += 1.0;
                    else if (s === par - 1) myBonus += 0.5;
                }
            });

            matchHeaderHtml = `
                <div class="bg-emerald-800 text-white p-4 rounded-2xl shadow-inner mb-4">
                    <div class="flex justify-between items-center text-xs opacity-80 uppercase tracking-widest mb-2">
                        <span>對抗賽即時戰況</span>
                        <span>Par ${par}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="border-r border-emerald-700 pr-2">
                            <p class="text-[10px] opacity-70">本組最佳</p>
                            <p class="text-2xl font-black">${myBest === Infinity ? '-' : myBest}</p>
                            ${myBonus > 0 ? `<p class="text-[9px] text-amber-400 font-bold">⛳ 成就點數: +${myBonus}</p>` : ''}
                        </div>
                        <div class="pl-2">
                            <p class="text-[10px] opacity-70">對手最佳</p>
                            <p class="text-2xl font-black text-emerald-300">${oppBest === Infinity ? '-' : oppBest}</p>
                            <p class="text-[9px] opacity-50">點數由後台最終結算</p>
                        </div>
                    </div>
                </div>
            `;
        }

        container.innerHTML = `
            ${matchHeaderHtml}
            <div class="flex justify-between items-center mb-4">
                <button onclick="changeHole(-1)" class="p-2 bg-gray-200 rounded-full w-10 h-10 flex items-center justify-center font-bold">◀</button>
                <button onclick="renderLeaderboard()" class="text-amber-600 font-bold border border-amber-600 px-4 py-2 rounded-xl text-sm">賽事排行</button>
                <button onclick="changeHole(1)" class="p-2 bg-gray-200 rounded-full w-10 h-10 flex items-center justify-center font-bold">▶</button>
            </div>

            <div class="text-[10px] text-gray-400 font-bold uppercase mb-2">本組球員</div>
            <div id="player-scoring-list" class="space-y-4"></div>

            ${state.scoring.opponentPlayers.length > 0 ? `
                <div class="text-[10px] text-gray-400 font-bold uppercase mt-6 mb-2">對手資訊 (唯讀)</div>
                <div id="opponent-scoring-list" class="space-y-2 opacity-80"></div>
            ` : ''}

            <button onclick="exitScoring()" class="w-full py-3 text-gray-500 text-sm font-medium mt-8">退出計分板</button>
        `;

        const list = document.getElementById('player-scoring-list');
        state.scoring.players.forEach(player => {
            const currentScore = state.scoring.playerScores[player.id][state.scoring.currentHole - 1];
            const card = document.createElement('div');
            card.className = "bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center justify-between";
            card.innerHTML = `
                <div>
                    <h4 class="font-bold text-lg">${player.users.real_name}</h4>
                    <p class="text-xs text-gray-400">總桿: ${state.scoring.playerScores[player.id].reduce((a,b)=>a+b, 0)}</p>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="updateHoleScore('${player.id}', -1)" class="w-10 h-10 rounded-xl bg-gray-50 border border-gray-200 flex items-center justify-center text-xl font-bold">-</button>
                    <div class="w-12 h-10 bg-white border border-gray-900 rounded-lg flex items-center justify-center font-bold text-lg">
                        ${currentScore === 0 ? '-' : currentScore}
                    </div>
                    <button onclick="updateHoleScore('${player.id}', 1)" class="w-10 h-10 rounded-xl bg-gray-50 border border-gray-200 flex items-center justify-center text-xl font-bold">+</button>
                </div>
            `;
            list.appendChild(card);
        });

        // [任務4新增] 渲染對手名單
        const oppList = document.getElementById('opponent-scoring-list');
        if (oppList) {
            state.scoring.opponentPlayers.forEach(player => {
                const currentScore = state.scoring.playerScores[player.id][state.scoring.currentHole - 1];
                const card = document.createElement('div');
                card.className = "bg-gray-50 rounded-xl p-3 flex justify-between items-center text-sm";
                card.innerHTML = `
                    <span class="text-gray-600 font-medium">${player.users.real_name}</span>
                    <span class="font-bold ${currentScore > 0 ? 'text-emerald-700' : 'text-gray-300'}">
                        ${currentScore > 0 ? currentScore : '尚未輸入'}
                    </span>
                `;
                oppList.appendChild(card);
            });
        }
    }

    function updateHoleScore(memberId, delta) {
        let val = state.scoring.playerScores[memberId][state.scoring.currentHole - 1];
        if (val === 0) val = state.scoring.eventPars[state.scoring.currentHole-1]; // 預設 Par
        val += delta;
        if (val < 1) val = 1;
        state.scoring.playerScores[memberId][state.scoring.currentHole - 1] = val;
        renderScoringUI();
    }

    function changeHole(delta) {
        state.scoring.currentHole += delta;
        if (state.scoring.currentHole > 18) state.scoring.currentHole = 1;
        if (state.scoring.currentHole < 1) state.scoring.currentHole = 18;
        renderScoringUI();
    }

    async function saveScores() {
        try {
            const updates = state.scoring.players.map(p => ({
                event_id: state.scoring.eventId,
                team_member_id: p.id,
                hole_scores: state.scoring.playerScores[p.id],
                gross_score: state.scoring.playerScores[p.id].reduce((a,b)=>a+b, 0)
            }));

            // 使用 upsert
            const { error } = await supabaseClient
                .from('scores')
                .upsert(updates, { onConflict: 'event_id,team_member_id' });

            if (error) throw error;
            alert("成績已儲存");
        } catch (err) {
            alert("儲存失敗: " + err.message);
        }
    }

    async function joinTeam() {
        const code = document.getElementById('join-code-input').value;
        if (code.length !== 6) { alert("請輸入正確的 6 位數代碼"); return; }

        showLoading("正在驗證代碼...");
        try {
            // 1. 查找球隊
            const { data: team, error } = await supabaseClient.from('teams').select('*').eq('join_code', code).maybeSingle();
            if (error || !team) throw new Error("無效的球隊代碼");

            // 2. 寫入成員表
            const { error: joinError } = await supabaseClient.from('team_members').insert([{
                team_id: team.id,
                user_id: state.dbUser.id,
                role: 'member'
            }]);

            if (joinError) throw joinError;

            alert("成功加入球隊：" + team.name);
            location.reload();
        } catch (err) {
            alert("加入失敗：" + err.message);
            hideLoading();
            renderTeams();
        }
    }

    async function renderGrouping() {
        const eventId = state.scoring.eventId || (state.activeTeam ? await getLatestEventId() : null);
        if (!eventId) {
            document.getElementById('page-container').innerHTML = `<div class='text-center py-20 text-gray-400'>目前無進行中的賽事分組</div>`;
            return;
        }

        document.getElementById('header-title').innerText = "賽事分組";
        showLoading("正在同步分組名單...");

        try {
            // 1. 獲取賽事資訊
            const { data: event } = await supabaseClient.from('events').select('*').eq('id', eventId).maybeSingle();

            // 2. 獲取所有組別
            const { data: groups, error: groupErr } = await supabaseClient
                .from('event_groups')
                .select('*')
                .eq('event_id', eventId)
                .order('group_number', { ascending: true });

            if (groupErr) throw groupErr;

            // 3. 獲取所有組員資訊
            const { data: members, error: memErr } = await supabaseClient
                .from('event_group_members')
                .select('*, team_members(*, users(*))')
                .in('group_id', groups.map(g => g.id));

            if (memErr) throw memErr;

            hideLoading();
            const container = document.getElementById('page-container');
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-white p-5 rounded-2xl border border-emerald-100 shadow-sm">
                        <h3 class="font-bold text-[#133B2B]">${event.title}</h3>
                        <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-wider">分組名單匯總</p>
                    </div>
                    <div id="group-list" class="space-y-4"></div>
                </div>
            `;

            const list = document.getElementById('group-list');
            if (!groups || groups.length === 0) {
                list.innerHTML = `<div class='text-center py-10 text-gray-300'>尚未建立分組</div>`;
                return;

            groups.forEach(group => {

                card.className = "bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100";

                let membersHtml = groupMembers.map(m => `
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center text-[#133B2B] font-bold text-xs">
                                ${m.team_members.users.real_name.charAt(0)}
                            </div>
                            <span class="font-bold text-gray-800">${m.team_members.users.real_name}</span>
                        </div>
                        <span class="text-[10px] text-gray-400 bg-white px-2 py-1 rounded-md border border-gray-100">
                            HC: ${m.team_members.current_team_handicap}
                        </span>
                    </div>

                }

                card.innerHTML = `
                    <div class="bg-emerald-50 px-5 py-3 border-b border-emerald-100 flex justify-between items-center">
                        <span class="font-black text-[#133B2B]">第 ${group.group_number} 組</span>

    async function getLatestEventId() {
        const { data } = await supabaseClient.from('events').select('id').order('date', { ascending: false }).limit(1).maybeSingle();
        return data?.id;
    }

    async function renderMe() {
        document.getElementById('header-title').innerText = "個人中心";
        showLoading("正在統計戰績...");

        try {
            // 1. 獲取所有個人成績
            const { data: scores, error } = await supabaseClient
                .from('scores')
                .select('*, events(*)')
                .eq('team_member_id', state.myMemberId)
                .order('created_at', { ascending: false });

            if (error) throw error;

            // 2. 計算統計數據
            let stats = { birdie: 0, eagle: 0, par: 0, totalGames: scores?.length || 0 };
            scores?.forEach(s => {
                const pars = s.events.pars || Array(18).fill(4);
                s.hole_scores.forEach((h, i) => {
                    if (h <= 0) return;
                    const diff = h - pars[i];
                    if (diff <= -2) stats.eagle++;
                    else if (diff === -1) stats.birdie++;
                    else if (diff === 0) stats.par++;
                });
            });

            hideLoading();
            const container = document.getElementById('page-container');

            // 渲染統計頭部
            let historyHtml = scores?.map(s => `
                <div onclick="viewScorecard('${s.id}')" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center active:bg-gray-50 transition-all">
                    <div>
                        <p class="font-bold text-gray-900">${s.events.title}</p>
                        <p class="text-[10px] text-gray-400 mt-1">📅 ${s.events.date}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-black text-[#133B2B]">${s.gross_score}</p>
                        <p class="text-[9px] text-gray-400 uppercase">Gross</p>
                    </div>
                </div>
            `).join('') || "<p class='text-center py-10 text-gray-400'>尚無參賽紀錄</p>";

            container.innerHTML = `
                <div class='bg-white rounded-3xl p-6 shadow-sm border border-gray-100 flex flex-col items-center text-center'>
                    <div class="relative">
                        <img src="${state.userProfile.pictureUrl}" class="w-20 h-20 rounded-full border-4 border-white shadow-xl mb-3">
                        <div class="absolute bottom-2 right-0 bg-emerald-500 w-5 h-5 rounded-full border-2 border-white"></div>
                    </div>
                    <h3 class="font-bold text-xl text-gray-900">${state.dbUser.real_name}</h3>
                    <p class="text-xs text-gray-400">目前差點: <span class="font-bold text-emerald-700">${state.dbUser.initial_handicap}</span></p>

                    <div class="grid grid-cols-3 gap-2 w-full mt-6">
                        <div class="bg-amber-50 p-3 rounded-2xl border border-amber-100">
                            <p class="text-[9px] text-amber-600 font-bold uppercase">Birdie</p>
                            <p class="text-lg font-black text-amber-700">${stats.birdie}</p>
                        </div>
                        <div class="bg-emerald-50 p-3 rounded-2xl border border-emerald-100">
                            <p class="text-[9px] text-emerald-600 font-bold uppercase">Par</p>
                            <p class="text-lg font-black text-emerald-700">${stats.par}</p>
                        </div>
                        <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                            <p class="text-[9px] text-blue-600 font-bold uppercase">Games</p>
                            <p class="text-lg font-black text-blue-700">${stats.totalGames}</p>
                        </div>
                    </div>
                    <button onclick="renderProfileSetup(true)" class="mt-4 text-[11px] text-gray-400 underline">修改個人資料</button>
                </div>

                <div class="mt-6">
                    <h4 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3 ml-1">歷史戰績 (Past Games)</h4>
                    <div class="space-y-3">
                        ${historyHtml}
                    </div>
                </div>

                <button onclick="liff.logout(); location.reload();" class="w-full py-4 text-red-400 text-sm font-medium mt-8">登出系統</button>
                <div id="scorecard-modal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm"></div>
            `;
        } catch (err) {
            alert("獲取戰績失敗");
            hideLoading();
        }
    }

    async function viewScorecard(scoreId) {
        const modal = document.getElementById('scorecard-modal');
        modal.classList.remove('hidden');
        modal.innerHTML = `<div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white"></div>`;

        try {
            const { data: s } = await supabaseClient.from('scores').select('*, events(*)').eq('id', scoreId).single();
            const pars = s.events.pars || Array(18).fill(4);

            let holesHtml = '';
            for (let i = 0; i < 18; i++) {
                const score = s.hole_scores[i];
                const par = pars[i];
                const diff = score - par;
                let colorClass = "bg-gray-50 text-gray-900";
                if (score > 0) {
                    if (diff <= -1) colorClass = "bg-amber-100 text-amber-700 font-bold border border-amber-300";
                    else if (diff >= 1) colorClass = "bg-gray-200 text-gray-500";
                }

                holesHtml += `
                    <div class="flex flex-col items-center">
                        <span class="text-[8px] text-gray-400 mb-1">${i+1}</span>
                        ${renderScoreBadge(score, par)}
                        <span class="text-[8px] text-gray-300 mt-1">${par}</span>
                    </div>
                `;
            }

            modal.innerHTML = `
                <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl fade-in">
                    <div class="bg-[#133B2B] p-6 text-white text-center relative">
                        <button onclick="document.getElementById('scorecard-modal').classList.add('hidden')" class="absolute top-4 right-4 text-white/50 text-xl">✕</button>
                        <h3 class="font-bold text-lg">${s.events.title}</h3>
                        <p class="text-xs opacity-60 mt-1">Scorecard Summary</p>
                        <div class="mt-4 flex justify-around border-t border-white/10 pt-4">
                            <div><p class="text-[10px] opacity-50">GROSS</p><p class="text-2xl font-black">${s.gross_score}</p></div>
                            <div><p class="text-[10px] opacity-50">DATE</p><p class="text-sm font-bold mt-1">${s.events.date}</p></div>
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="grid grid-cols-6 gap-3 mb-6">
                            ${holesHtml}
                        </div>
                        <button onclick="document.getElementById('scorecard-modal').classList.add('hidden')" class="w-full py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold">關閉視窗</button>
                    </div>
                </div>
            `;
        } catch (err) {
            modal.classList.add('hidden');
            alert("載入成績單失敗");
        }
    }

    function renderProfileSetup(isEdit = false) {
        hideLoading();
        document.getElementById('header-title').innerText = isEdit ? "修改資料" : "初次使用設定";

        const container = document.getElementById('page-container');
        container.innerHTML = `
            <div class="bg-white rounded-3xl p-6 shadow-sm space-y-6">
                <p class="text-gray-500 text-sm">請提供您的真實姓名與球隊差點，以便系統進行自動化差點計算與分組。</p>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">真實姓名</label>
                    <input type="text" id="setup-name" value="${isEdit ? state.dbUser.real_name : ''}" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]" placeholder="例如：王小明">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">初始差點 (0-36)</label>
                    <input type="number" id="setup-handicap" value="${isEdit ? state.dbUser.initial_handicap : '36.0'}" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]">
                </div>

                <button onclick="saveProfile(${isEdit})" class="w-full py-4 bg-[#133B2B] text-white rounded-2xl font-bold shadow-xl transition-all active:scale-95">
                    ${isEdit ? '儲存變更' : '開始使用'}
                </button>
            </div>
        `;
    }

    async function saveProfile(isEdit) {
        const name = document.getElementById('setup-name').value;
        const hc = parseFloat(document.getElementById('setup-handicap').value);

        if (!name) { alert("請填寫姓名"); return; }

        showLoading("正在更新球員檔案...");

        try {
            if (isEdit) {
                const { error } = await supabaseClient.from('users').update({ real_name: name, initial_handicap: hc }).eq('id', state.dbUser.id);
                if (error) throw error;
            } else {
                const { data, error } = await supabaseClient.from('users').insert([{
                    line_uid: state.userProfile.userId,
                    line_display_name: state.userProfile.displayName,
                    real_name: name,
                    initial_handicap: hc
                }]).select().single();
                if (error) throw error;
                state.dbUser = data;
            }

            alert("更新成功！");
            location.reload(); // 重新整理以獲取最新狀態
        } catch (err) {
            alert("儲存失敗：" + err.message);
            hideLoading();
        }
    }

    // --- 賽事管理模組 ---
    function renderCreateEvent(teamId) {
        document.getElementById('header-title').innerText = "建立新賽事";
        const container = document.getElementById('page-container');

        let parInputsHtml = '';
        for (let i = 1; i <= 18; i++) {
            parInputsHtml += `
                <div class="flex flex-col items-center">
                    <span class="text-[9px] text-gray-400 mb-1">${i}</span>
                    <input type="number" id="par-${i}" value="4" class="w-10 h-10 border border-gray-200 rounded-lg text-center text-sm focus:ring-1 focus:ring-[#133B2B]">
                </div>
            `;
        }

        container.innerHTML = `
            <div class="bg-white p-6 rounded-3xl shadow-sm space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">賽事名稱</label>
                    <input type="text" id="event-title" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]" placeholder="例如：六月例行賽">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">比賽地點 (球場)</label>
                    <input type="text" id="event-location" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]" placeholder="例如：大溪高爾夫球場">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">日期</label>
                        <input type="date" id="event-date" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">開球時間</label>
                        <input type="time" id="event-time" value="06:30" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">賽制規則</label>
                    <select id="event-rule" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]">
                        <option value="Stroke_Play">一般賽 (Stroke Play)</option>
                        <option value="Match_Play">對抗賽 (Match Play)</option>
                        <option value="New_Peoria">新貝利亞 (New Peoria)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">18 洞標準桿 (Pars)</label>
                    <div class="grid grid-cols-6 gap-2 mt-2 bg-gray-50 p-4 rounded-2xl">
                        ${parInputsHtml}
                    </div>
                </div>

                <div class="pt-4 flex space-x-3">
                    <button onclick="switchTab(1)" class="flex-1 py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold">取消</button>
                    <button onclick="saveEvent('${teamId}')" class="flex-2 py-4 bg-[#133B2B] text-white rounded-2xl font-bold shadow-lg transition-all active:scale-95">儲存並發布</button>
                </div>
            </div>
        `;
    }

    async function saveEvent(teamId) {
        const title = document.getElementById('event-title').value;
        const location = document.getElementById('event-location').value;
        const date = document.getElementById('event-date').value;
        const startTime = document.getElementById('event-time').value;
        const rule = document.getElementById('event-rule').value;

        if (!title || !location || !date) { alert("請填寫完整賽事資訊"); return; }

        const pars = [];
        for (let i = 1; i <= 18; i++) {
            pars.push(parseInt(document.getElementById(`par-${i}`).value) || 4);
        }

        showLoading("正在建立賽事...");
        try {
            const { data, error } = await supabaseClient
                .from('events')
                .insert([{
                    team_id: teamId,
                    title: title,
                    location: location,
                    date: date,
                    start_time: startTime,
                    handicap_rule: rule,
                    pars: pars,
                    registration_status: 'open'
                }]).select().single();

            if (error) throw error;

            alert("賽事建立成功！");
            switchTab(0); // 跳轉回賽事清單
        } catch (err) {
            alert("建立失敗：" + err.message);
            hideLoading();
        }
    }

    // 啟動
    window.addEventListener('load', initApp);
</script>
</body>
</html>
