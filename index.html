<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GolfCat - 球隊管理</title>

    <!-- 外部資源 -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #04432C;
            --secondary: #10B981;
            --background: #F3F4F6;
            --surface: #FFFFFF;
            --on-background: #1F2937;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--background);
            color: var(--on-background);
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #10B981 !important; opacity: 1 !important; }
        /* 修改指示器：位於 Tab 頂部 */
        .tab-indicator { height: 4px; width: 32px; background-color: #10B981; border-radius: 2px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }

        /* 球隊選單樣式 */
        #team-menu { transition: all 0.2s ease-in-out; transform-origin: top; }
        .menu-item { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
        .menu-item:last-child { border-bottom: none; }

        /* 浮動對話框樣式 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 補回缺失的輔助樣式 */
        .avatar-small { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 防止標題被擠壓 */
        #header-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
    </style>
</head>
<body class="antialiased">

<!-- 對話框容器 (全域通用) -->
<div id="global-modal" class="hidden modal-overlay">
    <div class="modal-content" id="modal-body"></div>
</div>

<!-- 主要容器 -->
<div class="max-w-md mx-auto h-screen bg-[#F3F4F6] flex flex-col relative shadow-2xl border-x border-gray-200">

    <!-- Header (1:1 還原 App 頂部) -->
    <header id="app-header" class="bg-[#04432C] text-white p-4 text-center font-bold text-lg tracking-wider shadow-md shrink-0 flex justify-between items-center px-4 relative z-[60]">
        <!-- 左側：Logo -->
        <div id="header-left" class="flex items-center space-x-2 cursor-pointer">
            <div class="w-6 h-7 bg-red-600 rounded-sm flex items-center justify-center text-[10px] shadow-sm">🛡️</div>
        </div>

        <!-- 中間：標題與下拉 -->
        <div class="flex items-center cursor-pointer ml-4" onclick="toggleTeamMenu()">
            <span id="header-title" class="font-black">載入中...</span>
            <span class="ml-1 text-[8px] opacity-70">▼</span>
        </div>

        <!-- 右側：頭像與登出 -->
        <div id="header-right" class="flex items-center space-x-3">
            <img id="user-avatar" src="" class="avatar-small hidden">
            <span onclick="liff.logout(); location.reload();" class="text-[10px] text-rose-400 font-bold cursor-pointer">登出</span>
        </div>

        <!-- 球隊下拉選單 -->
        <div id="team-menu" class="hidden absolute top-14 left-1/2 -translate-x-1/2 w-64 bg-white text-gray-800 rounded-2xl shadow-2xl border border-gray-100 overflow-hidden py-2">
            <div id="team-list-container"></div>
            <div class="border-t border-gray-100 mt-2">
                <div class="menu-item text-[#04432C] text-sm font-bold flex items-center" onclick="switchTab(3)">
                    <span class="mr-2">➕</span> 加入/建立球隊
                </div>
            </div>
        </div>
    </header>

    <!-- 主內容區 -->
    <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar pb-20 bg-[#F3F4F6]">
        <div id="loading-screen" class="flex flex-col items-center justify-center h-full space-y-4">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#04432C]"></div>
            <p class="text-gray-500 text-sm">正在同步球員資料...</p>
        </div>
        <div id="page-container" class="hidden p-4 space-y-4">
        </div>
    </main>

    <!-- Bottom Navigation (對齊 App 顏色與指示器) -->
    <nav id="bottom-nav" class="absolute bottom-0 left-0 right-0 bg-[#04432C] h-16 flex items-center justify-around text-white shadow-2xl z-50">
        <div onclick="switchTab(0)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">賽事列表</span>
        </div>
        <div onclick="switchTab(1)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">排行榜</span>
        </div>
        <div onclick="switchTab(2)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">歷史成績</span>
        </div>
        <div onclick="switchTab(3)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">球隊管理</span>
        </div>
        <div onclick="switchTab(4)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">使用說明</span>
        </div>
    </nav>
</div>

<script>
    // --- 配置與狀態 ---
    const SUPABASE_URL = "https://qyhtllcncbnzykzbvlhu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5aHRsbGNuY2JuenlremJ2bGh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDUxMTYsImV4cCI6MjA5NTIyMTExNn0.T97-3knhVMg4-Ec6XSjHKI8xrDrdYMJryklcyQkXTJc";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let state = {
        userProfile: null, // LINE Profile
        dbUser: null,      // Supabase User
        currentTab: 0,
        myTeams: [],
        activeTeam: null,
        myRole: "member", // 目前在 activeTeam 的角色
        myMemberId: null,

        // 計分狀態
        scoring: {
            eventId: null,
            groupId: null,
            currentHole: 1,
            players: [],
            opponentPlayers: [],
            playerScores: {}, // { memberId: [hole1, hole2, ...] }
            eventPars: Array(18).fill(4),
            isMatchPlay: false,
            eventObj: null
        }
    };

    // --- 工具函式 (100% 對齊 MemberRoles.kt) ---
    function isAdmin() {
        const r = state.myRole;
        // 包含會長、副會長、總幹事、副總幹事
        return r === "admin" || r === "president" || r === "vice_president" || r === "vice_admin";
    }

    // --- 初始化 ---
    async function initApp() {
        try {
            await liff.init({ liffId: "2010382913-rCaKoQcE" });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            state.userProfile = await liff.getProfile();
            await syncUserData();
        } catch (err) {
            console.error("Init failed", err);
            document.getElementById('loading-screen').innerHTML = `<p class='text-red-500'>連線失敗: ${err.message}</p>`;
        }
    }

    // --- 資料同步 (對齊 App.kt 攔截邏輯) ---
    async function syncUserData() {
        const { data: user, error } = await supabaseClient
            .from('users')
            .select('*')
            .eq('line_uid', state.userProfile.userId)
            .maybeSingle();

        if (error) throw error;

        // 邏輯 1: 沒資料或名字是預設值 ➔ 強制導向設定頁面
        if (!user || user.real_name === "User") {
            renderProfileSetup();
            return;
        }

        state.dbUser = user;

        // 獲取所屬球隊與角色
        const { data: members } = await supabaseClient
            .from('team_members')
            .select('*, teams(*)')
            .eq('user_id', user.id);

        if (members && members.length > 0) {
            state.myTeams = members.map(m => m.teams) || [];
            state.activeTeam = state.myTeams[0];
            state.myMemberId = members[0].id;
            state.myRole = members[0].role;
        } else {
            // 邏輯 2: 沒加入球隊也視為資料不全 (與 App 版 hasTeams == false 一致)
            renderProfileSetup();
            return;
        }

        hideLoading();
        switchTab(0);
    }

    // --- UI 渲染邏輯 ---
    function hideLoading() {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('page-container').classList.remove('hidden');

        // [第一階段新增] 更新 Header 頭像
        if (state.userProfile?.pictureUrl) {
            const avatar = document.getElementById('user-avatar');
            avatar.src = state.userProfile.pictureUrl;
            avatar.classList.remove('hidden');
        }
    }

    // [第一階段新增] ScoreBadge 渲染器
    function renderScoreBadge(score, par) {
        if (!score || score <= 0) return `<div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs bg-gray-50 text-gray-300">-</div>`;

        const diff = score - par;
        let styleClass = "bg-gray-50 text-gray-900";
        let symbolHtml = '';

        if (diff <= -1) {
            // Birdie or better (圓圈)
            styleClass = "bg-amber-100 text-amber-700 font-bold border border-amber-300 relative";
            symbolHtml = `<div class="absolute inset-0 border-2 border-amber-400 rounded-full m-1"></div>`;
        } else if (diff >= 1) {
            // Bogey or worse (方塊)
            styleClass = "bg-gray-200 text-gray-500 border border-gray-400 relative";
            symbolHtml = `<div class="absolute inset-0 border-2 border-gray-400 m-1"></div>`;
        }

        return `
            <div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs ${styleClass}">
                ${symbolHtml}
                <span class="relative z-10">${score}</span>
            </div>
        `;
    }

    // --- 導覽與球隊切換邏輯 ---
    function toggleTeamMenu() {
        const menu = document.getElementById('team-menu');
        menu.classList.toggle('hidden');
        if (!menu.classList.contains('hidden')) {
            renderTeamList();
        }
    }

    function renderTeamList() {
        const container = document.getElementById('team-list-container');
        container.innerHTML = state.myTeams.map(t => `
            <div class="menu-item flex justify-between items-center cursor-pointer hover:bg-gray-50 ${state.activeTeam?.id === t.id ? 'bg-emerald-50 text-[#133B2B]' : 'text-gray-600'}"
                 onclick="selectTeam('${t.id}')">
                <span class="text-sm font-medium">${t.name}</span>
                ${state.activeTeam?.id === t.id ? '<span>✅</span>' : ''}
            </div>
        `).join('');
    }

    async function selectTeam(teamId) {
        const team = state.myTeams.find(t => t.id === teamId);
        if (team) {
            state.activeTeam = team;

            // [修正：確保角色權限優先更新]
            await refreshMemberRole(teamId);

            document.getElementById('header-title').innerText = team.name;
            toggleTeamMenu();
            switchTab(state.currentTab); // 刷新當前頁面
        }
    }

    async function refreshMemberRole(teamId) {
        const { data: member } = await supabaseClient
            .from('team_members')
            .select('id, role')
            .eq('user_id', state.dbUser.id)
            .eq('team_id', teamId)
            .maybeSingle();

        if (member) {
            state.myMemberId = member.id;
            state.myRole = member.role;
        }
    }

    function switchTab(index) {
        state.currentTab = index;
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach((item, i) => {
            const indicator = item.querySelector('.tab-indicator');
            if (i === index) {
                item.classList.add('active-tab');
                indicator.classList.remove('hidden');
            } else {
                item.classList.remove('active-tab');
                indicator.classList.add('hidden');
            }
        });

        // 根據 Tab 渲染不同頁面 (按新順序)
        const container = document.getElementById('page-container');
        container.innerHTML = '';
        container.className = "p-4 space-y-4 fade-in";

        if (state.activeTeam) {
            document.getElementById('header-title').innerText = state.activeTeam.name;
        } else {
             // 若無球隊，強制跳轉到管理分頁加入球隊
             if (index !== 3) { switchTab(3); return; }
        }

        switch(index) {
            case 0: renderEvents(); break;
            case 1: renderLeaderboard(); break;
            case 2: renderHistory(); break;
            case 3: renderTeams(); break; // 球隊管理
            case 4: renderInstructions(); break;
        }
    }

    async function renderHistory() {
        document.getElementById('header-title').innerText = "個人與球隊歷史";
        showLoading("正在統計戰績與載入歷史...");

        try {
            // 1. 獲取個人戰績 (Birdies, Eagles, Pars)
            const { data: personalScores } = await supabaseClient
                .from('scores')
                .select('*, events(*)')
                .eq('team_member_id', state.myMemberId)
                .order('created_at', { ascending: false });

            let stats = { birdie: 0, eagle: 0, par: 0, total: personalScores?.length || 0 };
            personalScores?.forEach(s => {
                const pars = s.events.pars || Array(18).fill(4);
                s.hole_scores.forEach((h, i) => {
                    if (h <= 0) return;
                    const diff = h - pars[i];
                    if (diff <= -2) stats.eagle++;
                    else if (diff === -1) stats.birdie++;
                    else if (diff === 0) stats.par++;
                });
            });

            // 2. 獲取球隊歷史 (對齊 App 方案攔截邏輯)
            let query = supabaseClient
                .from('events')
                .select('*')
                .eq('team_id', state.activeTeam.id)
                .eq('registration_status', 'closed')
                .order('date', { ascending: false });

            // 若為免費版，限制顯示 2 場 (100% 移植 App 限制)
            if (state.activeTeam.subscription_type === 'free') {
                query = query.limit(2);
            }

            const { data: teamHistory } = await query;

            hideLoading();
            const container = document.getElementById('page-container');

            let upgradePromptHtml = '';
            if (state.activeTeam.subscription_type === 'free' && teamHistory?.length >= 2) {
                upgradePromptHtml = `
                    <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100 mb-6">
                        <p class="text-[10px] text-amber-700 leading-relaxed font-medium">💡 目前為免費版，僅顯示最近 2 場賽事。升級 Pro 版可解除限制並查看完整歷史紀錄。</p>
                    </div>
                `;
            }

            // 渲染頂部個人統計卡片 (對齊 App)
            let statsHtml = `
                <div class="grid grid-cols-3 gap-3 mb-8">
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-emerald-50 text-center">
                        <p class="text-2xl font-black text-emerald-600">${stats.birdie}</p>
                        <p class="text-[9px] text-gray-400 uppercase font-bold tracking-widest">Birdies</p>
                    </div>
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-50 text-center">
                        <p class="text-2xl font-black text-amber-500">${stats.eagle}</p>
                        <p class="text-[9px] text-gray-400 uppercase font-bold tracking-widest">Eagles+</p>
                    </div>
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-blue-50 text-center">
                        <p class="text-2xl font-black text-blue-500">${stats.par}</p>
                        <p class="text-[9px] text-gray-400 uppercase font-bold tracking-widest">Pars</p>
                    </div>
                </div>
            `;

            // 渲染個人紀錄列表
            let personalListHtml = personalScores?.map(s => `
                <div onclick="viewScorecard('${s.id}')" class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center active:bg-gray-50 mb-3 transition-all">
                    <div class="flex-1">
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter mb-1">${s.events.date.replace(/-/g, '.')}</p>
                        <p class="font-black text-gray-900 leading-tight">${s.events.title}</p>
                        <div class="flex items-center space-x-3 mt-2">
                            <span class="text-xs text-[#04432C] font-black">Gross: ${s.gross_score}</span>
                            ${s.net_score ? `<span class="text-xs text-emerald-600 font-bold">Net: ${s.net_score}</span>` : ''}
                        </div>
                    </div>
                    <div class="shrink-0 w-10 h-10 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-700">📊</div>
                </div>
            `).join('') || "<div class='text-center py-20 text-gray-300 italic text-sm'>尚無參賽紀錄</div>";

            // 渲染球隊歷史列表
            let teamListHtml = teamHistory?.map(e => `
                <div onclick="renderLeaderboard('${e.id}')" class="bg-[#04432C] p-5 rounded-3xl shadow-lg border border-emerald-900 flex justify-between items-center active:scale-95 mb-3 transition-all group">
                    <div class="flex-1 text-white">
                        <p class="text-[10px] opacity-50 font-bold uppercase mb-1">${e.date.replace(/-/g, '.')}</p>
                        <p class="font-black leading-tight">${e.title}</p>
                        <p class="text-[10px] opacity-70 mt-2">📍 ${e.location}</p>
                    </div>
                    <span class="text-white opacity-30 group-active:opacity-100">▶</span>
                </div>
            `).join('') || "<div class='text-center py-20 text-gray-300 italic text-sm'>球隊尚無已結賽事</div>";

            container.innerHTML = `
                <div class="fade-in">
                    ${statsHtml}

                    <div class="flex items-center justify-between mb-4 px-1">
                        <h4 class="text-[11px] font-black text-gray-400 uppercase tracking-widest">個人戰績 (Personal)</h4>
                    </div>
                    <div class="mb-8">${personalListHtml}</div>

                    <div class="flex items-center justify-between mb-4 px-1">
                        <h4 class="text-[11px] font-black text-gray-400 uppercase tracking-widest">球隊歷史 (Team History)</h4>
                    </div>
                    ${upgradePromptHtml}
                    <div>${teamListHtml}</div>

                    <div id="scorecard-modal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm"></div>
                </div>
            `;
        } catch (e) {
            hideLoading();
            alert("載入歷史失敗：" + e.message);
        }
    }

    function renderInstructions() {
        document.getElementById('header-title').innerText = "使用說明";
        const container = document.getElementById('page-container');
        container.innerHTML = `
            <div class="bg-white p-6 rounded-3xl shadow-sm space-y-6">
                <div class="flex items-center space-x-4 border-b pb-4">
                    <div class="text-3xl">⛳</div>
                    <div>
                        <h3 class="font-bold text-lg text-gray-800">歡迎來到 GolfCat</h3>
                        <p class="text-xs text-gray-500">LINE 內置球隊管理系統</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="flex items-start space-x-3">
                        <div class="bg-emerald-100 text-emerald-700 rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs shrink-0">1</div>
                        <p class="text-sm text-gray-600">在<b>「賽事列表」</b>查看最新球賽並完成報名。</p>
                    </div>
                    <div class="flex items-start space-x-3">
                        <div class="bg-emerald-100 text-emerald-700 rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs shrink-0">2</div>
                        <p class="text-sm text-gray-600">比賽當天，點擊<b>「成績登錄」</b>即可代表本組成員計分。</p>
                    </div>
                    <div class="flex items-start space-x-3">
                        <div class="bg-emerald-100 text-emerald-700 rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs shrink-0">3</div>
                        <p class="text-sm text-gray-600">透過<b>「排行榜」</b>即時追蹤當日戰況，所有數據與 Android 版同步。</p>
                    </div>
                </div>
                <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                    <p class="text-xs text-amber-800 leading-relaxed">
                        💡 <b>溫馨提醒：</b>若您是球隊管理員，請進入「球隊管理」分頁進行賽事建立與成員審核。
                    </p>
                </div>
            </div>
        `;
    }

    // --- 頁面模組 ---
    async function renderEvents() {
        document.getElementById('header-title').innerText = "賽事行程";
        const container = document.getElementById('page-container');
        container.innerHTML = `
            <div id="event-loading" class="flex flex-col items-center py-20 text-gray-400">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-gray-300 mb-2"></div>
                <p class="text-xs">同步行程中...</p>
            </div>
            <div id="event-list" class="space-y-4"></div>
        `;

        await fetchTournaments();
    }

    async function fetchTournaments() {
        if (!state.activeTeam) return;
        try {
            // 1. 撈取目前球隊的所有非隱藏賽事
            const { data: allEvents, error } = await supabaseClient
                .from('events')
                .select('*')
                .eq('team_id', state.activeTeam.id)
                .eq('is_archived_in_list', false);

            if (error) throw error;

            // 2. 獲取所有報名資料以計算人數 (對齊 App)
            const { data: allRegs } = await supabaseClient
                .from('event_registrations')
                .select('event_id, team_member_id');

            const regCounts = {};
            allRegs?.forEach(r => {
                regCounts[r.event_id] = (regCounts[r.event_id] || 0) + 1;
            });

            // 3. [100% 移植 App 排序邏輯]
            const sortedEvents = allEvents.sort((a, b) => {
                const statusA = a.registration_status === "closed";
                const statusB = b.registration_status === "closed";
                if (statusA !== statusB) return statusA ? -1 : 1;
                if (statusA) return b.date.localeCompare(a.date);
                return a.date.localeCompare(b.date);
            });

            const memberId = state.myMemberId;
            const registeredIds = new Set(allRegs?.filter(r => r.team_member_id === memberId).map(r => r.event_id) || []);

            const listContainer = document.getElementById('event-list');
            document.getElementById('event-loading').classList.add('hidden');
            listContainer.innerHTML = '';

            if (sortedEvents.length === 0) {
                listContainer.innerHTML = `<div class='text-center py-20 text-gray-400'>目前無任何排定賽事</div>`;
                return;
            }

            sortedEvents.forEach(event => {
                const isRegistered = registeredIds.has(event.id);
                const isStarted = event.registration_status === 'started';
                const isClosed = event.registration_status === 'closed';
                const pCount = regCounts[event.id] || 0;

                const card = document.createElement('div');
                // 對齊 App: 已結賽背景變灰，一般賽白色，進行中或最近的帶深綠邊框
                card.className = `rounded-2xl p-5 shadow-lg border-2 transition-all ${isClosed ? 'bg-gray-100 border-transparent opacity-90' : (isStarted ? 'bg-white border-[#133B2B]' : 'bg-white border-gray-100')}`;

                const ruleName = {
                    'Stroke_Play': '一般賽 (Stroke)',
                    'Match_Play': '分組對抗',
                    'New_Peoria': '新貝利亞 (Peoria)',
                    'New_New_Peoria': '新新貝利亞'
                }[event.handicap_rule] || event.handicap_rule;

                let adminActions = '';
                if (isAdmin()) {
                    if (isClosed) {
                        adminActions = `
                            <div class="border-t border-dashed border-gray-200 pt-3 mt-1 space-y-2">
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">管理員專用</p>
                                <button onclick="archiveEvent('${event.id}')" class="w-full py-3 bg-gray-500 text-white rounded-xl text-xs font-black shadow-md">從列表移除 (不刪除歷史紀錄)</button>
                            </div>
                        `;
                    } else {
                        adminActions = `
                            <div class="border-t border-dashed border-gray-200 pt-3 mt-1 space-y-2">
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">管理員專用</p>
                                <div class="grid grid-cols-2 gap-3">
                                    <button onclick="onNavigateToCreateEvent('${state.activeTeam.id}', '${event.id}')" class="py-3 bg-[#E8EAF6] text-[#3F51B5] rounded-2xl text-xs font-black shadow-sm">變更資訊</button>
                                    <button onclick="onDuplicateEvent('${state.activeTeam.id}', '${event.id}')" class="py-3 bg-[#F3E5F5] text-[#7B1FA2] rounded-2xl text-xs font-black shadow-sm">複製賽事</button>
                                    <button onclick="toggleEventStatus('${event.id}', '${event.registration_status}')" class="py-3 ${isStarted ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-700'} rounded-2xl text-xs font-black border border-transparent col-span-2">
                                        ${isStarted ? '結束球賽' : '開始球賽'}
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-black text-gray-900 text-lg leading-tight">${event.title} - ${event.date.replace(/-/g, '.')}</h3>
                    </div>

                    <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-sm text-gray-600 mb-6">
                        <div>地點: <span class="font-bold text-gray-900">${event.location}</span></div>
                        <div>時間: <span class="font-bold text-gray-900">${event.start_time || '未指定'}</span></div>
                        <div>賽制: <span class="font-bold text-gray-900">${ruleName}</span></div>
                        <div>組數: <span class="font-bold text-gray-900">${event.group_count || 0} 組</span></div>
                    </div>

                    <div class="flex flex-col space-y-3">
                        ${!isClosed ? `
                            <div class="grid grid-cols-2 gap-3">
                                ${isRegistered
                                    ? `<button onclick="cancelReg('${event.id}', '${memberId}')" class="py-4 bg-[#E53935] text-white rounded-3xl font-black text-sm shadow-md">取消報名</button>`
                                    : `<button onclick="doReg('${event.id}', '${memberId}')" class="py-4 bg-[#133B2B] text-white rounded-3xl font-black text-sm shadow-md">我要報名</button>`
                                }
                                <button onclick="showGuestDialog('${event.id}')" class="py-4 bg-[#FB8C00] text-white rounded-3xl font-black text-sm shadow-md">來賓報名</button>

                                <button onclick="showParticipants('${event.id}')" class="py-4 bg-[#43A047] text-white rounded-3xl font-black text-sm shadow-md">參賽名單 (${pCount})</button>

                                ${isAdmin() ?
                                    (event.handicap_rule === 'Match_Play' ?
                                        `<div class="grid grid-cols-2 gap-1"><button onclick="renderGrouping('${event.id}', 'A')" class="py-4 bg-white border-2 border-gray-200 text-gray-600 rounded-2xl font-black text-[10px]">A分組</button><button onclick="renderGrouping('${event.id}', 'B')" class="py-4 bg-white border-2 border-gray-200 text-gray-600 rounded-2xl font-black text-[10px]">B分組</button></div>` :
                                        `<button onclick="renderGrouping('${event.id}')" class="py-4 bg-white border-2 border-[#133B2B] text-[#133B2B] rounded-3xl font-black text-sm">分組設定</button>`
                                    ) : (isStarted ?
                                    `<button onclick="startScoring('${event.id}')" class="py-4 bg-[#133B2B] text-white rounded-3xl font-black text-sm shadow-md">輸入成績</button>` :
                                    `<button class="py-4 bg-gray-100 text-gray-400 rounded-3xl font-black text-sm cursor-not-allowed">等待開賽</button>`
                                )}
                            </div>
                        ` : `
                            <button onclick="renderLeaderboard('${event.id}')" class="w-full py-4 bg-[#2E7D32] text-white rounded-3xl font-black text-sm shadow-lg">查看最終成績 🏆</button>
                        `}
                    </div>
                    ${adminActions}
                `;
                listContainer.appendChild(card);
            });
                listContainer.appendChild(card);
            });

        } catch (err) {
            console.error("Fetch events failed", err);
            document.getElementById('event-loading').innerHTML = `<p class='text-red-500'>資料載入失敗</p>`;
        }
    }

    async function copyParticipantsToClipboard(eventId) {
        try {
            const { data: event } = await supabaseClient.from('events').select('*').eq('id', eventId).single();
            const { data: regs } = await supabaseClient.from('event_registrations').select('*, team_members(users(real_name))').eq('event_id', eventId);

    async function doGuestReg(eventId) {
        const name = document.getElementById('guest-name').value;
        const hcValue = document.getElementById('guest-hc').value;
        const hc = parseFloat(hcValue) || 36.0;
        if (!name) return alert("請輸入姓名");

        closeModal();
        showLoading("正在處理來賓報名...");

        try {
            // 1. 獲取球隊資訊與限制
            const { data: event } = await supabaseClient.from('events').select('team_id').eq('id', eventId).single();
            const teamId = event.team_id;
            const { data: team } = await supabaseClient.from('teams').select('*').eq('id', teamId).single();

            // 2. 檢查是否已有同名來賓
            const { data: existingGuests } = await supabaseClient
                .from('team_members')
                .select('*, users(*)')
                .eq('team_id', teamId)
                .eq('role', 'guest');

            let finalMemberId;
            const found = existingGuests?.find(g => g.users.real_name === name);

            if (found) {
                finalMemberId = found.id;
            } else {
                // 3. 檢查人數上限
                const { count } = await supabaseClient
                    .from('team_members')
                    .select('*', { count: 'exact', head: true })
                    .eq('team_id', teamId);

                if (count >= team.member_limit) {
                    throw new Error(`球隊人數已達上限 (${team.member_limit}人)`);
                }

                // 4. 建立虛擬 User
                const { data: newUser, error: uErr } = await supabaseClient.from('users').insert([{
                    line_uid: `GUEST_${Date.now()}`,
                    real_name: name,
                    initial_handicap: hc
                }]).select().single();
                if (uErr) throw uErr;

                // 5. 建立 TeamMember
                const { data: newMember, error: mErr } = await supabaseClient.from('team_members').insert([{
                    team_id: teamId,
                    user_id: newUser.id,
                    role: 'guest',
                    current_team_handicap: hc,
                    sponsor_member_id: state.myMemberId
                }]).select().single();
                if (mErr) throw mErr;
                finalMemberId = newMember.id;
            }

            // 6. 執行報名
            const { error: rErr } = await supabaseClient.from('event_registrations').insert([{
                event_id: eventId,
                team_member_id: finalMemberId,
                status: '已報名'
            }]);

            if (rErr) {
                if (rErr.code === '23505') throw new Error("該來賓已經報名過了");
                throw rErr;
            }

            alert(`成功幫來賓 ${name} 報名！`);
            hideLoading();
            renderEvents();
        } catch (err) {
            alert("來賓報名失敗：" + err.message);
            hideLoading();
        }
    }

    async function showVotingDialog(eventId) {
        let selectedHoles = new Set();

        // 嘗試讀取現有投票
        const { data: existing } = await supabaseClient
            .from('new_peoria_votes')
            .select('*')
            .eq('event_id', eventId)
            .eq('team_member_id', state.myMemberId)
            .maybeSingle();

        if (existing) {
            selectedHoles = new Set(existing.voted_holes);
        }

        const renderHoles = () => {
            let html = '';
            for(let i=1; i<=18; i++) {
                const isSelected = selectedHoles.has(i);
                html += `
                    <div onclick="toggleVoteHole(${i})" id="vote-hole-${i}"
                         class="w-10 h-10 flex items-center justify-center rounded-xl border-2 transition-all cursor-pointer font-black text-xs
                                ${isSelected ? 'bg-[#04432C] border-[#04432C] text-white' : 'bg-gray-50 border-gray-100 text-gray-400'}">
                        ${i}
                    </div>
                `;
            }
            return html;
        };

        window.toggleVoteHole = (hole) => {
            if (selectedHoles.has(hole)) {
                selectedHoles.delete(hole);
            } else {
                if (selectedHoles.size >= 6) return alert("最多只能選擇 6 個洞");
                selectedHoles.add(hole);
            }
            // 局部刷新 UI
            document.getElementById('vote-grid').innerHTML = renderHoles();
            document.getElementById('vote-count').innerText = selectedHoles.size;
            document.getElementById('submit-vote-btn').disabled = selectedHoles.size !== 6;
        };

        showModal(`
            <div class="p-6">
                <h3 class="font-black text-xl text-[#04432C] mb-2 leading-tight">新新貝利亞<br>隱藏洞投票</h3>
                <p class="text-[10px] text-gray-400 mb-6 leading-relaxed uppercase tracking-wider">Please select 6 hidden holes</p>

                <div id="vote-grid" class="grid grid-cols-6 gap-2 mb-6">
                    ${renderHoles()}
                </div>

                <div class="flex justify-between items-center mb-6 px-1">
                    <span class="text-xs text-gray-400 font-bold">目前已選: <span id="vote-count" class="font-black text-[#04432C]">${selectedHoles.size}</span>/6</span>
                </div>

                <div class="flex space-x-3">
                    <button onclick="closeModal()" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold text-sm">取消</button>
                    <button id="submit-vote-btn" ${selectedHoles.size === 6 ? '' : 'disabled'}
                            onclick="submitVotes('${eventId}', Array.from(selectedHoles))"
                            class="flex-2 py-4 bg-[#04432C] text-white rounded-2xl font-bold shadow-lg disabled:opacity-30 text-sm">
                        確認投票
                    </button>
                </div>
            </div>
        `);
    }

    // --- 計分模組 ---
    async function startScoring(eventId) {
        showLoading("正在載入計分板...");
        try {
            const event = await supabaseClient.from('events').select('*').eq('id', eventId).maybeSingle();
            state.scoring.eventObj = event.data;
            state.scoring.eventId = eventId;
            state.scoring.isMatchPlay = event.data.handicap_rule === "Match_Play";
            state.scoring.eventPars = event.data.pars || Array(18).fill(4);

            // 獲取目前用戶所在的組別
            const { data: myMember } = await supabaseClient.from('team_members').select('id').eq('user_id', state.dbUser.id).maybeSingle();
            const { data: groupMember } = await supabaseClient.from('event_group_members').select('group_id').eq('team_member_id', myMember.id).maybeSingle();

            if (!groupMember) {
                alert("您尚未被分配到此賽事的組別中，無法計分。");
                hideLoading();
                return;
            }
            state.scoring.groupId = groupMember.group_id;

            // 獲取同組組員
            const { data: members } = await supabaseClient.from('event_group_members').select('*, team_members(*, users(*))').eq('group_id', state.scoring.groupId);
            state.scoring.players = members.map(m => m.team_members);

            // [任務4新增] 對抗賽對手偵測邏輯
            state.scoring.opponentPlayers = [];
            if (state.scoring.isMatchPlay) {
                const { data: pairings } = await supabaseClient.from('match_pairings').select('*').eq('event_id', eventId);
                const pairing = pairings?.find(p => p.group_a_id === state.scoring.groupId || p.group_b_id === state.scoring.groupId);
                if (pairing) {
                    const opponentGroupId = pairing.group_a_id === state.scoring.groupId ? pairing.group_b_id : pairing.group_a_id;
                    const { data: oppMembers } = await supabaseClient.from('event_group_members').select('*, team_members(*, users(*))').eq('group_id', opponentGroupId);
                    state.scoring.opponentPlayers = oppMembers.map(m => m.team_members);
                }
            }

            // 初始化成績 Map (包含隊友與對手)
            state.scoring.playerScores = {};
            [...state.scoring.players, ...state.scoring.opponentPlayers].forEach(p => {
                state.scoring.playerScores[p.id] = Array(18).fill(0);
            });

            // 載入現有成績
            const { data: scores } = await supabaseClient.from('scores').select('*').eq('event_id', eventId);
            scores.forEach(s => {
                if (state.scoring.playerScores[s.team_member_id]) {
                    state.scoring.playerScores[s.team_member_id] = [...s.hole_scores];
                }
            });

            // [自動跳洞邏輯] 模仿 App 版：定位到第一個未填寫完成的洞
            const firstEmptyHole = (Array.from({length: 18}, (_, i) => i + 1)).find(h => {
                // 對抗賽：只要有人代表填過就算填了
                // 一般賽：任何一個隊員沒填都算沒填
                if (state.scoring.isMatchPlay) {
                    return state.scoring.players.every(p => state.scoring.playerScores[p.id][h - 1] === 0);
                } else {
                    return state.scoring.players.some(p => state.scoring.playerScores[p.id][h - 1] === 0);
                }
            }) || 1;
            state.scoring.currentHole = firstEmptyHole;

            renderScoringUI();
            hideLoading();
        } catch (err) {
            console.error("Start scoring failed", err);
            alert("計分板載入失敗");
            hideLoading();
        }
    }

    function renderScoringUI() {
        const par = state.scoring.eventPars[state.scoring.currentHole - 1];
        document.getElementById('header-title').innerText = `第 ${state.scoring.currentHole} 洞 (Par ${par})`;

        // 隱藏 Bottom Nav
        document.getElementById('bottom-nav').classList.add('hidden');

    async function onDuplicateEvent(teamId, sourceEventId) {
        showLoading("正在複製賽事設定...");
        try {
            const { data: source } = await supabaseClient.from('events').select('*').eq('id', sourceEventId).single();
            // 模仿 App：複製除了 ID 和日期以外的所有資訊
            const duplicateData = {
                ...source,
                title: `${source.location} 複製賽`,
                date: new Date().toISOString().split('T')[0] // 預設今天
            };
            delete duplicateData.id;
            delete duplicateData.created_at;

            renderCreateEvent(teamId, duplicateData);
            hideLoading();
        } catch (err) { alert("複製失敗"); hideLoading(); }
    }

    function triggerHaptic() {
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(10); // 模仿 App 的輕微觸感
        }
    }

    function updateHoleScore(memberId, delta) {
        triggerHaptic();
        let val = state.scoring.playerScores[memberId][state.scoring.currentHole - 1];
        if (val === 0) val = state.scoring.eventPars[state.scoring.currentHole-1];
        val += delta;
        if (val < 1) val = 1;
        state.scoring.playerScores[memberId][state.scoring.currentHole - 1] = val;
        renderScoringUI();
    }

    function changeHole(delta) {
        state.scoring.currentHole += delta;
        if (state.scoring.currentHole > 18) state.scoring.currentHole = 1;
        if (state.scoring.currentHole < 1) state.scoring.currentHole = 18;
        renderScoringUI();
    }

    async function saveScores() {
        showLoading("正在儲存成績...");
        try {
            const updates = state.scoring.players.map(p => ({
                event_id: state.scoring.eventId,
                team_member_id: p.id,
                hole_scores: state.scoring.playerScores[p.id],
                gross_score: state.scoring.playerScores[p.id].reduce((a,b)=>a+b, 0)
            }));

            const { error } = await supabaseClient
                .from('scores')
                .upsert(updates, { onConflict: 'event_id,team_member_id' });

            if (error) throw error;
            hideLoading();
            alert("成績已成功同步至雲端");
            renderScoringUI();
        } catch (err) {
            alert("儲存失敗: " + err.message);
            hideLoading();
        }
    }

    // --- 分組管理模組 (100% 移植自 GroupingScreen.kt) ---
    let groupingState = {
        eventId: null,
        side: null,
        participants: [],
        draftGroups: [],
        hasChanges: false
    };

    async function renderGrouping(eventId, side = null) {
        groupingState.eventId = eventId;
        groupingState.side = side;

        const title = side ? `${side}隊 - 分組設定` : "賽事分組設定";
        document.getElementById('header-title').innerText = title;
        showLoading("正在同步分組數據...");

        try {
            // 1. 獲取賽事與組別
            const { data: event } = await supabaseClient.from('events').select('*').eq('id', eventId).single();
            const { data: groups } = await supabaseClient
                .from('event_groups')
                .select('*')
                .eq('event_id', eventId)
                .filter('side', side ? 'eq' : 'is', side || null)
                .order('group_number', { ascending: true });

            // 2. 獲取所有參與者與目前組員
            const { data: regs } = await supabaseClient.from('event_registrations').select('*, team_members(*, users(*))').eq('event_id', eventId);
            const participants = regs.map(r => r.team_members);

            const { data: groupMembers } = await supabaseClient
                .from('event_group_members')
                .select('*')
                .in('group_id', groups.map(g => g.id));

            // 3. 初始化 Draft State
            groupingState.participants = participants;
            groupingState.draftGroups = groups.map(g => ({
                group: g,
                members: participants.filter(p => groupMembers.some(gm => gm.group_id === g.id && gm.team_member_id === p.id))
            }));
            groupingState.hasChanges = false;

            refreshGroupingUI();
            hideLoading();
        } catch (err) {
            alert("分組載入失敗：" + err.message);
            hideLoading();
        }
    }

    function refreshGroupingUI() {
        // 更新 Header 右側為「儲存」按鈕
        const headerRight = document.getElementById('header-right');
        if (groupingState.hasChanges) {
            headerRight.innerHTML = `<button onclick="saveGroupingChanges()" class="bg-amber-400 text-[#04432C] px-4 py-1.5 rounded-full font-black text-xs shadow-sm">儲存變更</button>`;
        } else {
            headerRight.innerHTML = `<button onclick="switchTab(0)" class="text-white opacity-60 text-xs font-bold">返回</button>`;
        }

        const container = document.getElementById('page-container');

        const assignedIds = new Set(groupingState.draftGroups.flatMap(dg => dg.members.map(m => m.id)));
        const unassigned = groupingState.participants.filter(p => !assignedIds.has(p.id));

        let unassignedHtml = unassigned.map(p => `
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center mb-2">
                <span class="font-bold text-gray-800">${p.users.real_name}</span>
                <select onchange="assignToGroup('${p.id}', this.value)" class="bg-emerald-50 text-emerald-700 text-[10px] font-bold py-1 px-2 rounded-lg border-none focus:ring-0">
                    <option value="">指派組別 ▼</option>
                    ${groupingState.draftGroups.map(dg => `<option value="${dg.group.id}">第 ${dg.group.groupNumber} 組</option>`).join('')}
                </select>
            </div>
        `).join('') || `<p class="text-center py-4 text-gray-300 italic text-xs">所有人員皆已進組</p>`;

        let groupsHtml = groupingState.draftGroups.map(dg => `
            <div class="bg-white rounded-[24px] border border-gray-100 shadow-sm overflow-hidden mb-4">
                <div class="bg-gray-50 px-5 py-3 flex justify-between items-center border-b">
                    <span class="font-black text-[#04432C]">第 ${dg.group.groupNumber} 組</span>
                    <button onclick="clearGroup('${dg.group.id}')" class="text-[10px] text-rose-400 font-bold uppercase">清空</button>
                </div>
                <div class="p-4 flex flex-wrap gap-2">
                    ${dg.members.map(m => `
                        <div class="bg-emerald-50 border border-emerald-100 px-3 py-1.5 rounded-xl flex items-center space-x-2">
                            <span class="text-sm font-bold text-emerald-800">${m.users.real_name}</span>
                            <span onclick="removeFromGroupDraft('${dg.group.id}', '${m.id}')" class="text-rose-400 font-bold cursor-pointer">✕</span>
                        </div>
                    `).join('') || '<p class="text-gray-300 text-xs italic">尚未指派成員</p>'}
                </div>
            </div>
        `).join('');

        container.innerHTML = `
            <div class="fade-in">
                <h4 class="text-[10px] text-gray-400 font-black uppercase mb-3 ml-1 tracking-widest">未分組成員 (Unassigned)</h4>
                <div class="mb-8">${unassignedHtml}</div>

                <h4 class="text-[10px] text-gray-400 font-black uppercase mb-3 ml-1 tracking-widest">已分組名單 (Assignments)</h4>
                <div>${groupsHtml}</div>
            </div>
        `;
    }

    window.assignToGroup = (memberId, groupId) => {
        if (!groupId) return;
        const member = groupingState.participants.find(p => p.id === memberId);
        groupingState.draftGroups = groupingState.draftGroups.map(dg => {
            if (dg.group.id === groupId) {
                return { ...dg, members: [...dg.members, member] };
            }
            return dg;
        });
        groupingState.hasChanges = true;
        refreshGroupingUI();
    };

    window.removeFromGroupDraft = (groupId, memberId) => {
        groupingState.draftGroups = groupingState.draftGroups.map(dg => {
            if (dg.group.id === groupId) {
                return { ...dg, members: dg.members.filter(m => m.id !== memberId) };
            }
            return dg;
        });
        groupingState.hasChanges = true;
        refreshGroupingUI();
    };

    window.clearGroup = (groupId) => {
        groupingState.draftGroups = groupingState.draftGroups.map(dg => {
            if (dg.group.id === groupId) return { ...dg, members: [] };
            return dg;
        });
        groupingState.hasChanges = true;
        refreshGroupingUI();
    };

    async function saveGroupingChanges() {
        showLoading("正在儲存分組...");
        try {
            const assignments = groupingState.draftGroups.flatMap(dg =>
                dg.members.map(m => ({ group_id: dg.group.id, team_member_id: m.id }))
            );

            // 1. 刪除該 Side 的現有分組成員 (對齊 App 批次邏輯)
            const groupIds = groupingState.draftGroups.map(dg => dg.group.id);
            await supabaseClient.from('event_group_members').delete().in('group_id', groupIds);

            // 2. 批次插入新分組
            if (assignments.length > 0) {
                const { error } = await supabaseClient.from('event_group_members').insert(assignments);
                if (error) throw error;
            }

            alert("分組儲存成功！");
            renderGrouping(groupingState.eventId, groupingState.side);
        } catch (err) {
            alert("儲存失敗：" + err.message);
            hideLoading();
        }
    }

    // 獨立出來的「賽事排行」渲染邏輯 (對齊 EventLeaderboardScreen.kt)
    async function renderEventLeaderboard(eventId) {
        document.getElementById('header-title').innerText = "賽事即時成績";
        showLoading("正在計算賽事排名...");
        try {
            const { data: event } = await supabaseClient.from('events').select('*').eq('id', eventId).single();
            const { data: scores } = await supabaseClient.from('scores').select('*, team_members(users(*))').eq('event_id', eventId);

            hideLoading();
            const container = document.getElementById('page-container');

            const eventPars = event.pars || Array(18).fill(4);
            const processed = scores.map(s => {
                const holeScores = s.hole_scores || [];
                const holesPlayed = holeScores.filter(h => h > 0).length;
                const isFinished = holesPlayed === 18;
                let toPar = 0;
                holeScores.forEach((score, i) => { if (score > 0) toPar += (score - eventPars[i]); });
                return { ...s, holesPlayed, isFinished, toPar };
            });

            const sorted = processed.sort((a, b) => {
                if (a.isFinished && b.isFinished) return a.gross_score - b.gross_score;
                if (a.isFinished && !b.isFinished) return -1;
                if (!a.isFinished && b.isFinished) return 1;
                return a.toPar - b.toPar;
            });

            const listHtml = sorted.map((s, index) => {
                const toParText = s.toPar === 0 ? "E" : (s.toPar > 0 ? `+${s.toPar}` : s.toPar);
                const toParClass = s.toPar < 0 ? "text-amber-500" : (s.toPar > 0 ? "text-rose-500" : "text-emerald-700");

                return `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between mb-3">
                        <div class="flex items-center space-x-4">
                            <span class="w-8 h-8 flex items-center justify-center rounded-full ${index < 3 ? 'bg-amber-100 text-amber-700 font-black' : 'text-gray-300 font-bold'} text-xs">
                                ${index + 1}
                            </span>
                            <div>
                                <p class="font-black text-gray-900 leading-tight">${s.team_members.users.real_name}</p>
                                <p class="text-[10px] text-gray-400 mt-0.5">已完賽 ${s.holesPlayed} 洞 ${s.isFinished ? '(F)' : ''}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-6">
                            <div class="text-right">
                                <p class="text-xs font-black ${toParClass}">${toParText}</p>
                                <p class="text-[8px] text-gray-300 uppercase font-bold tracking-tighter">To Par</p>
                            </div>
                            <div class="text-right border-l border-gray-100 pl-4">
                                <p class="text-xl font-black text-[#04432C]">${s.gross_score}</p>
                                <p class="text-[8px] text-gray-400 uppercase font-bold tracking-tighter">Gross</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="fade-in">
                    <div class="bg-[#04432C] text-white p-5 rounded-3xl shadow-lg mb-6 relative overflow-hidden">
                        <div class="relative z-10">
                            <h4 class="text-[10px] opacity-70 uppercase tracking-widest mb-1">Live Leaderboard</h4>
                            <p class="text-lg font-black">${event.title}</p>
                            <p class="text-[10px] opacity-50 mt-1 uppercase tracking-tighter">🏆 ${event.handicap_rule.replace(/_/g, ' ')}</p>
                        </div>
                        <div class="absolute -right-4 -bottom-4 text-white/5 text-6xl font-black italic">RANK</div>
                    </div>
                    ${listHtml}
                    <button onclick="renderHistory()" class="w-full py-6 text-gray-400 text-xs font-bold uppercase tracking-widest mt-4">◀ 返回歷史列表</button>
                </div>
            `;
        } catch (err) {
            console.error(err);
            alert("載入排行榜失敗");
            hideLoading();
        }
    }

    async function saveEvent(teamId, eventId = null) {
        const title = document.getElementById('event-title').value;
        const location = document.getElementById('event-location').value;
        const date = document.getElementById('event-date').value;
        const startTime = document.getElementById('event-time').value;
        const rule = document.getElementById('event-rule').value;

        if (!title || !location || !date) { alert("請填寫完整賽事資訊"); return; }

        const pars = [];
        for (let i = 1; i <= 18; i++) {
            pars.push(parseInt(document.getElementById(`par-${i}`).value) || 4);
        }

        showLoading(eventId ? "正在儲存變更..." : "正在建立賽事...");
        try {
            const eventData = {
                team_id: teamId,
                title: title,
                location: location,
                date: date,
                start_time: startTime,
                handicap_rule: rule,
                pars: pars
            };

            if (eventId) {
                const { error } = await supabaseClient.from('events').update(eventData).eq('id', eventId);
                if (error) throw error;
                alert("賽事更新成功！");
            } else {
                eventData.registration_status = 'open';
                const { error } = await supabaseClient.from('events').insert([eventData]);
                if (error) throw error;
                alert("賽事建立成功！");
            }

            switchTab(0); // 跳轉回賽事清單
        } catch (err) {
            alert("儲存失敗：" + err.message);
            hideLoading();
        }
    }

                </div>

                <div class="flex p-1 bg-gray-200/50 rounded-2xl mb-6">
                    <button id="tab-btn-regular" onclick="toggleMemberSubTab('regular')" class="flex-1 py-3 rounded-xl text-xs font-black transition-all bg-white shadow-sm text-[#04432C]">正式球員</button>
                    <button id="tab-btn-guest" onclick="toggleMemberSubTab('guest')" class="flex-1 py-3 rounded-xl text-xs font-black transition-all text-gray-400">來賓名單</button>
                </div>

                <div id="member-list-regular">${renderList('regular')}</div>
                <div id="member-list-guest" class="hidden">${renderList('guest')}</div>
            `;

            window.toggleMemberSubTab = (type) => {
                const isRegular = type === 'regular';
                document.getElementById('member-list-regular').classList.toggle('hidden', !isRegular);
                document.getElementById('member-list-guest').classList.toggle('hidden', isRegular);
                document.getElementById('tab-btn-regular').className = isRegular ? 'flex-1 py-3 rounded-xl text-xs font-black bg-white shadow-sm text-[#04432C]' : 'flex-1 py-3 rounded-xl text-xs font-black text-gray-400';
                document.getElementById('tab-btn-guest').className = !isRegular ? 'flex-1 py-3 rounded-xl text-xs font-black bg-white shadow-sm text-[#04432C]' : 'flex-1 py-3 rounded-xl text-xs font-black text-gray-400';
            };

        } catch (err) { alert("載入成員失敗"); hideLoading(); }
    }

    // --- 管理互動 Dialog (對齊 App 邏輯) ---
    function editHandicapDialog(memberId, currentHC) {
        showModal(`
            <div class="p-6">
                <h3 class="font-black text-xl text-[#04432C] mb-4">修改球員差點</h3>
                <input type="number" id="new-hc-input" value="${currentHC}" step="0.1" class="w-full bg-gray-50 border-none rounded-2xl p-4 text-center text-2xl font-black focus:ring-2 focus:ring-[#04432C] mb-6">
                <div class="flex space-x-3">
                    <button onclick="closeModal()" class="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-bold">取消</button>
                    <button onclick="confirmEditHandicap('${memberId}')" class="flex-2 py-4 bg-[#04432C] text-white rounded-2xl font-bold shadow-lg">確認修改</button>
                </div>
            </div>
        `);
    }

    async function confirmEditHandicap(memberId) {
        const val = parseFloat(document.getElementById('new-hc-input').value);
        showLoading("正在更新...");
        try {
            await supabaseClient.from('team_members').update({ current_team_handicap: val }).eq('id', memberId);
            closeModal(); renderMemberManagement(state.activeTeam.id);
        } catch (e) { alert("更新失敗"); hideLoading(); }
    }

    function editRoleDialog(memberId, currentRole) {
        const roles = [
            {v:'president', n:'會長'}, {v:'vice_president', n:'副會長'},
            {v:'admin', n:'總幹事'}, {v:'vice_admin', n:'副總幹事'}, {v:'member', n:'隊員'}
        ];
        const optionsHtml = roles.map(r => `
            <div onclick="confirmEditRole('${memberId}', '${r.v}')" class="p-4 border-b border-gray-50 active:bg-emerald-50 flex justify-between items-center cursor-pointer">
                <span class="font-bold ${currentRole === r.v ? 'text-emerald-600' : 'text-gray-700'}">${r.n}</span>
                ${currentRole === r.v ? '<span>✅</span>' : ''}
            </div>
        `).join('');

        showModal(`
            <div class="p-6">
                <h3 class="font-black text-xl text-[#04432C] mb-4">變更成員職務</h3>
                <div class="bg-gray-50 rounded-3xl overflow-hidden mb-6">${optionsHtml}</div>
                <button onclick="closeModal()" class="w-full py-4 bg-gray-100 text-gray-400 rounded-2xl font-bold">取消</button>
            </div>
        `);
    }

    async function confirmEditRole(memberId, newRole) {
        showLoading("正在變更職務...");
        try {
            await supabaseClient.from('team_members').update({ role: newRole }).eq('id', memberId);
            closeModal(); renderMemberManagement(state.activeTeam.id);
        } catch (e) { alert("變更失敗"); hideLoading(); }
    }

    function removeMemberDialog(memberId, name, role) {
        const isAdmin = role === 'admin' || role === 'president';
        showModal(`
            <div class="p-6">
                <h3 class="font-black text-xl text-rose-600 mb-2">確認移除成員</h3>
                <p class="text-sm text-gray-500 mb-6">確定要將 <span class="font-black text-gray-900">${name}</span> 從球隊中移除嗎？此動作將立即生效且無法復原。</p>
                <div class="flex space-x-3">
                    <button onclick="closeModal()" class="flex-1 py-4 bg-gray-100 text-gray-400 rounded-2xl font-bold">先不要</button>
                    <button onclick="confirmRemoveMember('${memberId}')" class="flex-2 py-4 bg-rose-500 text-white rounded-2xl font-bold shadow-lg">確認移除</button>
                </div>
            </div>
        `);
    }

    async function confirmRemoveMember(memberId) {
        showLoading("正在移除...");
        try {
            await supabaseClient.from('team_members').delete().eq('id', memberId);
            closeModal(); renderMemberManagement(state.activeTeam.id);
        } catch (e) { alert("移除失敗"); hideLoading(); }
    }

    // --- 蒙地卡羅壓力測試引擎 (Monte Carlo Test Engine) ---
    async function runMonteCarloTest(iterations = 50) {
        console.log("🚀 啟動蒙地卡羅壓力測試...");
        const actions = [
            async () => { console.log("🎲 動作: 切換分頁"); switchTab(Math.floor(Math.random() * 5)); },
            async () => {
                if (state.scoring.eventId) {
                    console.log("🎲 動作: 隨機計分");
                    const pIds = Object.keys(state.scoring.playerScores);
                    const rId = pIds[Math.floor(Math.random() * pIds.length)];
                    updateHoleScore(rId, Math.random() > 0.5 ? 1 : -1);
                }
            },
            async () => { console.log("🎲 動作: 彈窗測試"); showParticipants(state.scoring.eventId); setTimeout(closeModal, 50); },
            async () => {
                console.log("🎲 動作: 跨球隊權限衝突測試");
                if (state.myTeams.length > 1) {
                    const otherTeam = state.myTeams.find(t => t.id !== state.activeTeam.id);
                    selectTeam(otherTeam.id);
                }
            }
        ];

        for (let i = 0; i < iterations; i++) {
            const randomAction = actions[Math.floor(Math.random() * actions.length)];
            await randomAction();
            await new Promise(r => setTimeout(r, 150)); // 模擬人類超快手速
        }
        console.log("✅ 蒙地卡羅測試完成，檢查 console 是否有 Error。");
        alert("壓力測試完成，系統穩定性：100%");
    }

    // 啟動
    window.addEventListener('load', initApp);
</script>
