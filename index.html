<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GolfCat - 球隊管理</title>

    <!-- 外部資源 -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #04432C;
            --secondary: #10B981;
            --background: #F3F4F6;
            --surface: #FFFFFF;
            --on-background: #1F2937;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--background);
            color: var(--on-background);
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #10B981 !important; opacity: 1 !important; }
        .tab-indicator { height: 4px; width: 32px; background-color: #10B981; border-radius: 2px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
        #team-menu { transition: all 0.2s ease-in-out; transform-origin: top; }
        .menu-item { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
        .menu-item:last-child { border-bottom: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .avatar-small { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #header-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
    </style>
</head>
<body class="antialiased">

<div id="global-modal" class="modal-overlay">
    <div class="modal-content" id="modal-body"></div>
</div>

<div class="max-w-md mx-auto h-screen bg-[#F3F4F6] flex flex-col relative shadow-2xl border-x border-gray-200">
    <header id="app-header" class="bg-[#04432C] text-white p-4 text-center font-bold text-lg tracking-wider shadow-md shrink-0 flex justify-between items-center px-4 relative z-[60]">
        <div id="header-left" class="flex items-center space-x-2 cursor-pointer">
            <div class="w-6 h-7 bg-red-600 rounded-sm flex items-center justify-center text-[10px] shadow-sm">🛡️</div>
        </div>
        <div class="flex items-center cursor-pointer ml-4" onclick="toggleTeamMenu()">
            <span id="header-title" class="font-black">載入中...</span>
            <span class="ml-1 text-[8px] opacity-70">▼</span>
        </div>
        <div id="header-right" class="flex items-center space-x-3">
            <img id="user-avatar" src="" class="avatar-small hidden">
            <span onclick="liff.logout(); location.reload();" class="text-[10px] text-rose-400 font-bold cursor-pointer">登出</span>
        </div>
        <div id="team-menu" class="hidden absolute top-14 left-1/2 -translate-x-1/2 w-64 bg-white text-gray-800 rounded-2xl shadow-2xl border border-gray-100 overflow-hidden py-2">
            <div id="team-list-container"></div>
            <div class="border-t border-gray-100 mt-2">
                <div class="menu-item text-[#04432C] text-sm font-bold flex items-center" onclick="switchTab(3)">
                    <span class="mr-2">➕</span> 加入/建立球隊
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar pb-20 bg-[#F3F4F6]">
        <div id="loading-screen" class="flex flex-col items-center justify-center h-full space-y-4">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#04432C]"></div>
            <p class="text-gray-500 text-sm px-10 text-center">正在初始化...</p>
        </div>
        <div id="page-container" class="hidden p-4 space-y-4"></div>
    </main>

    <nav id="bottom-nav" class="absolute bottom-0 left-0 right-0 bg-[#04432C] h-16 flex items-center justify-around text-white shadow-2xl z-50">
        <div onclick="switchTab(0)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">賽事列表</span>
        </div>
        <div onclick="switchTab(1)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">排行榜</span>
        </div>
        <div onclick="switchTab(2)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">歷史成績</span>
        </div>
        <div onclick="switchTab(3)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">球隊管理</span>
        </div>
        <div onclick="switchTab(4)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">使用說明</span>
        </div>
    </nav>
</div>

<script>
    // --- 診斷與 SDK 初始化 ---
    window.onerror = function(msg, url, line) {
        diag("💥 全域錯誤: " + msg);
        return false;
    };

    function diag(msg) {
        console.log(msg);
        const el = document.querySelector('#loading-screen p');
        if (el) el.innerText = msg;
    }

    try {
        if (typeof VConsole !== 'undefined') window.vConsole = new VConsole();
    } catch (e) {}

    const SUPABASE_URL = "https://qyhtllcncbnzykzbvlhu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5aHRsbGNuY2JuenlremJ2bGh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDUxMTYsImV4cCI6MjA5NTIyMTExNn0.T97-3knhVMg4-Ec6XSjHKI8xrDrdYMJryklcyQkXTJc";
    let supabaseClient;

    let state = {
        userProfile: null,
        dbUser: null,
        currentTab: 0,
        myTeams: [],
        activeTeam: null,
        myRole: "member",
        myMemberId: null,
        scoring: { eventId: null, groupId: null, currentHole: 1, players: [], opponentPlayers: [], playerScores: {}, eventPars: Array(18).fill(4), isMatchPlay: false }
    };

    function isAdmin() {
        const r = state.myRole;
        return r === "admin" || r === "president" || r === "vice_president" || r === "vice_admin";
    }

    async function initApp() {
        diag("📞 檢查 SDK 狀態...");
        if (typeof liff === 'undefined' || typeof supabase === 'undefined') {
            diag("❌ SDK 載入失敗，請檢查網路");
            return;
        }

        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        diag("📞 初始化 LIFF...");
        try {
            await liff.init({ liffId: "2010382913-rCaKoQcE" });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            state.userProfile = await liff.getProfile();
            await syncUserData();
        } catch (err) { diag("❌ 初始化失敗: " + err.message); }
    }

    async function syncUserData() {
        diag("🔍 同步用戶資料...");
        try {
            const { data: user, error } = await supabaseClient
                .from('users').select('*').eq('line_uid', state.userProfile.userId).maybeSingle();

            if (error) throw error;
            if (!user || user.real_name === "User") { renderProfileSetup(); return; }

            state.dbUser = user;
            diag("🔍 獲取球隊資料...");
            const { data: members, error: mError } = await supabaseClient
                .from('team_members').select('*, teams(*)').eq('user_id', user.id);

            if (mError) throw mError;
            if (members && members.length > 0) {
                state.myTeams = members.map(m => m.teams).filter(t => t !== null);
                state.activeTeam = state.myTeams[0];
                state.myMemberId = members[0].id;
                state.myRole = members[0].role;
                diag("🚀 進入系統...");
                hideLoading();
                switchTab(0);
            } else {
                renderProfileSetup();
            }
        } catch (err) { diag("💥 同步失敗: " + err.message); }
    }

    // --- UI 渲染邏輯 ---
    function hideLoading() {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('page-container').classList.remove('hidden');
        if (state.userProfile?.pictureUrl) {
            const avatar = document.getElementById('user-avatar');
            avatar.src = state.userProfile.pictureUrl;
            avatar.classList.remove('hidden');
        }
    }

    function showLoading(text) {
        const screen = document.getElementById('loading-screen');
        screen.querySelector('p').innerText = text;
        screen.classList.remove('hidden');
        document.getElementById('page-container').classList.add('hidden');
    }

    function renderScoreBadge(score, par) {
        if (!score || score <= 0) return `<div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs bg-gray-50 text-gray-300">-</div>`;
        const diff = score - par;
        let styleClass = "bg-gray-50 text-gray-900";
        let symbolHtml = '';
        if (diff <= -1) {
            styleClass = "bg-amber-100 text-amber-700 font-bold border border-amber-300 relative";
            symbolHtml = `<div class="absolute inset-0 border-2 border-amber-400 rounded-full m-1"></div>`;
        } else if (diff >= 1) {
            styleClass = "bg-gray-200 text-gray-500 border border-gray-400 relative";
            symbolHtml = `<div class="absolute inset-0 border-2 border-gray-400 m-1"></div>`;
        }
        return `<div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs ${styleClass}">${symbolHtml}<span class="relative z-10">${score}</span></div>`;
    }

    function toggleTeamMenu() {
        const menu = document.getElementById('team-menu');
        menu.classList.toggle('hidden');
        if (!menu.classList.contains('hidden')) renderTeamList();
    }

    function renderTeamList() {
        const container = document.getElementById('team-list-container');
        container.innerHTML = state.myTeams.map(t => `
            <div class="menu-item flex justify-between items-center cursor-pointer ${state.activeTeam?.id === t.id ? 'bg-emerald-50 text-[#133B2B]' : 'text-gray-600'}" onclick="selectTeam('${t.id}')">
                <span class="text-sm font-medium">${t.name}</span>
                ${state.activeTeam?.id === t.id ? '<span>✅</span>' : ''}
            </div>
        `).join('');
    }

    async function selectTeam(teamId) {
        const team = state.myTeams.find(t => t.id === teamId);
        if (team) {
            state.activeTeam = team;
            await refreshMemberRole(teamId);
            document.getElementById('header-title').innerText = team.name;
            toggleTeamMenu();
            switchTab(state.currentTab);
        }
    }

    async function refreshMemberRole(teamId) {
        const { data: member } = await supabaseClient.from('team_members').select('id, role').eq('user_id', state.dbUser.id).eq('team_id', teamId).maybeSingle();
        if (member) { state.myMemberId = member.id; state.myRole = member.role; }
    }

    function switchTab(index) {
        state.currentTab = index;
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach((item, i) => {
            const indicator = item.querySelector('.tab-indicator');
            if (i === index) { item.classList.add('active-tab'); indicator.classList.remove('hidden'); }
            else { item.classList.remove('active-tab'); indicator.classList.add('hidden'); }
        });
        const container = document.getElementById('page-container');
        container.innerHTML = '';
        container.className = "p-4 space-y-4 fade-in";

        // [核心修正] 頂部標題永遠顯示球隊名稱，絕不顯示功能名稱
        if (state.activeTeam) {
            document.getElementById('header-title').innerText = state.activeTeam.name;
        } else if (index !== 3) {
            switchTab(3); return;
        }

        switch(index) {
            case 0: renderEvents(); break;
            case 1: renderLeaderboard(); break;
            case 2: renderHistory(); break;
            case 3: renderTeams(); break;
            case 4: renderInstructions(); break;
        }
    }

    async function renderEvents() {
        const container = document.getElementById('page-container');
        container.innerHTML = `<div id="event-loading" class="flex flex-col items-center py-20 text-gray-400"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-gray-300 mb-2"></div><p class="text-xs">同步行程中...</p></div><div id="event-list" class="space-y-4"></div>`;
        await fetchTournaments();
    }

    async function fetchTournaments() {
        if (!state.activeTeam) return;
        try {
            const { data: allEvents } = await supabaseClient.from('events').select('*').eq('team_id', state.activeTeam.id).eq('is_archived_in_list', false);
            const { data: allRegs } = await supabaseClient.from('event_registrations').select('event_id, team_member_id');
            const regCounts = {}; allRegs?.forEach(r => regCounts[r.event_id] = (regCounts[r.event_id] || 0) + 1);
            const sortedEvents = allEvents.sort((a, b) => {
                const statusA = a.registration_status === "closed"; const statusB = b.registration_status === "closed";
                if (statusA !== statusB) return statusA ? -1 : 1;
                return statusA ? b.date.localeCompare(a.date) : a.date.localeCompare(b.date);
            });
            const registeredIds = new Set(allRegs?.filter(r => r.team_member_id === state.myMemberId).map(r => r.event_id) || []);
            const listContainer = document.getElementById('event-list');
            document.getElementById('event-loading').classList.add('hidden');
            listContainer.innerHTML = sortedEvents.length === 0 ? `<div class='text-center py-20 text-gray-400'>目前無排定賽事</div>` : '';
            sortedEvents.forEach(event => {
                const isRegistered = registeredIds.has(event.id); const isStarted = event.registration_status === 'started';
                const isClosed = event.registration_status === 'closed'; const pCount = regCounts[event.id] || 0;
                const card = document.createElement('div');
                card.className = `rounded-2xl p-5 shadow-lg border-2 transition-all ${isClosed ? 'bg-gray-100 border-transparent opacity-90' : (isStarted ? 'bg-white border-[#133B2B]' : 'bg-white border-gray-100')}`;
                let adminActions = isAdmin() ? `<div class="border-t border-dashed border-gray-200 pt-3 mt-1 space-y-2"><p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">管理員專用</p><div class="grid grid-cols-2 gap-3">
                    ${isClosed ? `<button onclick="archiveEvent('${event.id}')" class="w-full py-3 bg-gray-500 text-white rounded-xl text-xs font-black shadow-md col-span-2">從列表移除</button>` : `
                    <button onclick="onNavigateToCreateEvent('${state.activeTeam.id}', '${event.id}')" class="py-3 bg-[#E8EAF6] text-[#3F51B5] rounded-2xl text-xs font-black shadow-sm">變更資訊</button>
                    <button onclick="onDuplicateEvent('${state.activeTeam.id}', '${event.id}')" class="py-3 bg-[#F3E5F5] text-[#7B1FA2] rounded-2xl text-xs font-black shadow-sm">複製賽事</button>
                    <button onclick="toggleEventStatus('${event.id}', '${event.registration_status}')" class="py-3 ${isStarted ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-700'} rounded-2xl text-xs font-black border border-transparent col-span-2">${isStarted ? '結束球賽' : '開始球賽'}</button>`}</div></div>` : '';
                card.innerHTML = `<div class="flex justify-between items-start mb-2"><h3 class="font-black text-gray-900 text-lg leading-tight">${event.title} - ${event.date.replace(/-/g, '.')}</h3></div>
                    <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-sm text-gray-600 mb-6"><div>地點: <span class="font-bold text-gray-900">${event.location}</span></div><div>時間: <span class="font-bold text-gray-900">${event.start_time || '未指定'}</span></div><div>賽制: <span class="font-bold text-gray-900">${event.handicap_rule}</span></div><div>組數: <span class="font-bold text-gray-900">${event.group_count || 0} 組</span></div></div>
                    <div class="flex flex-col space-y-3">${!isClosed ? `<div class="grid grid-cols-2 gap-3">${isRegistered ? `<button onclick="cancelReg('${event.id}', '${state.myMemberId}')" class="py-4 bg-[#E53935] text-white rounded-3xl font-black text-sm shadow-md">取消報名</button>` : `<button onclick="doReg('${event.id}', '${state.myMemberId}')" class="py-4 bg-[#133B2B] text-white rounded-3xl font-black text-sm shadow-md">我要報名</button>`}
                    <button onclick="showGuestDialog('${event.id}')" class="py-4 bg-[#FB8C00] text-white rounded-3xl font-black text-sm shadow-md">來賓報名</button><button onclick="showParticipants('${event.id}')" class="py-4 bg-[#43A047] text-white rounded-3xl font-black text-sm shadow-md">參賽名單 (${pCount})</button>
                    ${isAdmin() ? (event.handicap_rule === 'Match_Play' ? `<div class="grid grid-cols-2 gap-1"><button onclick="renderGrouping('${event.id}', 'A')" class="py-4 bg-white border-2 border-gray-200 text-gray-600 rounded-2xl font-black text-[10px]">A分組</button><button onclick="renderGrouping('${event.id}', 'B')" class="py-4 bg-white border-2 border-gray-200 text-gray-600 rounded-2xl font-black text-[10px]">B分組</button></div>` : `<button onclick="renderGrouping('${event.id}')" class="py-4 bg-white border-2 border-[#133B2B] text-[#133B2B] rounded-3xl font-black text-sm">分組設定</button>`) : (isStarted ? `<button onclick="startScoring('${event.id}')" class="py-4 bg-[#133B2B] text-white rounded-3xl font-black text-sm shadow-md">輸入成績</button>` : `<button class="py-4 bg-gray-100 text-gray-400 rounded-3xl font-black text-sm cursor-not-allowed">等待開賽</button>`)}</div>` : `<button onclick="renderLeaderboard('${event.id}')" class="w-full py-4 bg-[#2E7D32] text-white rounded-3xl font-black text-sm shadow-lg">查看最終成績 🏆</button>`}</div>${adminActions}`;
                listContainer.appendChild(card);
            });
        } catch (err) { diag("❌ 載入球賽失敗: " + err.message); }
    }

    async function renderLeaderboard(targetEventId = null) {
        if (targetEventId) { renderEventLeaderboard(targetEventId); return; }
        showLoading("正在更新球隊排名...");
        try {
            const { data: members } = await supabaseClient.from('team_members').select('*, users(*)').eq('team_id', state.activeTeam.id).order('current_team_handicap', { ascending: true });
            hideLoading(); const container = document.getElementById('page-container');
            container.innerHTML = `<div class="fade-in"><div class="bg-emerald-50 p-6 rounded-3xl border border-emerald-100 mb-6 text-center"><p class="text-[10px] text-emerald-700 font-black uppercase tracking-widest mb-1">Team Ranking</p><h3 class="text-xl font-black text-[#04432C]">${state.activeTeam.name}</h3><p class="text-xs text-emerald-600/60 mt-1">依球隊差點進行動態排名</p></div>` + members.map((m, i) => {
                const rankColor = i === 0 ? 'text-amber-400' : i === 1 ? 'text-gray-400' : i === 2 ? 'text-amber-700' : 'text-gray-300';
                return `<div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex items-center mb-4 active:scale-95 transition-all"><div class="w-12 shrink-0 flex flex-col items-center justify-center border-r border-gray-50 mr-4"><span class="text-2xl font-black ${rankColor}">${i + 1}</span></div><div class="flex-1"><h4 class="font-black text-gray-900 text-lg leading-tight">${m.users.real_name}</h4><p class="text-[10px] text-gray-400 font-bold uppercase mt-1">${m.role}</p></div><div class="text-right"><p class="text-[9px] text-gray-300 font-bold uppercase tracking-widest">Handicap</p><p class="text-2xl font-black text-[#04432C]">${m.current_team_handicap}</p></div></div>`;
            }).join('') + `</div>`;
        } catch (err) { diag("❌ 排行榜載入失敗"); }
    }

    async function renderEventLeaderboard(eventId) {
        document.getElementById('header-title').innerText = "賽事即時成績"; showLoading("正在計算排名...");
        try {
            const { data: event } = await supabaseClient.from('events').select('*').eq('id', eventId).single();
            const { data: scores } = await supabaseClient.from('scores').select('*, team_members(users(*))').eq('event_id', eventId);
            const pars = event.pars || Array(18).fill(4);
            const sorted = scores.map(s => {
                let toPar = 0; s.hole_scores.forEach((score, i) => { if (score > 0) toPar += (score - pars[i]); });
                return { ...s, holesPlayed: s.hole_scores.filter(h => h > 0).length, isFinished: s.hole_scores.filter(h => h > 0).length === 18, toPar };
            }).sort((a, b) => a.isFinished === b.isFinished ? (a.isFinished ? a.gross_score - b.gross_score : a.toPar - b.toPar) : (a.isFinished ? -1 : 1));
            hideLoading(); const container = document.getElementById('page-container');
            container.innerHTML = `<div class="fade-in"><div class="bg-[#04432C] text-white p-5 rounded-3xl shadow-lg mb-6 relative overflow-hidden"><div class="relative z-10"><h4 class="text-[10px] opacity-70 uppercase tracking-widest mb-1">Live Leaderboard</h4><p class="text-lg font-black">${event.title}</p></div><div class="absolute -right-4 -bottom-4 text-white/5 text-6xl font-black italic">RANK</div></div>` + sorted.map((s, i) => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between mb-3"><div class="flex items-center space-x-4"><span class="w-8 h-8 flex items-center justify-center rounded-full ${i < 3 ? 'bg-amber-100 text-amber-700 font-black' : 'text-gray-300 font-bold'} text-xs">${i + 1}</span><div><p class="font-black text-gray-900 leading-tight">${s.team_members.users.real_name}</p><p class="text-[10px] text-gray-400 mt-0.5">已完賽 ${s.holesPlayed} 洞</p></div></div><div class="flex items-center space-x-6"><div class="text-right"><p class="text-xs font-black">${s.toPar}</p></div><div class="text-right border-l border-gray-100 pl-4"><p class="text-xl font-black text-[#04432C]">${s.gross_score}</p></div></div></div>`).join('') + `<button onclick="switchTab(0)" class="w-full py-6 text-gray-400 text-xs font-bold uppercase tracking-widest">返回列表</button></div>`;
        } catch (err) { diag("❌ 排行榜載入失敗"); }
    }

    async function renderHistory() {
        showLoading("統計中...");
        try {
            const { data: scores } = await supabaseClient.from('scores').select('*, events(*)').eq('team_member_id', state.myMemberId).order('created_at', { ascending: false });
            hideLoading(); const container = document.getElementById('page-container');
            container.innerHTML = scores.map(s => `<div onclick="viewScorecard('${s.id}')" class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center mb-3"><div><p class="text-[10px] text-gray-400 font-bold mb-1">${s.events.date}</p><p class="font-black text-gray-900">${s.events.title}</p><p class="text-xs text-[#04432C] font-black mt-1">Gross: ${s.gross_score}</p></div><div class="shrink-0 w-10 h-10 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-700">📊</div></div>`).join('') || "<div class='text-center py-20 text-gray-300 italic text-sm'>尚無參賽紀錄</div>";
        } catch (err) { diag("❌ 載入歷史失敗"); }
    }

    function renderTeams() {
        document.getElementById('header-title').innerText = "球隊管理中心"; const container = document.getElementById('page-container');
        container.innerHTML = state.myTeams.map(t => `<div class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-100 mb-6"><div class="flex justify-between items-center mb-4"><div><h3 class="font-black text-gray-900 text-xl">${t.name}</h3><p class="text-[10px] text-gray-400 font-bold mt-1">Code: ${t.join_code}</p></div></div><div class="grid grid-cols-2 gap-3 mt-4">${isAdmin() ? `<button onclick="renderMemberManagement('${t.id}')" class="py-4 bg-[#04432C] text-white rounded-2xl text-xs font-black shadow-lg">成員管理</button><button onclick="renderCreateEvent('${t.id}')" class="py-4 bg-emerald-600 text-white rounded-2xl text-xs font-black shadow-lg">建立賽事</button>` : `<p class='text-xs text-amber-700'>您目前是該球隊隊員</p>`}</div></div>`).join('') + `<div class="bg-white p-8 rounded-[32px] border-2 border-dashed border-gray-100 text-center shadow-inner"><h4 class="font-black text-gray-400 uppercase tracking-widest text-xs mb-4">Join New Team</h4><div class="flex space-x-2 bg-gray-50 p-2 rounded-2xl"><input type="text" id="join-code-input" maxlength="6" class="flex-1 bg-transparent border-none p-3 text-center font-black text-2xl tracking-[0.5em] text-[#04432C] focus:ring-0" placeholder="000000"><button onclick="joinTeam()" class="bg-[#04432C] text-white px-6 rounded-xl font-black text-sm uppercase">加入</button></div></div>`;
    }

    function renderProfileSetup() {
        hideLoading(); document.getElementById('header-title').innerText = "初次使用設定"; const container = document.getElementById('page-container');
        container.innerHTML = `<div class="bg-white rounded-3xl p-6 shadow-sm space-y-6"><p class="text-gray-500 text-sm">請填寫真實姓名與初始差點</p><div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">真實姓名</label><input type="text" id="setup-name" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]" placeholder="王小明"></div><div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">初始差點 (0-36)</label><input type="number" id="setup-handicap" value="36.0" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]"></div><button onclick="saveProfile()" class="w-full py-4 bg-[#133B2B] text-white rounded-2xl font-bold shadow-xl">開始使用</button></div>`;
    }

    async function saveProfile() {
        const name = document.getElementById('setup-name').value; const hc = parseFloat(document.getElementById('setup-handicap').value); if (!name) return alert("請填寫姓名");
        showLoading("更新中..."); try {
            await supabaseClient.from('users').insert([{ line_uid: state.userProfile.userId, real_name: name, initial_handicap: hc }]);
            location.reload();
        } catch (err) { diag("💥 儲存失敗: " + err.message); hideLoading(); }
    }

    // 對話框控制
    function showModal(contentHtml) { const modal = document.getElementById('global-modal'); const body = document.getElementById('modal-body'); body.innerHTML = contentHtml; modal.style.display = 'flex'; }
    function closeModal() { document.getElementById('global-modal').style.display = 'none'; }
    window.addEventListener('load', initApp);
</script>
</body>
</html>
