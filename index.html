<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GolfCat - 球隊管理</title>

    <!-- 外部資源 -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #133B2B;
            --secondary: #2E7D32;
            --background: #FAFAFA;
            --surface: #FAFAFA;
            --on-background: #1A1A1A;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--background);
            color: var(--on-background);
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #10B981 !important; opacity: 1 !important; }
        .tab-indicator { height: 4px; width: 40px; background-color: #10B981; border-radius: 2px; position: absolute; top: 0; }

        /* 模擬 App 切換動畫 */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

<!-- 主要容器：限制最大寬度模擬手機感 -->
<div class="max-w-md mx-auto h-screen bg-white flex flex-col relative shadow-2xl border-x border-gray-100">

    <!-- Header (對齊 App 標題列) -->
    <header id="app-header" class="bg-[#133B2B] text-white p-4 text-center font-bold text-lg tracking-wider shadow-md shrink-0 flex justify-between items-center px-6">
        <div class="w-6"></div> <!-- 佔位符 -->
        <span id="header-title">GolfCat</span>
        <div id="header-action" class="w-6 text-xl">
             <!-- 右側動作按鈕，如 + 號 -->
        </div>
    </header>

    <!-- 主內容區 (對齊 App 各個 Screen) -->
    <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar pb-20 bg-[#FAFAFA]">
        <div id="loading-screen" class="flex flex-col items-center justify-center h-full space-y-4">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#133B2B]"></div>
            <p class="text-gray-500 text-sm">正在同步球員資料...</p>
        </div>
        <div id="page-container" class="hidden p-4 space-y-4">
            <!-- 頁面內容將由 JavaScript 動態插入 -->
        </div>
    </main>

    <!-- Bottom Navigation (對齊 App 的五個 Tab) -->
    <nav id="bottom-nav" class="absolute bottom-0 left-0 right-0 bg-[#133B2B] h-16 flex items-center justify-around text-white shadow-[0_-2px_10px_rgba(0,0,0,0.1)] z-50">
        <div onclick="switchTab(0)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] mt-1">賽事</span>
        </div>
        <div onclick="switchTab(1)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] mt-1">球隊</span>
        </div>
        <div onclick="switchTab(2)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] mt-1">分組</span>
        </div>
        <div onclick="switchTab(3)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] mt-1">成績</span>
        </div>
        <div onclick="switchTab(4)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] mt-1">我的</span>
        </div>
    </nav>
</div>

<script>
    // --- 配置與狀態 ---
    const SUPABASE_URL = "https://qyhtllcncbnzykzbvlhu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5aHRsbGNuY2JuenlremJ2bGh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDUxMTYsImV4cCI6MjA5NTIyMTExNn0.T97-3knhVMg4-Ec6XSjHKI8xrDrdYMJryklcyQkXTJc";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let state = {
        userProfile: null, // LINE Profile
        dbUser: null,      // Supabase User
        currentTab: 0,
        myTeams: [],
        activeTeam: null
    };

    // --- 初始化 ---
    async function initApp() {
        try {
            await liff.init({ liffId: "2010382913-rCaKoQcE" });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            state.userProfile = await liff.getProfile();
            await syncUserData();
        } catch (err) {
            console.error("Init failed", err);
            document.getElementById('loading-screen').innerHTML = `<p class='text-red-500'>連線失敗: ${err.message}</p>`;
        }
    }

    // --- 資料同步 (對齊 sharedLogic) ---
    async function syncUserData() {
        const { data: user, error } = await supabaseClient
            .from('users')
            .select('*')
            .eq('line_uid', state.userProfile.userId)
            .maybeSingle();

        if (error) throw error;

        if (!user) {
            // 處理新用戶：進入 Profile 設定
            renderProfileSetup();
            return;
        }

        state.dbUser = user;

        // 獲取所屬球隊
        const { data: members } = await supabaseClient
            .from('team_members')
            .select('team_id')
            .eq('user_id', user.id);

        if (members && members.length > 0) {
            const teamIds = members.map(m => m.team_id);
            const { data: teams } = await supabaseClient.from('teams').select('*').in('id', teamIds);
            state.myTeams = teams || [];
            state.activeTeam = teams[0];
        }

        hideLoading();
        switchTab(0); // 預設進入賽事
    }

    // --- UI 渲染邏輯 ---
    function hideLoading() {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('page-container').classList.remove('hidden');
    }

    function switchTab(index) {
        state.currentTab = index;
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach((item, i) => {
            const indicator = item.querySelector('.tab-indicator');
            if (i === index) {
                item.classList.add('active-tab');
                indicator.classList.remove('hidden');
            } else {
                item.classList.remove('active-tab');
                indicator.classList.add('hidden');
            }
        });

        // 根據 Tab 渲染不同頁面
        const container = document.getElementById('page-container');
        container.innerHTML = ''; // 清空
        container.className = "p-4 space-y-4 fade-in";

        switch(index) {
            case 0: renderEvents(); break;
            case 1: renderTeams(); break;
            case 2: renderGrouping(); break;
            case 3: renderLeaderboard(); break;
            case 4: renderMe(); break;
        }
    }

    // --- 頁面模組 (暫時先放 Placeholder，明天進一步實作) ---
    function renderEvents() {
        document.getElementById('header-title').innerText = "賽事行程";
        document.getElementById('page-container').innerHTML = `<div class='text-center py-20 text-gray-400'>正在獲取賽事列表...</div>`;
        // 這裡會放入 fetchTournaments 邏輯
    }

    function renderTeams() {
        document.getElementById('header-title').innerText = "我的球隊";
        document.getElementById('page-container').innerHTML = `<div class='text-center py-20 text-gray-400'>球隊功能開發中</div>`;
    }

    function renderGrouping() {
        document.getElementById('header-title').innerText = "今日分組";
        document.getElementById('page-container').innerHTML = `<div class='text-center py-20 text-gray-400'>分組功能開發中</div>`;
    }

    function renderLeaderboard() {
        document.getElementById('header-title').innerText = "即時成績";
        document.getElementById('page-container').innerHTML = `<div class='text-center py-20 text-gray-400'>排行榜功能開發中</div>`;
    }

    function renderMe() {
        document.getElementById('header-title').innerText = "個人中心";
        document.getElementById('page-container').innerHTML = `
            <div class='bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex flex-col items-center'>
                <img src="${state.userProfile.pictureUrl}" class="w-20 h-20 rounded-full border-2 border-[#133B2B] mb-4">
                <h3 class="font-bold text-lg">${state.dbUser.real_name}</h3>
                <p class="text-sm text-gray-500 mt-1">差點: ${state.dbUser.initial_handicap}</p>
                <button onclick="liff.logout(); location.reload();" class="mt-6 w-full py-3 border border-red-200 text-red-500 rounded-xl font-medium">登出系統</button>
            </div>
        `;
    }

    function renderProfileSetup() {
        hideLoading();
        document.getElementById('header-title').innerText = "初次使用設定";
        document.getElementById('page-container').innerHTML = `<div class='p-4'>請填寫您的球員資料...</div>`;
    }

    // 啟動
    window.addEventListener('load', initApp);
</script>
</body>
</html>
