<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GolfCat - 球隊管理</title>

    <!-- 外部資源 -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #04432C;
            --secondary: #10B981;
            --background: #F3F4F6;
            --surface: #FFFFFF;
            --on-background: #1F2937;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--background);
            color: var(--on-background);
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #10B981 !important; opacity: 1 !important; }
        /* 修改指示器：位於 Tab 頂部 */
        .tab-indicator { height: 4px; width: 32px; background-color: #10B981; border-radius: 2px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }

        /* 球隊選單樣式 */
        #team-menu { transition: all 0.2s ease-in-out; transform-origin: top; }
        .menu-item { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
        .menu-item:last-child { border-bottom: none; }

        /* 浮動對話框樣式 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 補回缺失的輔助樣式 */
        .avatar-small { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 防止標題被擠壓 */
        #header-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
    </style>
</head>
<body class="antialiased">

<!-- 對話框容器 (全域通用) -->
<div id="global-modal" class="hidden modal-overlay">
    <div class="modal-content" id="modal-body"></div>
</div>

<!-- 主要容器 -->
<div class="max-w-md mx-auto h-screen bg-[#F3F4F6] flex flex-col relative shadow-2xl border-x border-gray-200">

    <!-- Header (1:1 還原 App 頂部) -->
    <header id="app-header" class="bg-[#04432C] text-white p-4 text-center font-bold text-lg tracking-wider shadow-md shrink-0 flex justify-between items-center px-4 relative z-[60]">
        <!-- 左側：Logo -->
        <div id="header-left" class="flex items-center space-x-2 cursor-pointer">
            <div class="w-6 h-7 bg-red-600 rounded-sm flex items-center justify-center text-[10px] shadow-sm">🛡️</div>
        </div>

        <!-- 中間：標題與下拉 -->
        <div class="flex items-center cursor-pointer ml-4" onclick="toggleTeamMenu()">
            <span id="header-title" class="font-black">載入中...</span>
            <span class="ml-1 text-[8px] opacity-70">▼</span>
        </div>

        <!-- 右側：頭像與登出 -->
        <div id="header-right" class="flex items-center space-x-3">
            <img id="user-avatar" src="" class="avatar-small hidden">
            <span onclick="liff.logout(); location.reload();" class="text-[10px] text-rose-400 font-bold cursor-pointer">登出</span>
        </div>

        <!-- 球隊下拉選單 -->
        <div id="team-menu" class="hidden absolute top-14 left-1/2 -translate-x-1/2 w-64 bg-white text-gray-800 rounded-2xl shadow-2xl border border-gray-100 overflow-hidden py-2">
            <div id="team-list-container"></div>
            <div class="border-t border-gray-100 mt-2">
                <div class="menu-item text-[#04432C] text-sm font-bold flex items-center" onclick="switchTab(3)">
                    <span class="mr-2">➕</span> 加入/建立球隊
                </div>
            </div>
        </div>
    </header>

    <!-- 主內容區 -->
    <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar pb-20 bg-[#F3F4F6]">
        <div id="loading-screen" class="flex flex-col items-center justify-center h-full space-y-4">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#04432C]"></div>
            <p class="text-gray-500 text-sm">正在同步球員資料...</p>
        </div>
        <div id="page-container" class="hidden p-4 space-y-4">
        </div>
    </main>

    <!-- Bottom Navigation (對齊 App 顏色與指示器) -->
    <nav id="bottom-nav" class="absolute bottom-0 left-0 right-0 bg-[#04432C] h-16 flex items-center justify-around text-white shadow-2xl z-50">
        <div onclick="switchTab(0)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">賽事列表</span>
        </div>
        <div onclick="switchTab(1)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">排行榜</span>
        </div>
        <div onclick="switchTab(2)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">歷史成績</span>
        </div>
        <div onclick="switchTab(3)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">球隊管理</span>
        </div>
        <div onclick="switchTab(4)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60 transition-all">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold mt-1">使用說明</span>
        </div>
    </nav>
</div>

<script>
    // --- 配置與狀態 ---
    const SUPABASE_URL = "https://qyhtllcncbnzykzbvlhu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5aHRsbGNuY2JuenlremJ2bGh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDUxMTYsImV4cCI6MjA5NTIyMTExNn0.T97-3knhVMg4-Ec6XSjHKI8xrDrdYMJryklcyQkXTJc";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let state = {
        userProfile: null, // LINE Profile
        dbUser: null,      // Supabase User
        currentTab: 0,
        myTeams: [],
        activeTeam: null,
        myRole: "member", // 目前在 activeTeam 的角色
        myMemberId: null,

        // 計分狀態
        scoring: {
            eventId: null,
            groupId: null,
            currentHole: 1,
            players: [],
            opponentPlayers: [],
            playerScores: {}, // { memberId: [hole1, hole2, ...] }
            eventPars: Array(18).fill(4),
            isMatchPlay: false,
            eventObj: null
        }
    };

    // --- 工具函式 ---
    function isAdmin() {
        const r = state.myRole;
        return r === "admin" || r === "president" || r === "vice_president" || r === "vice_admin";
    }

    // --- 初始化 ---
    async function initApp() {
        try {
            await liff.init({ liffId: "2010382913-rCaKoQcE" });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            state.userProfile = await liff.getProfile();
            await syncUserData();
        } catch (err) {
            console.error("Init failed", err);
            document.getElementById('loading-screen').innerHTML = `<p class='text-red-500'>連線失敗: ${err.message}</p>`;
        }
    }

    // --- 資料同步 (對齊 sharedLogic) ---
    async function syncUserData() {
        const { data: user, error } = await supabaseClient
            .from('users')
            .select('*')
            .eq('line_uid', state.userProfile.userId)
            .maybeSingle();

        if (error) throw error;

        if (!user) {
            renderProfileSetup();
            return;
        }

        state.dbUser = user;

        // 獲取所屬球隊與角色
        const { data: members } = await supabaseClient
            .from('team_members')
            .select('*, teams(*)')
            .eq('user_id', user.id);

        if (members && members.length > 0) {
            state.myTeams = members.map(m => m.teams) || [];
            state.activeTeam = state.myTeams[0];
            state.myMemberId = members[0].id;
            state.myRole = members[0].role;
        }

        hideLoading();
        switchTab(0);
    }

    // --- UI 渲染邏輯 ---
    function hideLoading() {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('page-container').classList.remove('hidden');

        // [第一階段新增] 更新 Header 頭像
        if (state.userProfile?.pictureUrl) {
            const avatar = document.getElementById('user-avatar');
            avatar.src = state.userProfile.pictureUrl;
            avatar.classList.remove('hidden');
        }
    }

    // [第一階段新增] ScoreBadge 渲染器
    function renderScoreBadge(score, par) {
        if (!score || score <= 0) return `<div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs bg-gray-50 text-gray-300">-</div>`;

        const diff = score - par;
        let styleClass = "bg-gray-50 text-gray-900";
        let symbolHtml = '';

        if (diff <= -1) {
            // Birdie or better (圓圈)
            styleClass = "bg-amber-100 text-amber-700 font-bold border border-amber-300 relative";
            symbolHtml = `<div class="absolute inset-0 border-2 border-amber-400 rounded-full m-1"></div>`;
        } else if (diff >= 1) {
            // Bogey or worse (方塊)
            styleClass = "bg-gray-200 text-gray-500 border border-gray-400 relative";
            symbolHtml = `<div class="absolute inset-0 border-2 border-gray-400 m-1"></div>`;
        }

        return `
            <div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs ${styleClass}">
                ${symbolHtml}
                <span class="relative z-10">${score}</span>
            </div>
        `;
    }

    // --- 導覽與球隊切換邏輯 ---
    function toggleTeamMenu() {
        const menu = document.getElementById('team-menu');
        menu.classList.toggle('hidden');
        if (!menu.classList.contains('hidden')) {
            renderTeamList();
        }
    }

    function renderTeamList() {
        const container = document.getElementById('team-list-container');
        container.innerHTML = state.myTeams.map(t => `
            <div class="menu-item flex justify-between items-center cursor-pointer hover:bg-gray-50 ${state.activeTeam?.id === t.id ? 'bg-emerald-50 text-[#133B2B]' : 'text-gray-600'}"
                 onclick="selectTeam('${t.id}')">
                <span class="text-sm font-medium">${t.name}</span>
                ${state.activeTeam?.id === t.id ? '<span>✅</span>' : ''}
            </div>
        `).join('');
    }

    async function selectTeam(teamId) {
        const team = state.myTeams.find(t => t.id === teamId);
        if (team) {
            state.activeTeam = team;

            // [修正：確保角色權限優先更新]
            await refreshMemberRole(teamId);

            document.getElementById('header-title').innerText = team.name;
            toggleTeamMenu();
            switchTab(state.currentTab); // 刷新當前頁面
        }
    }

    async function refreshMemberRole(teamId) {
        const { data: member } = await supabaseClient
            .from('team_members')
            .select('id, role')
            .eq('user_id', state.dbUser.id)
            .eq('team_id', teamId)
            .maybeSingle();

        if (member) {
            state.myMemberId = member.id;
            state.myRole = member.role;
        }
    }

    function switchTab(index) {
        state.currentTab = index;
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach((item, i) => {
            const indicator = item.querySelector('.tab-indicator');
            if (i === index) {
                item.classList.add('active-tab');
                indicator.classList.remove('hidden');
            } else {
                item.classList.remove('active-tab');
                indicator.classList.add('hidden');
            }
        });

        // 根據 Tab 渲染不同頁面 (按新順序)
        const container = document.getElementById('page-container');
        container.innerHTML = '';
        container.className = "p-4 space-y-4 fade-in";

        if (state.activeTeam) {
            document.getElementById('header-title').innerText = state.activeTeam.name;
        } else {
             // 若無球隊，強制跳轉到管理分頁加入球隊
             if (index !== 3) { switchTab(3); return; }
        }

        switch(index) {
            case 0: renderEvents(); break;
            case 1: renderLeaderboard(); break;
            case 2: renderHistory(); break;
            case 3: renderTeams(); break; // 球隊管理
            case 4: renderInstructions(); break;
        }
    }

    async function renderHistory() {
        document.getElementById('header-title').innerText = "歷史成績";
        // 複用原本 renderMe 裡的統計與列表邏輯
        showLoading("正在統計戰績...");
        try {
            const { data: scores } = await supabaseClient
                .from('scores')
                .select('*, events(*)')
                .eq('team_member_id', state.myMemberId)
                .order('created_at', { ascending: false });

            hideLoading();
            const container = document.getElementById('page-container');
            let historyHtml = scores?.map(s => `
                <div onclick="viewScorecard('${s.id}')" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center active:bg-gray-50 transition-all">
                    <div>
                        <p class="font-bold text-gray-900 text-sm">${s.events.title}</p>
                        <p class="text-[10px] text-gray-400 mt-1">📅 ${s.events.date}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-black text-[#133B2B]">${s.gross_score}</p>
                        <p class="text-[9px] text-gray-400 uppercase">Gross</p>
                    </div>
                </div>
            `).join('') || "<p class='text-center py-10 text-gray-400'>尚無參賽紀錄</p>";

            container.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-[#133B2B] text-white p-5 rounded-2xl shadow-lg">
                        <h4 class="text-[10px] opacity-70 uppercase tracking-widest mb-1">我的表現彙總</h4>
                        <p class="text-lg font-bold">歷史戰績牆 (History)</p>
                    </div>
                    ${historyHtml}
                    <div id="scorecard-modal" class="hidden fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm"></div>
                </div>
            `;
        } catch (e) {
            hideLoading();
            alert("載入歷史失敗");
        }
    }

    function renderInstructions() {
        document.getElementById('header-title').innerText = "使用說明";
        const container = document.getElementById('page-container');
        container.innerHTML = `
            <div class="bg-white p-6 rounded-3xl shadow-sm space-y-6">
                <div class="flex items-center space-x-4 border-b pb-4">
                    <div class="text-3xl">⛳</div>
                    <div>
                        <h3 class="font-bold text-lg text-gray-800">歡迎來到 GolfCat</h3>
                        <p class="text-xs text-gray-500">LINE 內置球隊管理系統</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="flex items-start space-x-3">
                        <div class="bg-emerald-100 text-emerald-700 rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs shrink-0">1</div>
                        <p class="text-sm text-gray-600">在<b>「賽事列表」</b>查看最新球賽並完成報名。</p>
                    </div>
                    <div class="flex items-start space-x-3">
                        <div class="bg-emerald-100 text-emerald-700 rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs shrink-0">2</div>
                        <p class="text-sm text-gray-600">比賽當天，點擊<b>「成績登錄」</b>即可代表本組成員計分。</p>
                    </div>
                    <div class="flex items-start space-x-3">
                        <div class="bg-emerald-100 text-emerald-700 rounded-full w-6 h-6 flex items-center justify-center font-bold text-xs shrink-0">3</div>
                        <p class="text-sm text-gray-600">透過<b>「排行榜」</b>即時追蹤當日戰況，所有數據與 Android 版同步。</p>
                    </div>
                </div>
                <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                    <p class="text-xs text-amber-800 leading-relaxed">
                        💡 <b>溫馨提醒：</b>若您是球隊管理員，請進入「球隊管理」分頁進行賽事建立與成員審核。
                    </p>
                </div>
            </div>
        `;
    }

    // --- 頁面模組 ---
    async function renderEvents() {
        document.getElementById('header-title').innerText = "賽事行程";
        const container = document.getElementById('page-container');
        container.innerHTML = `
            <div id="event-loading" class="flex flex-col items-center py-20 text-gray-400">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-gray-300 mb-2"></div>
                <p class="text-xs">同步行程中...</p>
            </div>
            <div id="event-list" class="space-y-4"></div>
        `;

        await fetchTournaments();
    }

    async function fetchTournaments() {
        if (!state.activeTeam) return;
        try {
            // 1. 撈取目前球隊的球賽
            const { data: events, error } = await supabaseClient
                .from('events')
                .select('*')
                .eq('team_id', state.activeTeam.id)
                .order('date', { ascending: false });

            if (error) throw error;

            // 2. 獲取我在該球隊的 memberId
            const memberId = state.myMemberId;

            const { data: myRegs } = await supabaseClient
                .from('event_registrations')
                .select('event_id')
                .eq('team_member_id', memberId);

            const registeredIds = new Set(myRegs?.map(r => r.event_id) || []);

            const listContainer = document.getElementById('event-list');
            document.getElementById('event-loading').classList.add('hidden');
            listContainer.innerHTML = '';

            if (!events || events.length === 0) {
                listContainer.innerHTML = `<div class='text-center py-20 text-gray-400'>目前無任何排定賽事</div>`;
                return;
            }

            events.forEach(event => {
                const isRegistered = registeredIds.has(event.id);
                const isStarted = event.registration_status === 'started';
                const isClosed = event.registration_status === 'closed';

                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl p-5 shadow-sm border ${isStarted ? 'border-emerald-500 ring-2 ring-emerald-500/20' : 'border-gray-100'} flex flex-col space-y-4`;

                const ruleName = {
                    'Stroke_Play': '一般賽 (Stroke)',
                    'Match_Play': '分組對抗 (Match)',
                    'New_Peoria': '新貝利亞 (Peoria)',
                    'New_New_Peoria': '新新貝利亞'
                }[event.handicap_rule] || event.handicap_rule;

                let adminActions = '';
                if (isAdmin()) {
                    adminActions = `
                        <div class="border-t border-dashed border-gray-100 pt-3 mt-1 space-y-2">
                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">管理員專用</p>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="toggleEventStatus('${event.id}', '${event.registration_status}')" class="py-2 ${isStarted ? 'bg-rose-500' : 'bg-emerald-600'} text-white rounded-lg text-[11px] font-bold">
                                    ${isStarted ? '結束球賽' : '開始球賽'}
                                </button>
                                <button onclick="onNavigateToCreateEvent('${state.activeTeam.id}', '${event.id}')" class="py-2 bg-gray-100 text-gray-600 rounded-lg text-[11px] font-bold">變更資訊</button>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-900 text-lg leading-tight">${event.title}</h3>
                            <div class="flex flex-wrap items-center text-gray-500 text-[11px] mt-1 gap-x-3 gap-y-1">
                                <span class="flex items-center">📅 ${event.date.replace(/-/g, '.')}</span>
                                <span class="flex items-center">📍 ${event.location}</span>
                            </div>
                        </div>
                        <span class="shrink-0 px-2 py-1 rounded-md text-[10px] font-bold ${isStarted ? 'bg-amber-100 text-amber-700' : isClosed ? 'bg-gray-100 text-gray-400' : isRegistered ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-50 text-blue-600'}">
                            ${isStarted ? '進行中' : isClosed ? '已結賽' : isRegistered ? '已報名' : '開放報名'}
                        </span>
                    </div>

                    <div class="grid grid-cols-2 gap-2 text-[11px] text-gray-500 bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <div>開球：<span class="text-gray-900 font-medium">${event.start_time || '未指定'}</span></div>
                        <div>賽制：<span class="text-gray-900 font-medium">${ruleName}</span></div>
                    </div>

                    <div class="flex flex-col space-y-2">
                        ${!isClosed ? `
                            <div class="grid grid-cols-2 gap-2">
                                ${isRegistered
                                    ? `<button onclick="cancelReg('${event.id}', '${memberId}')" class="py-3 bg-white border border-rose-200 text-rose-500 rounded-xl font-bold text-sm">取消報名</button>`
                                    : `<button onclick="doReg('${event.id}', '${memberId}')" class="py-3 bg-[#04432C] text-white rounded-xl font-bold text-sm shadow-md">我要報名</button>`
                                }

    async function copyParticipantsToClipboard(eventId) {
        try {
            const { data: event } = await supabaseClient.from('events').select('*').eq('id', eventId).single();
            const { data: regs } = await supabaseClient.from('event_registrations').select('*, team_members(users(real_name))').eq('event_id', eventId);

    async function doGuestReg(eventId) {
        const name = document.getElementById('guest-name').value;
        const hcValue = document.getElementById('guest-hc').value;
        const hc = parseFloat(hcValue) || 36.0;
        if (!name) return alert("請輸入姓名");

        closeModal();
        showLoading("正在處理來賓報名...");

        try {
            // 1. 獲取球隊資訊與限制
            const { data: event } = await supabaseClient.from('events').select('team_id').eq('id', eventId).single();
            const teamId = event.team_id;
            const { data: team } = await supabaseClient.from('teams').select('*').eq('id', teamId).single();

            // 2. 檢查是否已有同名來賓
            const { data: existingGuests } = await supabaseClient
                .from('team_members')
                .select('*, users(*)')
                .eq('team_id', teamId)
                .eq('role', 'guest');

            let finalMemberId;
            const found = existingGuests?.find(g => g.users.real_name === name);

            if (found) {
                finalMemberId = found.id;
            } else {
                // 3. 檢查人數上限
                const { count } = await supabaseClient
                    .from('team_members')
                    .select('*', { count: 'exact', head: true })
                    .eq('team_id', teamId);

                if (count >= team.member_limit) {
                    throw new Error(`球隊人數已達上限 (${team.member_limit}人)`);
                }

                // 4. 建立虛擬 User
                const { data: newUser, error: uErr } = await supabaseClient.from('users').insert([{
                    line_uid: `GUEST_${Date.now()}`,
                    real_name: name,
                    initial_handicap: hc
                }]).select().single();
                if (uErr) throw uErr;

                // 5. 建立 TeamMember
                const { data: newMember, error: mErr } = await supabaseClient.from('team_members').insert([{
                    team_id: teamId,
                    user_id: newUser.id,
                    role: 'guest',
                    current_team_handicap: hc,
                    sponsor_member_id: state.myMemberId
                }]).select().single();
                if (mErr) throw mErr;
                finalMemberId = newMember.id;
            }

            // 6. 執行報名
            const { error: rErr } = await supabaseClient.from('event_registrations').insert([{
                event_id: eventId,
                team_member_id: finalMemberId,
                status: '已報名'
            }]);

            if (rErr) {
                if (rErr.code === '23505') throw new Error("該來賓已經報名過了");
                throw rErr;
            }

            alert(`成功幫來賓 ${name} 報名！`);
            hideLoading();
            renderEvents();
        } catch (err) {
            alert("來賓報名失敗：" + err.message);
            hideLoading();
        }
    }

    async function showVotingDialog(eventId) {
        let selectedHoles = new Set();

        // 嘗試讀取現有投票
        const { data: existing } = await supabaseClient
            .from('new_peoria_votes')
            .select('*')
            .eq('event_id', eventId)
            .eq('team_member_id', state.myMemberId)
            .maybeSingle();

        if (existing) {
            selectedHoles = new Set(existing.voted_holes);
        }

        const renderHoles = () => {
            let html = '';
            for(let i=1; i<=18; i++) {
                const isSelected = selectedHoles.has(i);
                html += `
                    <div onclick="toggleVoteHole(${i})" id="vote-hole-${i}"
                         class="w-10 h-10 flex items-center justify-center rounded-xl border-2 transition-all cursor-pointer font-black text-xs
                                ${isSelected ? 'bg-[#04432C] border-[#04432C] text-white' : 'bg-gray-50 border-gray-100 text-gray-400'}">
                        ${i}
                    </div>
                `;
            }
            return html;
        };

        window.toggleVoteHole = (hole) => {
            if (selectedHoles.has(hole)) {
                selectedHoles.delete(hole);
            } else {
                if (selectedHoles.size >= 6) return alert("最多只能選擇 6 個洞");
                selectedHoles.add(hole);
            }
            // 局部刷新 UI
            document.getElementById('vote-grid').innerHTML = renderHoles();
            document.getElementById('vote-count').innerText = selectedHoles.size;
            document.getElementById('submit-vote-btn').disabled = selectedHoles.size !== 6;
        };

        showModal(`
            <div class="p-6">
                <h3 class="font-black text-xl text-[#04432C] mb-2 leading-tight">新新貝利亞<br>隱藏洞投票</h3>
                <p class="text-[10px] text-gray-400 mb-6 leading-relaxed uppercase tracking-wider">Please select 6 hidden holes</p>

                <div id="vote-grid" class="grid grid-cols-6 gap-2 mb-6">
                    ${renderHoles()}
                </div>

                <div class="flex justify-between items-center mb-6 px-1">
                    <span class="text-xs text-gray-400 font-bold">目前已選: <span id="vote-count" class="font-black text-[#04432C]">${selectedHoles.size}</span>/6</span>
                </div>

                <div class="flex space-x-3">
                    <button onclick="closeModal()" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold text-sm">取消</button>
                    <button id="submit-vote-btn" ${selectedHoles.size === 6 ? '' : 'disabled'}
                            onclick="submitVotes('${eventId}', Array.from(selectedHoles))"
                            class="flex-2 py-4 bg-[#04432C] text-white rounded-2xl font-bold shadow-lg disabled:opacity-30 text-sm">
                        確認投票
                    </button>
                </div>
            </div>
        `);
    }

    // --- 計分模組 ---
    async function startScoring(eventId) {
        showLoading("正在載入計分板...");
        try {
            const event = await supabaseClient.from('events').select('*').eq('id', eventId).maybeSingle();
            state.scoring.eventObj = event.data;
            state.scoring.eventId = eventId;
            state.scoring.isMatchPlay = event.data.handicap_rule === "Match_Play";
            state.scoring.eventPars = event.data.pars || Array(18).fill(4);

            // 獲取目前用戶所在的組別
            const { data: myMember } = await supabaseClient.from('team_members').select('id').eq('user_id', state.dbUser.id).maybeSingle();
            const { data: groupMember } = await supabaseClient.from('event_group_members').select('group_id').eq('team_member_id', myMember.id).maybeSingle();

            if (!groupMember) {
                alert("您尚未被分配到此賽事的組別中，無法計分。");
                hideLoading();
                return;
            }
            state.scoring.groupId = groupMember.group_id;

            // 獲取同組組員
            const { data: members } = await supabaseClient.from('event_group_members').select('*, team_members(*, users(*))').eq('group_id', state.scoring.groupId);
            state.scoring.players = members.map(m => m.team_members);

            // [任務4新增] 對抗賽對手偵測邏輯
            state.scoring.opponentPlayers = [];
            if (state.scoring.isMatchPlay) {
                const { data: pairings } = await supabaseClient.from('match_pairings').select('*').eq('event_id', eventId);
                const pairing = pairings?.find(p => p.group_a_id === state.scoring.groupId || p.group_b_id === state.scoring.groupId);
                if (pairing) {
                    const opponentGroupId = pairing.group_a_id === state.scoring.groupId ? pairing.group_b_id : pairing.group_a_id;
                    const { data: oppMembers } = await supabaseClient.from('event_group_members').select('*, team_members(*, users(*))').eq('group_id', opponentGroupId);
                    state.scoring.opponentPlayers = oppMembers.map(m => m.team_members);
                }
            }

            // 初始化成績 Map (包含隊友與對手)
            state.scoring.playerScores = {};
            [...state.scoring.players, ...state.scoring.opponentPlayers].forEach(p => {
                state.scoring.playerScores[p.id] = Array(18).fill(0);
            });

            // 載入現有成績
            const { data: scores } = await supabaseClient.from('scores').select('*').eq('event_id', eventId);
            scores.forEach(s => {
                if (state.scoring.playerScores[s.team_member_id]) {
                    state.scoring.playerScores[s.team_member_id] = [...s.hole_scores];
                }
            });

            // [自動跳洞邏輯] 模仿 App 版：定位到第一個未填寫完成的洞
            const firstEmptyHole = (Array.from({length: 18}, (_, i) => i + 1)).find(h => {
                // 對抗賽：只要有人代表填過就算填了
                // 一般賽：任何一個隊員沒填都算沒填
                if (state.scoring.isMatchPlay) {
                    return state.scoring.players.every(p => state.scoring.playerScores[p.id][h - 1] === 0);
                } else {
                    return state.scoring.players.some(p => state.scoring.playerScores[p.id][h - 1] === 0);
                }
            }) || 1;
            state.scoring.currentHole = firstEmptyHole;

            renderScoringUI();
            hideLoading();
        } catch (err) {
            console.error("Start scoring failed", err);
            alert("計分板載入失敗");
            hideLoading();
        }
    }

    function renderScoringUI() {
        const par = state.scoring.eventPars[state.scoring.currentHole - 1];
        document.getElementById('header-title').innerText = `第 ${state.scoring.currentHole} 洞 (Par ${par})`;

        // 隱藏 Bottom Nav
        document.getElementById('bottom-nav').classList.add('hidden');

        // 修改 Header 右側為 Save 按鈕
        const headerRight = document.getElementById('header-right');
        headerRight.innerHTML = `
            <button onclick="saveScores()" class="bg-white text-[#04432C] px-4 py-1.5 rounded-full font-black text-xs shadow-sm active:scale-95">SAVE</button>
        `;

        const container = document.getElementById('page-container');

        // [對抗賽優化] 即時戰況與成就分預覽
        let matchHeaderHtml = '';
        if (state.scoring.isMatchPlay) {
            const myScores = state.scoring.players.map(p => state.scoring.playerScores[p.id][state.scoring.currentHole - 1]);
            const myBest = Math.min(...myScores.filter(s => s > 0));

            const oppScores = state.scoring.opponentPlayers.map(p => state.scoring.playerScores[p.id][state.scoring.currentHole - 1]);
            const oppBest = Math.min(...oppScores.filter(s => s > 0));

            // 計算成就點數 (對其 App 版邏輯)
            let myBonus = 0;
            state.scoring.players.forEach(p => {
                const s = state.scoring.playerScores[p.id][state.scoring.currentHole - 1];
                if (s > 0) {
                    if (s === 1 || s <= par - 2) myBonus += 1.0;
                    else if (s === par - 1) myBonus += 0.5;
                }
            });

            matchHeaderHtml = `
                <div class="bg-emerald-900 text-white p-4 rounded-2xl shadow-inner mb-4 border border-emerald-700/50">
                    <div class="flex justify-between items-center text-[10px] opacity-60 uppercase tracking-widest mb-3">
                        <span>MATCH PLAY STATUS</span>
                        <span class="bg-emerald-700 px-2 py-0.5 rounded-full text-white">LIVE</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="border-r border-emerald-800 pr-2">
                            <p class="text-[10px] opacity-70">本組最佳</p>
                            <p class="text-3xl font-black">${myBest === Infinity ? '-' : myBest}</p>
                            ${myBonus > 0 ? `<p class="text-[10px] text-amber-400 font-bold mt-1">⛳ 成就點數: +${myBonus}</p>` : ''}
                        </div>
                        <div class="pl-2">
                            <p class="text-[10px] opacity-70">對手最佳</p>
                            <p class="text-3xl font-black text-emerald-400/80">${oppBest === Infinity ? '-' : oppBest}</p>
                            <p class="text-[9px] opacity-40 mt-1">完整勝負分由後台結算</p>
                        </div>
                    </div>
                </div>
            `;
        }

        container.innerHTML = `
            ${matchHeaderHtml}
            <div class="flex justify-between items-center mb-6">
                <button onclick="changeHole(-1)" class="w-12 h-12 bg-white rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center font-bold active:bg-gray-50">◀</button>
                <div class="flex space-x-2">
                    <button onclick="renderLeaderboard()" class="bg-amber-500 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md active:scale-95">賽事排行</button>
                    <button onclick="exitScoring()" class="bg-gray-200 text-gray-600 px-4 py-2 rounded-xl text-xs font-bold active:scale-95">退出</button>
                </div>
                <button onclick="changeHole(1)" class="w-12 h-12 bg-white rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center font-bold active:bg-gray-50">▶</button>
            </div>

            <div class="text-[10px] text-gray-400 font-black uppercase mb-3 ml-1 tracking-widest">本組球員 (Score Entry)</div>
            <div id="player-scoring-list" class="space-y-3"></div>

            ${state.scoring.opponentPlayers.length > 0 ? `
                <div class="text-[10px] text-gray-400 font-black uppercase mt-8 mb-3 ml-1 tracking-widest">對手戰況 (Opponents)</div>
                <div id="opponent-scoring-list" class="space-y-2"></div>
            ` : ''}
        `;

        const list = document.getElementById('player-scoring-list');
        state.scoring.players.forEach((player, index) => {
            const currentScore = state.scoring.playerScores[player.id][state.scoring.currentHole - 1];
            const isLocked = state.scoring.isMatchPlay && index > 0;

            const card = document.createElement('div');
            card.className = `bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center justify-between ${isLocked ? 'opacity-60 bg-gray-50' : ''}`;
            card.innerHTML = `
                <div class="flex-1">
                    <h4 class="font-bold text-gray-900 text-lg leading-tight">${player.users.real_name}</h4>
                    <div class="flex items-center space-x-2 mt-1">
                        <span class="text-[10px] text-gray-400">總桿: ${state.scoring.playerScores[player.id].reduce((a,b)=>a+b, 0)}</span>
                        ${isLocked ? '<span class="text-[9px] bg-gray-200 text-gray-500 px-1.5 rounded">組員代表計分</span>' : ''}
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="${isLocked ? '' : `updateHoleScore('${player.id}', -1)`}" class="w-12 h-12 rounded-xl bg-gray-50 border border-gray-200 flex items-center justify-center text-2xl font-light text-gray-400 ${isLocked ? 'cursor-not-allowed' : 'active:bg-emerald-50 active:text-emerald-700'}">–</button>

    function updateHoleScore(memberId, delta) {
        let val = state.scoring.playerScores[memberId][state.scoring.currentHole - 1];
        if (val === 0) val = state.scoring.eventPars[state.scoring.currentHole-1];
        val += delta;
        if (val < 1) val = 1;
        state.scoring.playerScores[memberId][state.scoring.currentHole - 1] = val;
        renderScoringUI();
    }

    function changeHole(delta) {
        state.scoring.currentHole += delta;
        if (state.scoring.currentHole > 18) state.scoring.currentHole = 1;
        if (state.scoring.currentHole < 1) state.scoring.currentHole = 18;
        renderScoringUI();
    }

    async function renderLeaderboard(targetEventId = null) {
        const eventId = targetEventId || state.scoring.eventId || (state.activeTeam ? await getLatestEventId() : null);
        if (!eventId) {
            document.getElementById('page-container').innerHTML = `<div class='text-center py-20 text-gray-400'>目前無進行中的賽事排行榜</div>`;
            return;
        }

        document.getElementById('header-title').innerText = "即時成績";
        showLoading("正在從雲端計算排名...");

        try {
            const { data: event } = await supabaseClient.from('events').select('*').eq('id', eventId).single();
            const { data: scores, error } = await supabaseClient
                .from('scores')
                .select('*, team_members(users(*))')
                .eq('event_id', eventId);

            if (error) throw error;

            hideLoading();
            const container = document.getElementById('page-container');
            container.innerHTML = `
                <div class="bg-[#04432C] text-white p-5 rounded-3xl shadow-lg mb-6 relative overflow-hidden">
                    <div class="relative z-10">
                        <h4 class="text-[10px] opacity-70 uppercase tracking-widest mb-1">Live Leaderboard</h4>
                        <p class="text-lg font-black">${event.title}</p>
                        <p class="text-[10px] opacity-50 mt-1 uppercase tracking-tighter">🏆 ${event.handicap_rule.replace(/_/g, ' ')}</p>
                    </div>
                    <div class="absolute -right-4 -bottom-4 text-white/5 text-6xl font-black italic">RANK</div>
                </div>
                <div id="leaderboard-list" class="space-y-3"></div>
                <button onclick="switchTab(0)" class="w-full py-6 text-gray-400 text-xs font-bold uppercase tracking-widest">返回賽事列表</button>
            `;

            const list = document.getElementById('leaderboard-list');
            if (!scores || scores.length === 0) {
                list.innerHTML = `<div class='text-center py-20 bg-white rounded-3xl border border-dashed border-gray-200 text-gray-300'>尚未有球員繳交成績</div>`;
                return;
            }

            // [對齊 App 版專業排序邏輯]
            const eventPars = event.pars || Array(18).fill(4);
            const processed = scores.map(s => {
                const holeScores = s.hole_scores || [];
                const holesPlayed = holeScores.filter(h => h > 0).length;
                const isFinished = holesPlayed === 18;

                // 計算 To Par
                let toPar = 0;
                holeScores.forEach((score, i) => {
                    if (score > 0) toPar += (score - eventPars[i]);
                });

                return { ...s, holesPlayed, isFinished, toPar };
            });

            // 排序邏輯：
            // 1. 完賽者優先
            // 2. 完賽者依 Gross Score (低到高)
            // 3. 未完賽者依 To Par (低到高)
            const sorted = processed.sort((a, b) => {
                if (a.isFinished && b.isFinished) return a.gross_score - b.gross_score;
                if (a.isFinished && !b.isFinished) return -1;
                if (!a.isFinished && b.isFinished) return 1;
                return a.toPar - b.toPar;
            });

            sorted.forEach((s, index) => {
                const toParText = s.toPar === 0 ? "E" : (s.toPar > 0 ? `+${s.toPar}` : s.toPar);
                const toParClass = s.toPar < 0 ? "text-amber-500" : (s.toPar > 0 ? "text-rose-500" : "text-emerald-700");

                const row = document.createElement('div');
                row.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between active:scale-95 transition-all";
                row.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <span class="w-8 h-8 flex items-center justify-center rounded-full ${index < 3 ? 'bg-amber-100 text-amber-700 font-black' : 'text-gray-300 font-bold'} text-xs">
                            ${index + 1}
                        </span>
                        <div>
                            <p class="font-black text-gray-900 leading-tight">${s.team_members.users.real_name}</p>
                            <p class="text-[10px] text-gray-400 mt-0.5">已完賽 ${s.holesPlayed} 洞 ${s.isFinished ? '(F)' : ''}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-6">
                        <div class="text-right">
                            <p class="text-xs font-black ${toParClass}">${toParText}</p>
                            <p class="text-[8px] text-gray-300 uppercase font-bold tracking-tighter">To Par</p>
                        </div>
                        <div class="text-right border-l border-gray-100 pl-4">
                            <p class="text-xl font-black text-[#04432C]">${s.gross_score}</p>
                            <p class="text-[8px] text-gray-400 uppercase font-bold tracking-tighter">Gross</p>
                        </div>
                    </div>
                `;
                list.appendChild(row);
            });
        } catch (err) {
            console.error(err);
            alert("載入排行榜失敗");
            hideLoading();
        }
    }

            .order('date', { ascending: false })
            .limit(1)
            .maybeSingle();
        return data?.id;
    }

    async function saveProfile(isEdit) {
        const name = document.getElementById('setup-name').value;
        const hc = parseFloat(document.getElementById('setup-handicap').value);

        if (!name) { alert("請填寫姓名"); return; }

        showLoading("正在更新球員檔案...");

        try {
            if (isEdit) {
                const { error } = await supabaseClient.from('users').update({ real_name: name, initial_handicap: hc }).eq('id', state.dbUser.id);
                if (error) throw error;
            } else {
                const { data, error } = await supabaseClient.from('users').insert([{
                    line_uid: state.userProfile.userId,
                    line_display_name: state.userProfile.displayName,
                    real_name: name,
                    initial_handicap: hc
                }]).select().single();
                if (error) throw error;
                state.dbUser = data;
            }

            alert("更新成功！");
            location.reload(); // 重新整理以獲取最新狀態
        } catch (err) {
            alert("儲存失敗：" + err.message);
            hideLoading();
        }
    }

    // --- 賽事管理模組 ---
    function renderCreateEvent(teamId, editEvent = null) {
        document.getElementById('header-title').innerText = editEvent ? "編輯賽事" : "建立新賽事";
        const container = document.getElementById('page-container');

        let parInputsHtml = '';
        const pars = editEvent?.pars || Array(18).fill(4);
        for (let i = 1; i <= 18; i++) {
            parInputsHtml += `
                <div class="flex flex-col items-center">
                    <span class="text-[9px] text-gray-400 mb-1">${i}</span>
                    <input type="number" id="par-${i}" value="${pars[i-1]}" class="w-10 h-10 border border-gray-200 rounded-lg text-center text-sm focus:ring-1 focus:ring-[#133B2B]">
                </div>
            `;
        }

        container.innerHTML = `
            <div class="bg-white p-6 rounded-3xl shadow-sm space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">賽事名稱</label>
                    <input type="text" id="event-title" value="${editEvent?.title || ''}" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]" placeholder="例如：六月例行賽">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">比賽地點 (球場)</label>
                    <input type="text" id="event-location" value="${editEvent?.location || ''}" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]" placeholder="例如：大溪高爾夫球場">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">日期</label>
                        <input type="date" id="event-date" value="${editEvent?.date || ''}" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">開球時間</label>
                        <input type="time" id="event-time" value="${editEvent?.start_time || '06:30'}" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">賽制規則</label>
                    <select id="event-rule" class="w-full bg-gray-50 border-none rounded-xl p-4 focus:ring-2 focus:ring-[#133B2B]">
                        <option value="Stroke_Play" ${editEvent?.handicap_rule === 'Stroke_Play' ? 'selected' : ''}>一般賽 (Stroke Play)</option>
                        <option value="Match_Play" ${editEvent?.handicap_rule === 'Match_Play' ? 'selected' : ''}>對抗賽 (Match Play)</option>
                        <option value="New_Peoria" ${editEvent?.handicap_rule === 'New_Peoria' ? 'selected' : ''}>新貝利亞 (New Peoria)</option>
                        <option value="New_New_Peoria" ${editEvent?.handicap_rule === 'New_New_Peoria' ? 'selected' : ''}>新新貝利亞</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">18 洞標準桿 (Pars)</label>
                    <div class="grid grid-cols-6 gap-2 mt-2 bg-gray-50 p-4 rounded-2xl">
                        ${parInputsHtml}
                    </div>
                </div>

                <div class="pt-4 flex space-x-3">
                    <button onclick="switchTab(0)" class="flex-1 py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold">取消</button>
                    <button onclick="saveEvent('${teamId}', ${editEvent ? `'${editEvent.id}'` : 'null'})" class="flex-2 py-4 bg-[#133B2B] text-white rounded-2xl font-bold shadow-lg transition-all active:scale-95">
                        ${editEvent ? '儲存變更' : '建立並發布'}
                    </button>
                </div>
            </div>
        `;
    }

    async function saveEvent(teamId, eventId = null) {
        const title = document.getElementById('event-title').value;
        const location = document.getElementById('event-location').value;
        const date = document.getElementById('event-date').value;
        const startTime = document.getElementById('event-time').value;
        const rule = document.getElementById('event-rule').value;

        if (!title || !location || !date) { alert("請填寫完整賽事資訊"); return; }

        const pars = [];
        for (let i = 1; i <= 18; i++) {
            pars.push(parseInt(document.getElementById(`par-${i}`).value) || 4);
        }

        showLoading(eventId ? "正在儲存變更..." : "正在建立賽事...");
        try {
            const eventData = {
                team_id: teamId,
                title: title,
                location: location,
                date: date,
                start_time: startTime,
                handicap_rule: rule,
                pars: pars
            };

            if (eventId) {
                const { error } = await supabaseClient.from('events').update(eventData).eq('id', eventId);
                if (error) throw error;
                alert("賽事更新成功！");
            } else {
                eventData.registration_status = 'open';
                const { error } = await supabaseClient.from('events').insert([eventData]);
                if (error) throw error;
                alert("賽事建立成功！");
            }

            switchTab(0); // 跳轉回賽事清單
        } catch (err) {
            alert("儲存失敗：" + err.message);
            hideLoading();
        }
    }

    // [第二階段新增] 管理員動作
    async function toggleEventStatus(eventId, currentStatus) {
        const nextStatus = currentStatus === 'started' ? 'closed' : 'started';
        const msg = currentStatus === 'started' ? "確定要結束球賽並封存成績嗎？" : "確定要開始球賽嗎？開始後球員將可輸入成績。";
        if (!confirm(msg)) return;

        try {
            const { error } = await supabaseClient.from('events').update({ registration_status: nextStatus }).eq('id', eventId);
            if (error) throw error;
            renderEvents();
        } catch (err) { alert("更新失敗: " + err.message); }
    }

    async function archiveEvent(eventId) {
        if (!confirm("確定要將此賽事從清單移除嗎？(不會刪除歷史紀錄)")) return;
        try {
            const { error } = await supabaseClient.from('events').update({ is_archived_in_list: true }).eq('id', eventId);
            if (error) throw error;
            renderEvents();
        } catch (err) { alert("操作失敗: " + err.message); }
    }

    // [第二階段新增] 成員管理頁面
    async function renderMemberManagement(teamId) {
        document.getElementById('header-title').innerText = "成員管理";
        showLoading("正在載入成員清單...");

        try {
            const { data: members } = await supabaseClient
                .from('team_members')
                .select('*, users(*)')
                .eq('team_id', teamId)
                .order('role', { ascending: true });

            hideLoading();
            const container = document.getElementById('page-container');
            container.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <button onclick="switchTab(3)" class="text-sm text-emerald-700 font-bold">◀ 返回球隊</button>
                    <span class="text-xs text-gray-400">共 ${members?.length || 0} 位成員</span>
                </div>
                <div id="member-list" class="space-y-3"></div>
            `;

            const list = document.getElementById('member-list');
            members.forEach(m => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between";
                card.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-700 font-bold">
                            ${m.users.real_name.charAt(0)}
                        </div>
                        <div>
                            <p class="font-bold text-gray-900">${m.users.real_name}</p>
                            <p class="text-[10px] text-gray-400">${m.role === 'admin' ? '管理者' : '隊員'} | HC: ${m.current_team_handicap}</p>
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="editHandicap('${m.id}', ${m.current_team_handicap})" class="p-2 bg-gray-50 rounded-lg text-[10px] font-bold text-gray-600">改差點</button>
                        ${m.user_id !== state.dbUser.id ? `<button onclick="removeMember('${m.id}')" class="p-2 bg-rose-50 rounded-lg text-[10px] font-bold text-rose-500">移除</button>` : ''}
                    </div>
                `;
                list.appendChild(card);
            });
        } catch (err) { alert("載入失敗"); }
    }

    async function editHandicap(memberId, currentHC) {
        const newHC = prompt("請輸入新的球隊差點：", currentHC);
        if (newHC === null || isNaN(parseFloat(newHC))) return;

        try {
            const { error } = await supabaseClient.from('team_members').update({ current_team_handicap: parseFloat(newHC) }).eq('id', memberId);
            if (error) throw error;
            alert("差點已更新");
            renderMemberManagement(state.activeTeam.id);
        } catch (err) { alert("更新失敗"); }
    }

    async function removeMember(memberId) {
        if (!confirm("確定要將此成員移除嗎？此動作不可撤銷。")) return;
        try {
            const { error } = await supabaseClient.from('team_members').delete().eq('id', memberId);
            if (error) throw error;
            renderMemberManagement(state.activeTeam.id);
        } catch (err) { alert("移除失敗"); }
    }

    // 啟動
    window.addEventListener('load', initApp);
</script>
</body>
</html>
