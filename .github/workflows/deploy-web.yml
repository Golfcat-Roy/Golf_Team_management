name: Deploy to GitHub Pages
on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean :webApp:jsBrowserDistribution --no-daemon --no-configuration-cache --stacktrace -Pkotlin.incremental=false
      - name: Fix font assets for GitHub Pages
        run: |
          # 確保所有檔案權限正確
          chmod -R 755 webApp/build/dist/js/productionExecutable
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: webApp/build/dist/js/productionExecutable
          branch: gh-pages
