<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GolfCat</title>

    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>var vConsole = new window.VConsole();</script>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased">

<div class="max-w-md mx-auto min-h-screen bg-white shadow-md flex flex-col">

    <header class="bg-emerald-800 text-white p-4 text-center font-bold text-lg tracking-wider shadow-sm">
        SuperGolfCat
    </header>

    <main class="flex-1 p-4 space-y-4 overflow-y-auto">

        <div class="border border-slate-200 rounded-xl p-4 bg-white shadow-xs space-y-3">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="font-bold text-slate-800 text-base">321 例行賽 - 2026.06.22</span>
            </div>
            <div class="grid grid-cols-2 gap-y-2 text-sm text-slate-600">
                <div>球場：<span class="font-semibold text-slate-900">321</span></div>
                <div>時間：<span class="font-semibold text-slate-900">06:00</span></div>
                <div>組別：<span class="font-semibold text-slate-900">第 2 組</span></div>
            </div>
            <div class="pt-1">
                <button class="w-full bg-emerald-700 text-white py-2.5 px-4 rounded-lg font-medium shadow-xs active:bg-emerald-800 transition text-sm">
                    查看詳情 / 報名
                </button>
            </div>
        </div>

        <div class="border border-slate-200 rounded-xl p-4 bg-white shadow-xs space-y-3">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="font-bold text-slate-800 text-base">1234 例行賽 - 2026.06.21</span>
            </div>
            <div class="grid grid-cols-2 gap-y-2 text-sm text-slate-600">
                <div>球場：<span class="font-semibold text-slate-900">1234</span></div>
                <div>時間：<span class="font-semibold text-slate-900">06:00</span></div>
                <div>組別：<span class="font-semibold text-slate-900">第 2 組</span></div>
            </div>

            <div class="grid grid-cols-2 gap-2 pt-1">
                <button class="bg-rose-600 text-white py-2 px-4 rounded-lg font-medium shadow-xs active:bg-rose-700 transition text-sm">
                    取消報名
                </button>
                <button class="bg-amber-500 text-white py-2 px-4 rounded-lg font-medium shadow-xs active:bg-amber-600 transition text-sm">
                    修改資料
                </button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button class="bg-emerald-700 text-white py-2 px-4 rounded-lg font-medium shadow-xs active:bg-emerald-800 transition text-sm">
                    分組名單 (3)
                </button>
                <button class="border border-slate-300 text-slate-700 py-2 px-4 rounded-lg font-medium bg-white active:bg-slate-50 transition text-sm">
                    成績登錄
                </button>
            </div>
        </div>

    </main>
</div>

<script>
    async function initLiff() {
        try {
            // 把這裡更換成你在 LINE Developers 後台申請的 LIFF ID
            await liff.init({ liffId: "2010382913-rCaKoQcE" });

            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                console.log("LIFF 登入成功！用戶姓名:", profile.displayName);
                // 之後可以在這裡用 JavaScript 直接 fetch 你的 Supabase API 拿資料
            }
        } catch (error) {
            console.error("LIFF 初始化失敗:", error);
        }
    }

    window.onload = function() {
        initLiff();
    };
</script>
</body>
</html>
