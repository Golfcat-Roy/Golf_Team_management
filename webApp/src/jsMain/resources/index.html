<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GolfCat - 球隊管理系統 (100% Ported)</title>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #133B2B; --background: #FAFAFA; --secondary: #10B981; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--background); color: #1A1A1A; margin: 0; overflow: hidden; height: 100vh; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #10B981 !important; opacity: 1 !important; }
        .tab-indicator { height: 4px; width: 32px; background-color: #10B981; border-radius: 2px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .btn-active:active { transform: scale(0.96); opacity: 0.9; }
        .avatar-small { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .score-circle { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid #F59E0B; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #B45309; background: #FEF3C7; }
        .score-square { width: 24px; height: 24px; border-radius: 4px; border: 1.5px solid #6B7280; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #374151; background: #F3F4F6; }
        .instruction-step { width: 24px; height: 24px; border-radius: 50%; background: #133B2B; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; flex-shrink: 0; }
    </style>
</head>
<body class="antialiased">
<div id="global-modal" class="modal-overlay"><div class="modal-content" id="modal-body"></div></div>
<div class="max-w-md mx-auto h-screen bg-[#FAFAFA] flex flex-col relative shadow-2xl">
    <header class="bg-[#133B2B] text-white p-4 flex justify-between items-center relative z-[60] shadow-md">
        <div class="flex items-center space-x-2"><div class="w-6 h-7 bg-red-600 rounded-sm flex items-center justify-center text-[10px]">🛡️</div></div>
        <div class="flex items-center cursor-pointer" onclick="toggleTeamMenu()"><span id="header-title" class="font-black text-lg">載入中...</span><span class="ml-1 text-[10px] opacity-70">▼</span></div>
        <div class="flex items-center space-x-3"><img id="user-avatar" src="" class="avatar-small hidden"><span onclick="liff.logout(); location.reload();" class="text-[10px] text-rose-400 font-bold cursor-pointer">登出</span></div>
        <div id="team-menu" class="hidden absolute top-14 left-1/2 -translate-x-1/2 w-64 bg-white text-gray-800 rounded-2xl shadow-2xl border border-gray-100 py-2 overflow-hidden"><div id="team-list-container"></div></div>
    </header>
    <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar pb-20 bg-[#FAFAFA]">
        <div id="loading-screen" class="flex flex-col items-center justify-center h-full space-y-4"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#133B2B]"></div><p class="text-gray-500 text-sm">正在初始化引擎...</p></div>
        <div id="page-container" class="hidden p-4 space-y-4"></div>
    </main>
    <nav id="bottom-nav" class="absolute bottom-0 left-0 right-0 bg-[#133B2B] h-16 flex items-center justify-around text-white shadow-2xl z-50 px-2 border-t border-white/5">
        <div onclick="switchTab(0)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60"><div class="tab-indicator hidden"></div><span class="text-[9px] font-bold">賽事列表</span></div>
        <div onclick="switchTab(1)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60"><div class="tab-indicator hidden"></div><span class="text-[9px] font-bold">排行榜</span></div>
        <div onclick="switchTab(2)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60"><div class="tab-indicator hidden"></div><span class="text-[9px] font-bold">歷史成績</span></div>
        <div onclick="switchTab(3)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60"><div class="tab-indicator hidden"></div><span class="text-[9px] font-bold">球隊管理</span></div>
        <div onclick="switchTab(4)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60"><div class="tab-indicator hidden"></div><span class="text-[9px] font-bold">使用說明</span></div>
    </nav>
</div>
<script>
    // --- 1. [models/] & 全域狀態 ---
    let appState = {
        currentUser: null, activeTeam: null, myTeams: [], currentTab: 0,
        scoring: { eventId: null, groupId: null, players: [], playerScores: {}, eventPars: Array(18).fill(4), currentHole: 1, isMatchPlay: false },
        grouping: { eventId: null, side: null, participants: [], draftGroups: [], hasChanges: false }
    };

    // --- 2. [SupabaseClient.kt] ---
    const SUPABASE_URL = "https://qyhtllcncbnzykzbvlhu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5aHRsbGNuY2JuenlremJ2bGh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDUxMTYsImV4cCI6MjA5NTIyMTExNn0.T97-3knhVMg4-Ec6XSjHKI8xrDrdYMJryklcyQkXTJc";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const vConsole = new VConsole();

    // --- 3. [AuthManager.kt] & [App.kt] 根導覽 ---
    async function initApp() {
        try {
            await liff.init({ liffId: "2010382913-rCaKoQcE" });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            await syncUserLogic(profile);
        } catch (err) { console.error(err); }
    }

    async function syncUserLogic(liffProfile) {
        const { data: user } = await supabaseClient.from('users').select('*').eq('line_uid', liffProfile.userId).maybeSingle();
        if (!user || user.real_name === "User") { renderProfileSetup(); return; }
        appState.currentUser = user;
        const { data: members } = await supabaseClient.from('team_members').select('*, teams(*)').eq('user_id', user.id);
        if (!members || members.length === 0) { renderProfileSetup(); return; }
        appState.myTeams = members.map(m => m.teams).filter(t => t !== null);
        appState.activeTeam = appState.myTeams[0];
        await refreshRole();
        hideLoading(liffProfile.pictureUrl);
        switchTab(0);
    }

    async function refreshRole() {
        const { data: m } = await supabaseClient.from('team_members').select('*').eq('user_id',appState.currentUser.id).eq('team_id',appState.activeTeam.id).single();
        appState.currentUser.role = m.role; appState.currentUser.memberId = m.id;
    }

    function switchTab(index) {
        if (!appState.activeTeam && index !== 3 && index !== 4) index = 3;
        appState.currentTab = index; updateTabUI(index);
        const container = document.getElementById('page-container');
        container.innerHTML = ''; container.className = "p-4 space-y-4 fade-in";
        document.getElementById('header-title').innerText = appState.activeTeam?.name || "我的球隊";
        document.getElementById('bottom-nav').classList.remove('hidden');
        switch(index) {
            case 0: renderEvents(); break;
            case 1: renderLeaderboard(); break;
            case 2: renderHistory(); break;
            case 3: renderTeams(); break;
            case 4: renderInstructions(); break;
        }
    }

    // --- 4. [TeamRepository.kt] & [EventListTab.kt] ---
    async function renderEvents() {
        showTabLoading();
        try {
            const { data: events } = await supabaseClient.from('events').select('*').eq('team_id', appState.activeTeam.id).eq('is_archived_in_list', false).order('date', { ascending: false });
            const { data: myRegs } = await supabaseClient.from('event_registrations').select('event_id').eq('team_member_id', appState.currentUser.memberId);
            const regIds = new Set(myRegs?.map(r => r.event_id) || []);
            const { data: allRegs } = await supabaseClient.from('event_registrations').select('event_id');
            const counts = {}; allRegs?.forEach(r => counts[r.event_id] = (counts[r.event_id] || 0) + 1);

            const container = document.getElementById('page-container');
            container.innerHTML = events.map(e => {
                const isReg = regIds.has(e.id); const isStarted = e.registration_status === 'started'; const isClosed = e.registration_status === 'closed';
                const isAdmin = ['admin','president','vice_president'].includes(appState.currentUser.role);
                return `<div class="bg-white p-5 rounded-[32px] shadow-sm border border-gray-100 mb-4 transition-all ${isStarted?'border-[#133B2B] shadow-md':''}">
                    <div class="flex justify-between items-start mb-4"><div><h3 class="font-black text-gray-900 text-lg">${e.title}</h3><p class="text-[10px] text-gray-400 font-bold uppercase mt-1">${e.date.replace(/-/g, '.')}</p></div><span class="text-[9px] font-black px-2 py-1 rounded-lg ${isClosed?'bg-gray-100 text-gray-400':(isStarted?'bg-emerald-100 text-emerald-700':'bg-blue-50 text-blue-600')}">${isClosed?'已結賽':(isStarted?'進行中':'報名中')}</span></div>
                    <div class="grid grid-cols-2 gap-2 text-xs text-gray-500 mb-6 bg-gray-50 p-4 rounded-3xl"><div>地點: <span class="font-bold text-gray-900">${e.location}</span></div><div>時間: <span class="font-bold text-gray-900">${e.start_time || '未定'}</span></div></div>
                    <div class="flex flex-col space-y-2">
                        ${!isClosed ? `
                            <div class="grid grid-cols-2 gap-2">
                                ${isReg ? `<button onclick="cancelReg('${e.id}')" class="py-3.5 bg-rose-500 text-white rounded-2xl font-black text-xs btn-active shadow-lg">取消報名</button>` : `<button onclick="doReg('${e.id}')" class="py-3.5 bg-[#133B2B] text-white rounded-2xl font-black text-xs btn-active shadow-lg">我要報名</button>`}
                                <button onclick="showGuestDialog('${e.id}')" class="py-3.5 bg-amber-500 text-white rounded-2xl font-black text-xs btn-active shadow-lg">來賓報名</button>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="showParticipants('${e.id}')" class="py-3 bg-emerald-50 text-emerald-700 rounded-2xl font-bold text-xs">參賽名單 (${counts[e.id]||0})</button>
                                ${isStarted ? `<button onclick="startScoring('${e.id}')" class="py-3 bg-emerald-600 text-white rounded-2xl font-bold text-xs shadow-md">進入計分</button>` : (isAdmin?`<button onclick="renderGrouping('${e.id}')" class="py-3 bg-gray-100 text-gray-700 rounded-2xl font-bold text-xs">分組設定</button>`:`<button class="py-3 bg-gray-50 text-gray-300 rounded-2xl font-bold text-xs">等待開賽</button>`)}
                            </div>
                            ${isAdmin?`<div class="grid grid-cols-2 gap-2 mt-4"><button onclick="duplicateEvent('${e.id}')" class="py-2.5 bg-gray-100 text-gray-400 rounded-xl text-[10px] font-black">複製賽事</button><button onclick="toggleEventStatus('${e.id}', '${e.registration_status}')" class="py-2.5 bg-gray-100 text-gray-400 rounded-xl text-[10px] font-black">${isStarted?'結束球賽':'開始球賽'}</button></div>`:''}`
                        : `<button onclick="renderEventLeaderboard('${e.id}')" class="w-full py-4 bg-gray-800 text-white rounded-2xl font-black text-sm shadow-md">查看最終成績 🏆</button>`}
                    </div>
                </div>`;
            }).join('');
        } catch (err) { diag(`❌ 載入失敗: ${translateError(err)}`); }
    }

    // --- [TeamRepository.kt] 賽事控制邏輯 100% 轉譯 ---
    async function toggleEventStatus(eventId, curStatus) {
        const nextStatus = curStatus === 'started' ? 'closed' : 'started';

        // 邏輯 1: [開賽檢查] (100% 移植自 startEvent)
        if (curStatus === 'open' || !curStatus) {
            diag("執行開賽安全檢查...");
            try {
                const { count: regCount } = await supabaseClient.from('event_registrations').select('*', { count: 'exact', head: true }).eq('event_id', eventId);
                const { data: groups } = await supabaseClient.from('event_groups').select('id').eq('event_id', eventId);
                const groupIds = groups?.map(g => g.id) || [];
                const { count: assignedCount } = await supabaseClient.from('event_group_members').select('*', { count: 'exact', head: true }).in('group_id', groupIds);

                if (regCount > assignedCount) {
                    alert(`❌ 攔截：尚有 ${regCount - assignedCount} 位球員未完成分組。請先完成分組後再開始球賽！`);
                    return;
                }
            } catch (e) { alert("檢查過程發生錯誤"); return; }
        }

        // 邏輯 2: [結賽結算 - 新新貝利亞] (100% 移植自 finishEvent)
        if (curStatus === 'started') {
            const { data: event } = await supabaseClient.from('events').select('*').eq('id', eventId).single();
            if (event.handicap_rule === 'New_New_Peoria') {
                diag("正在計算隱藏洞投票結果...");
                await settleNewNewPeoria(eventId);
            }
        }

        if (confirm(`確認將賽事狀態切換至 ${nextStatus === 'started' ? '【進行中】' : '【已結賽】'}？`)) {
            await supabaseClient.from('events').update({ registration_status: nextStatus }).eq('id', eventId);
            renderEvents();
        }
    }

    async function settleNewNewPeoria(eventId) {
        const { data: votes } = await supabaseClient.from('new_peoria_votes').select('voted_holes').eq('event_id', eventId);
        const counts = Array(19).fill(0);
        votes?.forEach(v => v.voted_holes.forEach(h => counts[h]++));
        // 抓出得票最高的 6 個洞 (對齊 HandicapCalculator 邏輯)
        const hiddenHoles = counts.map((c, i) => ({h:i, c})).slice(1).sort((a,b) => b.c - a.c).slice(0, 6).map(x => x.h).sort((a,b)=>a-b);
        await supabaseClient.from('events').update({ hidden_holes: hiddenHoles }).eq('id', eventId);
    }

    async function duplicateEvent(id) {
        diag("正在執行賽事深拷貝...");
        const { data: e } = await supabaseClient.from('events').select('*').eq('id', id).single();
        const copy = {
            team_id: e.team_id, title: e.title + " (複製)", location: e.location,
            pars: e.pars, handicap_rule: e.handicap_rule, start_time: e.start_time,
            registration_status: 'open', date: new Date().toISOString().split('T')[0]
        };
        await supabaseClient.from('events').insert(copy);
        alert("已成功複製賽事設定！");
        renderEvents();
    }

    async function archiveEvent(id) {
        if (confirm("確定要從首頁清單移除此賽事嗎？(歷史數據將永久保留)")) {
            await supabaseClient.from('events').update({ is_archived_in_list: true }).eq('id', id);
            renderEvents();
        }
    }

    // --- 5. [ScoringScreen.kt] & [HandicapCalculator.kt] ---
    async function startScoring(eventId) {
        showLoading("載入計分板...");
        const { data: event } = await supabaseClient.from('events').select('*').eq('id', eventId).single();
        appState.scoring.eventId = eventId; appState.scoring.eventPars = event.pars; appState.scoring.isMatchPlay = event.handicap_rule==='Match_Play';
        const { data: groupData } = await supabaseClient.from('event_group_members').select('*, team_members(*, users(*))').eq('team_member_id', appState.currentUser.memberId).maybeSingle();
        if(!groupData){ alert("您尚未被分配組別，無法計分。"); hideLoading(); return; }
        const { data: members } = await supabaseClient.from('event_group_members').select('team_members(*, users(*))').eq('group_id', groupData.group_id);
        appState.scoring.players = members.map(m=>m.team_members);
        const { data: scores } = await supabaseClient.from('scores').select('*').eq('event_id', eventId);
        appState.scoring.playerScores = {}; appState.scoring.players.forEach((p,i) => { const s = scores.find(x=>x.team_member_id===p.id); appState.scoring.playerScores[p.id] = s ? s.hole_scores : Array(18).fill(0); });

        // --- [智慧導航 (Smart Jump) 100% 移植自 ScoringScreen.kt] ---
        const isMatchPlay = appState.scoring.isMatchPlay;
        const firstEmptyHole = (Array.from({length:18},(_,i)=>i+1).find(h => {
            if (isMatchPlay) {
                // 對抗賽：只要這組有人(代表)填過就視為已完成，因此找「全組皆為0」的第一個洞
                return appState.scoring.players.every(p => appState.scoring.playerScores[p.id][h-1] === 0);
            } else {
                // 一般賽制：任何人沒填都算沒填，因此找「任一人為0」的第一個洞
                return appState.scoring.players.some(p => appState.scoring.playerScores[p.id][h-1] === 0);
            }
        })) || 1;

        appState.scoring.currentHole = firstEmptyHole;
        hideLoading(); renderScoringUI();
    }

    function renderScoringUI() {
        const h = appState.scoring.currentHole; const par = appState.scoring.eventPars[h-1];
        document.getElementById('header-title').innerText = `Hole ${h} (Par ${par})`;
        document.getElementById('bottom-nav').classList.add('hidden');

        // [移植 Bonus 算法與鎖定文字]
        const list = appState.scoring.players.map((p,i) => {
            const isLocked = appState.scoring.isMatchPlay && i > 0;
            const score = appState.scoring.playerScores[p.id][h-1];
            const diff = score - par;
            let bonusText = ""; if(score > 0) { if(score===1 || diff<=-2) bonusText="🎯 Eagle+ (+1.0)"; else if(diff===-1) bonusText="🐦 Birdie (+0.5)"; }
            return `<div class="bg-white p-5 rounded-[32px] shadow-sm mb-3 flex items-center justify-between border border-gray-50 ${isLocked?'opacity-40':''}">
                <div class="flex-1">
                    <p class="font-black text-gray-800">${p.users.real_name}</p>
                    ${isLocked
                        ? `<p class="text-[9px] text-gray-400 font-bold uppercase">🔐 由隊友代表計分</p>`
                        : `<p class="text-[9px] text-amber-500 font-bold uppercase">${bonusText}</p>`
                    }
                </div>
                <div class="flex items-center space-x-3">
                    <button ${isLocked?'disabled':`onclick="updateScore('${p.id}',-1)"`} class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-2xl font-light text-gray-400 ${isLocked?'cursor-not-allowed':''}">-</button>
                    <span class="w-10 text-center font-black text-2xl text-[#133B2B]">${score || '-'}</span>
                    <button ${isLocked?'disabled':`onclick="updateScore('${p.id}',1)"`} class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-2xl font-light text-gray-400 ${isLocked?'cursor-not-allowed':''}">+</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById('page-container').innerHTML = `<div class="flex justify-between mb-6 px-2"><button onclick="changeHole(-1)" class="w-14 h-14 bg-white rounded-2xl shadow-md font-bold">◀</button><button onclick="saveScores()" class="bg-[#133B2B] text-white px-8 rounded-2xl font-black shadow-lg">儲存並上傳</button><button onclick="changeHole(1)" class="w-14 h-14 bg-white rounded-2xl shadow-md font-bold">▶</button></div>${list}<button onclick="exitScoring()" class="w-full mt-10 text-gray-400 font-bold uppercase tracking-widest text-xs">退出計分板</button>`;
    }
    function updateScore(id,d){
        // --- [安全校驗 100% 移植] ---
        const playerIndex = appState.scoring.players.findIndex(p => p.id === id);
        if (appState.scoring.isMatchPlay && playerIndex > 0) return;

        let v = appState.scoring.playerScores[id][appState.scoring.currentHole-1];
        if(v===0)v=appState.scoring.eventPars[appState.scoring.currentHole-1];
        v+=d; if(v<1)v=1;
        appState.scoring.playerScores[id][appState.scoring.currentHole-1]=v;
        renderScoringUI();
    }
    async function changeHole(d){
        // --- [原子化存檔 100% 移植] ---
        // 模仿 App 邏輯：在切換洞號前，先執行一次背景存檔，確保剛才輸入的資料不丟失
        try {
            // 這裡執行靜默存檔，不跳 Loading 視窗以維持流暢感
            await supabaseClient.from('scores').upsert(appState.scoring.players.map(p=>({
                event_id: appState.scoring.eventId,
                team_member_id: p.id,
                hole_scores: appState.scoring.playerScores[p.id],
                gross_score: appState.scoring.playerScores[p.id].reduce((a,b)=>a+b,0)
            })));
        } catch (e) {
            console.warn("背景存檔失敗，將於下次切換重試", e);
        }

        let h=appState.scoring.currentHole+d;
        if(h<1)h=18; if(h>18)h=1;
        appState.scoring.currentHole=h;
        renderScoringUI();
    }
    async function saveScores(){ showLoading("同步雲端..."); await supabaseClient.from('scores').upsert(appState.scoring.players.map(p=>({event_id:appState.scoring.eventId, team_member_id:p.id, hole_scores:appState.scoring.playerScores[p.id], gross_score:appState.scoring.playerScores[p.id].reduce((a,b)=>a+b,0)}))); hideLoading(); alert("同步完成"); }
    function exitScoring(){ document.getElementById('bottom-nav').classList.remove('hidden'); switchTab(0); }

    // --- 6. [TeamRepository.kt] 行政管理邏輯 100% 移植 ---
    async function joinTeam() {
        const code = document.getElementById('join-code').value;
        if (code.length !== 6) return alert("請輸入 6 位邀請碼");

        showLoading("正在驗證球隊資訊...");
        try {
            // 1. 查找球隊並檢查人數上限 (對齊 joinTeamByCode 邏輯)
            const { data: team, error: tErr } = await supabaseClient.from('teams').select('*').eq('join_code', code).maybeSingle();
            if (tErr || !team) throw new Error("找不到該球隊，請檢查邀請碼");

            const { count: currentMemberCount } = await supabaseClient
                .from('team_members').select('*', { count: 'exact', head: true }).eq('team_id', team.id);

            if (currentMemberCount >= team.member_limit) {
                throw new Error(`該球隊人數已達上限 (${team.member_limit}人)，請聯絡管理員。`);
            }

            // 2. 建立成員關聯
            const { error: jErr } = await supabaseClient.from('team_members').insert({
                team_id: team.id,
                user_id: appState.currentUser.id,
                role: 'member',
                current_team_handicap: 36.0
            });
            if (jErr) throw jErr;

            alert("成功加入球隊：" + team.name);
            location.reload();
        } catch (err) { alert(err.message); hideLoading(); }
    }

    // --- [EventLeaderboardScreen.kt] 專業賽事排行 100% 轉譯 ---
    async function renderEventLeaderboard(eventId) {
        showTabLoading();
        try {
            const { data: event } = await supabaseClient.from('events').select('*').eq('id', eventId).single();
            const { data: scores } = await supabaseClient.from('scores').select('*, team_members(users(*))').eq('event_id', eventId);
            const pars = event.pars || Array(18).fill(4);

            // [核心排序算法轉譯]
            const sorted = scores.map(s => {
                let toPar = 0; s.hole_scores.forEach((score, i) => { if (score > 0) toPar += (score - pars[i]); });
                const holes = s.hole_scores.filter(h => h > 0).length;
                return { ...s, holesPlayed: holes, isFinished: holes === 18, toPar };
            }).sort((a, b) => {
                if (a.isFinished !== b.isFinished) return a.isFinished ? -1 : 1; // 完賽者優先
                return a.isFinished ? a.gross_score - b.gross_score : a.toPar - b.toPar; // 完賽比總桿, 未完賽比 To Par
            });

            const container = document.getElementById('page-container');
            container.innerHTML = `<div class="bg-[#133B2B] p-6 rounded-[40px] text-white mb-6 shadow-xl relative overflow-hidden">
                <p class="text-[10px] opacity-60 uppercase tracking-widest mb-1">Live Leaderboard</p>
                <h3 class="text-xl font-black">${event.title}</h3>
                <div class="absolute -right-6 -bottom-6 w-24 h-24 bg-white/5 rounded-full"></div>
            </div>` + sorted.map((s, i) => {
                // [移植 To Par 格式化邏輯]
                const toParText = s.toPar === 0 ? "E" : (s.toPar > 0 ? `+${s.toPar}` : s.toPar);
                const toParColor = s.toPar < 0 ? 'text-amber-500' : (s.toPar > 0 ? 'text-rose-500' : 'text-emerald-500');

                return `<div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-50 flex items-center justify-between mb-3">
                    <div class="flex items-center space-x-4">
                        <span class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 text-[10px] font-black text-gray-300">${i + 1}</span>
                        <div><p class="font-bold text-gray-800">${s.team_members.users.real_name}</p><p class="text-[9px] text-gray-400 uppercase">Holes: ${s.holesPlayed} ${s.isFinished?'(F)':''}</p></div>
                    </div>
                    <div class="flex items-center space-x-6">
                        <div class="text-right"><p class="text-xs font-black ${toParColor}">${toParText}</p><p class="text-[7px] text-gray-300 font-bold uppercase">To Par</p></div>
                        <div class="text-right border-l border-gray-100 pl-4"><p class="text-xl font-black text-[#133B2B]">${s.gross_score}</p><p class="text-[7px] text-gray-400 font-bold uppercase">Gross</p></div>
                    </div>
                </div>`;
            }).join('') + `<button onclick="switchTab(0)" class="w-full py-6 text-gray-400 text-[10px] font-black uppercase tracking-widest">返回賽事行程</button>`;
        } catch (err) { diag("❌ 排行榜載入失敗"); }
    }

    // --- 8. [ui/components/ScoreBadge] ---
    async function viewScorecard(scoreId) {
        showModal(`<div class="p-10 text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-[#133B2B] mx-auto"></div></div>`);
        const { data: s } = await supabaseClient.from('scores').select('*, events(*)').eq('id', scoreId).single();
        const pars = s.events.pars || Array(18).fill(4);
        let badges = s.hole_scores.map((score, i) => {
            const diff = score - pars[i];
            let cls = "w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-bold bg-gray-50 text-gray-800";
            if (score > 0) { if(diff<=-1) cls="score-circle"; else if(diff>=1) cls="score-square"; }
            return `<div class="flex flex-col items-center"><span class="text-[7px] text-gray-300 mb-1">${i+1}</span><div class="${cls}">${score||'-'}</div></div>`;
        }).join('');
        showModal(`<div class="p-6"><h3 class="font-black text-xl mb-4 text-[#133B2B]">${s.events.title}</h3><div class="grid grid-cols-6 gap-3 mb-6">${badges}</div><button onclick="closeModal()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold">關閉</button></div>`);
    }

        // [移植一鍵複製 LINE 格式]
        const { data: event } = await supabaseClient.from('events').select('*').eq('id', eventId).single();
        window.copyToLine = () => {
            const txt = `⛳ 【${event.title}】參賽名單\n📅 日期: ${event.date}\n📍 地點: ${event.location}\n\n` + regs.map((r, i) => `${i + 1}. ${r.team_members.users.real_name}`).join('\n') + `\n\n👥 總計: ${regs.length} 人`;

    async function doGuestReg(eventId) {
        const name = document.getElementById('g-name').value;
        const hc = parseFloat(document.getElementById('g-hc').value) || 36;
        if (!name) return alert("請輸入姓名");
        closeModal(); showLoading("建立帳號中...");
        try {
            const { data: u } = await supabaseClient.from('users').insert({ line_uid: `GUEST_${Date.now()}`, real_name: name, initial_handicap: hc }).select().single();
            const { data: m } = await supabaseClient.from('team_members').insert({ team_id: appState.activeTeam.id, user_id: u.id, role: 'guest', current_team_handicap: hc, sponsor_member_id: appState.currentUser.memberId }).select().single();
            await supabaseClient.from('event_registrations').insert({ event_id: eventId, team_member_id: m.id });
            alert("成功幫來賓報名！"); renderEvents();
        } catch (e) { alert("失敗: " + e.message); hideLoading(); }
    }
