<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GolfCat</title>

    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>var vConsole = new window.VConsole();</script>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F3F4F6] text-slate-800 antialiased">

<div class="max-w-md mx-auto h-screen bg-[#F9FAFB] flex flex-col relative shadow-xl border-x border-slate-200">

    <header class="bg-[#04432C] text-white p-4 text-center font-bold text-lg tracking-wider shadow-md shrink-0">
        SuperGolfCat
    </header>

    <main id="main-content" class="flex-1 p-4 space-y-4 overflow-y-auto no-scrollbar pb-24">
        <div id="loading-status" class="text-center text-slate-500 py-12 text-sm font-medium">
            正在安全驗證 LINE 帳號...
        </div>
        <div id="tournament-list" class="space-y-4"></div>
    </main>

    <nav class="absolute bottom-0 left-0 right-0 bg-[#04432C] h-16 flex items-center justify-around text-white shadow-lg border-t border-emerald-900 z-50">
        <div class="flex flex-col items-center justify-center w-full h-full relative cursor-pointer">
            <div class="absolute top-1 w-10 h-1 bg-[#10B981] rounded-full"></div>
            <span class="text-xs font-bold mt-2 text-[#10B981]">賽事</span>
        </div>
        <div class="flex flex-col items-center justify-center w-full h-full relative opacity-60">
            <span class="text-xs font-medium mt-2">球隊</span>
        </div>
        <div class="flex flex-col items-center justify-center w-full h-full relative opacity-60">
            <span class="text-xs font-medium mt-2">分組</span>
        </div>
        <div class="flex flex-col items-center justify-center w-full h-full relative opacity-60">
            <span class="text-xs font-medium mt-2">成績</span>
        </div>
        <div class="flex flex-col items-center justify-center w-full h-full relative opacity-60">
            <span class="text-xs font-medium mt-2">我的</span>
        </div>
    </nav>
</div>

<script>
    const SUPABASE_URL = "https://qyhtllcncbnzykzbvlhu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5aHRsbGNuY2JuenlremJ2bGh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDUxMTYsImV4cCI6MjA5NTIyMTExNn0.T97-3knhVMg4-Ec6XSjHKI8xrDrdYMJryklcyQkXTJc";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let userProfile = null;
    let globalMemberId = null; // 儲存最終對齊的球員 UUID

    async function initLiff() {
        try {
            if (!window.supabase) {
                document.getElementById('loading-status').innerText = "資料庫模組載入失敗，請刷新網頁。";
                return;
            }
            await liff.init({ liffId: "2010382913-rCaKoQcE" });

            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                userProfile = await liff.getProfile();
                console.log("LINE 驗證成功:", userProfile.displayName);
                document.getElementById('loading-status').innerText = "正在解析球員識別碼...";

                // 執行核心識別碼轉換，取得球員的真實 UUID
                await prepareUserIdentifiers();
            }
        } catch (error) {
            console.error("LIFF 錯誤:", error);
            document.getElementById('loading-status').innerText = "安全登入失敗: " + error.message;
        }
    }

    // 核心密鑰轉換：將 LINE ID 轉換成資料庫實體 UUID
    async function prepareUserIdentifiers() {
        try {
            // 1. 先用 LINE ID 查出 users 表的 uuid
            const { data: userRow, error: userErr } = await supabaseClient
                .from('users')
                .select('id')
                .eq('line_uid', userProfile.userId)
                .maybeSingle();

            if (userErr) throw userErr;
            if (!userRow) {
                document.getElementById('loading-status').innerText = "系統查無您的球員帳號，請聯繫管理員登錄。";
                return;
            }

            // 2. 拿著 user_id 嘗試去 team_members 撈取 id
            const { data: memberRow, error: memberErr } = await supabaseClient
                .from('team_members')
                .select('id')
                .eq('user_id', userRow.id)
                .maybeSingle();

            // 3. 安全防護：如果隊員表有資料就用隊員ID，沒有就直接用用戶ID降級對齊
            globalMemberId = memberRow ? memberRow.id : userRow.id;

            // 順利取得識別碼後，開始同步賽事
            document.getElementById('loading-status').innerText = "正在同步球賽行程...";
            await fetchTournaments();

        } catch (err) {
            console.error("識別碼轉換失敗:", err);
            document.getElementById('loading-status').innerText = "識別碼綁定失敗: " + err.message;
        }
    }

    async function fetchTournaments() {
        try {
            // 1. 撈取所有球賽
            const { data: events, error } = await supabaseClient
                .from('events')
                .select('*');

            if (error) throw error;

            // 2. 撈取報名紀錄（精準修正為對比 team_member_id）
            const { data: myRegistrations, regError } = await supabaseClient
                .from('event_registrations')
                .select('event_id')
                .eq('team_member_id', globalMemberId);

            if (regError) {
                alert("讀取報名紀錄失敗: " + regError.message);
                throw regError;
            }

            const registeredEventIds = new Set(myRegistrations ? myRegistrations.map(r => r.event_id) : []);

            document.getElementById('loading-status').classList.add('hidden');
            renderTournamentList(events, registeredEventIds);

        } catch (error) {
            console.error("資料庫讀取異常:", error);
            document.getElementById('loading-status').innerText = "連線失敗: " + error.message;
        }
    }

    function renderTournamentList(events, registeredEventIds) {
        const listContainer = document.getElementById('tournament-list');
        listContainer.innerHTML = '';

        if (!events || events.length === 0) {
            listContainer.innerHTML = '<div class="text-center text-slate-400 py-8 text-sm">目前無任何排定賽事</div>';
            return;
        }

        events.forEach(event => {
            const isRegistered = registeredEventIds.has(event.id);
            const card = document.createElement('div');

            card.className = "bg-white rounded-2xl border border-slate-300 overflow-hidden shadow-xs flex flex-col";

            let actionButtonsHtml = '';
            if (!isRegistered) {
                actionButtonsHtml = `
                    <div class="pt-1">
                        <button onclick="registerGame('${event.id}')" class="w-full bg-[#047857] hover:bg-emerald-800 text-white py-3 px-4 rounded-xl font-bold tracking-wide active:scale-[0.99] transition text-sm">
                            查看詳情 / 報名
                        </button>
                    </div>
                `;
            } else {
                actionButtonsHtml = `
                    <div class="space-y-2 pt-1">
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="cancelRegistration('${event.id}')" class="bg-[#DC2626] hover:bg-red-700 text-white py-2.5 px-4 rounded-xl font-bold tracking-wide active:scale-[0.99] transition text-sm">
                                取消報名
                            </button>
                            <button onclick="editRegistration('${event.id}')" class="bg-[#D97706] hover:bg-amber-700 text-white py-2.5 px-4 rounded-xl font-bold tracking-wide active:scale-[0.99] transition text-sm">
                                修改資料
                            </button>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="viewGroups('${event.id}')" class="bg-[#047857] hover:bg-emerald-800 text-white py-2.5 px-4 rounded-xl font-bold tracking-wide active:scale-[0.99] transition text-sm">
                                分組名單 (3)
                            </button>
                            <button onclick="enterScore('${event.id}')" class="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 py-2.5 px-4 rounded-xl font-bold tracking-wide active:scale-[0.99] transition text-sm shadow-2xs">
                                成績登錄
                            </button>
                        </div>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="bg-[#F3F4F6] px-4 py-3 border-b border-slate-200 flex justify-between items-center">
                    <span class="font-bold text-[#1F2937] text-sm md:text-base">${event.title || '例行賽'} - ${event.date || ''}</span>
                </div>

                <div class="p-4 space-y-4 text-sm">
                    <div class="grid grid-cols-2 gap-y-3 gap-x-4 text-slate-600">
                        <div class="flex items-center">球場：<span class="font-bold text-slate-900 ml-1">${event.location || '未定'}</span></div>
                        <div class="flex items-center">時間：<span class="font-bold text-slate-900 ml-1">${event.start_time || '06:00'}</span></div>
                        <div class="flex items-center col-span-2">狀態：<span class="font-bold ml-1 ${isRegistered ? 'text-emerald-700' : 'text-rose-600'}">${isRegistered ? '已報名' : '未報名'}</span></div>
                    </div>
                    ${actionButtonsHtml}
                </div>
            `;

            listContainer.appendChild(card);
        });
    }

    // 按鈕動作：寫入 event_registrations 資料表（補上 non-nullable status）
    async function registerGame(eventId) {
        try {
            if(!confirm("確定要登記報名這場球賽嗎？")) return;
            const { error } = await supabaseClient
                .from('event_registrations')
                .insert([
                    {
                        event_id: eventId,
                        team_member_id: globalMemberId,
                        status: '已報名' // 填入非空值，完美解決 status 限制
                    }
                ]);
            if (error) throw error;
            alert("報名成功！");
            fetchTournaments();
        } catch (error) {
            alert("報名失敗：" + error.message);
        }
    }

    // 按鈕動作：從 event_registrations 刪除紀錄
    async function cancelRegistration(eventId) {
        try {
            if(!confirm("確定要取消這場球賽的報名嗎？")) return;
            const { error } = await supabaseClient
                .from('event_registrations')
                .delete()
                .eq('event_id', eventId)
                .eq('team_member_id', globalMemberId);
            if (error) throw error;
            alert("已成功取消報名。");
            fetchTournaments();
        } catch (error) {
            alert("取消失敗：" + error.message);
        }
    }

    function editRegistration(eventId) { alert("修改資料研發中，活動ID: " + eventId); }
    function viewGroups(eventId) { alert("分組名單檢視中，活動ID: " + eventId); }
    function enterScore(eventId) { alert("成績登錄模組開發中，活動ID: " + eventId); }

    window.addEventListener('load', initLiff);
</script>
</body>
</html>
