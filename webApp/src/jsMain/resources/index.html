<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GolfCat - 球隊管理系統</title>

    <!-- 資源載入 -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #133B2B; --background: #FAFAFA; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--background); color: #1A1A1A; margin: 0; overflow: hidden; height: 100vh; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #10B981 !important; opacity: 1 !important; }
        .tab-indicator { height: 4px; width: 32px; background-color: #10B981; border-radius: 2px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .btn-active:active { transform: scale(0.96); opacity: 0.9; }
        .avatar-small { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body class="antialiased">

<!-- 全域 Modal -->
<div id="global-modal" class="modal-overlay">
    <div class="modal-content" id="modal-body"></div>
</div>

<div class="max-w-md mx-auto h-screen bg-[#FAFAFA] flex flex-col relative shadow-2xl">
    <!-- Header -->
    <header class="bg-[#133B2B] text-white p-4 flex justify-between items-center relative z-[60] shadow-md">
        <div class="flex items-center space-x-2">
            <div class="w-6 h-7 bg-red-600 rounded-sm flex items-center justify-center text-[10px]">🛡️</div>
        </div>

        <div class="flex items-center cursor-pointer" onclick="toggleTeamMenu()">
            <span id="header-title" class="font-black text-lg">載入中...</span>
            <span class="ml-1 text-[10px] opacity-70">▼</span>
        </div>

        <div class="flex items-center space-x-3">
            <img id="user-avatar" src="" class="avatar-small hidden">
            <span onclick="liff.logout(); location.reload();" class="text-[10px] text-rose-400 font-bold cursor-pointer">登出</span>
        </div>

        <!-- 球隊切換選單 -->
        <div id="team-menu" class="hidden absolute top-14 left-1/2 -translate-x-1/2 w-64 bg-white text-gray-800 rounded-2xl shadow-2xl border border-gray-100 py-2 overflow-hidden">
            <div id="team-list-container"></div>
            <div class="border-t border-gray-100 mt-2">
                <div class="p-3 text-[#133B2B] text-sm font-bold flex items-center cursor-pointer" onclick="switchTab(3)">
                    <span class="mr-2">➕</span> 加入/建立球隊
                </div>
            </div>
        </div>
    </header>

    <!-- 主內容區 -->
    <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar pb-20">
        <div id="loading-screen" class="flex flex-col items-center justify-center h-full space-y-4">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#133B2B]"></div>
            <p class="text-gray-500 text-sm">正在初始化...</p>
        </div>
        <div id="page-container" class="hidden p-4 space-y-4"></div>
    </main>

    <!-- Bottom Nav -->
    <nav id="bottom-nav" class="absolute bottom-0 left-0 right-0 bg-[#133B2B] h-16 flex items-center justify-around text-white shadow-2xl z-50">
        <div onclick="switchTab(0)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold">賽事列表</span>
        </div>
        <div onclick="switchTab(1)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold">排行榜</span>
        </div>
        <div onclick="switchTab(2)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold">歷史成績</span>
        </div>
        <div onclick="switchTab(3)" class="nav-item flex flex-col items-center justify-center w-full h-full relative cursor-pointer opacity-60">
            <div class="tab-indicator hidden"></div>
            <span class="text-[10px] font-bold">球隊管理</span>
        </div>
    </nav>
</div>

<script>
    // --- 步驟 1: 實作全域狀態機 (appState) ---
    // 100% 轉譯 App.kt 的狀態變數
    let appState = {
        currentUser: null,      // 等同 App.kt 的 currentUser
        activeTeam: null,       // 等同 App.kt 的 activeTeam
        myTeams: [],            // 該用戶所屬的所有球隊
        currentTab: 0,          // 目前底部分頁索引
        isSessionLoaded: false, // 確保登入載入完畢

        // 計分狀態專用 (Scoring Scope)
        scoring: {
            eventId: null,
            groupId: null,
            playerScores: {},
            eventPars: Array(18).fill(4)
        }
    };

    const SUPABASE_URL = "https://qyhtllcncbnzykzbvlhu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5aHRsbGNuY2JuenlremJ2bGh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDUxMTYsImV4cCI6MjA5NTIyMTExNn0.T97-3knhVMg4-Ec6XSjHKI8xrDrdYMJryklcyQkXTJc";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- 診斷工具 ---
    function diag(msg) {
        console.log(`[GolfCat] ${msg}`);
        const el = document.querySelector('#loading-screen p');
        if (el) el.innerText = msg;
    }

    // --- 系統啟動 (100% 對齊 App.kt 初始化) ---
    async function initApp() {
        diag("啟動 LIFF...");
        try {
            await liff.init({ liffId: "2010382913-rCaKoQcE" });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            const profile = await liff.getProfile();
            await syncUserLogic(profile);
        } catch (err) { diag(`初始化失敗: ${err.message}`); }
    }

    // --- 用戶同步邏輯 (100% 移植 AuthManager.kt & App.kt 攔截器) ---
    async function syncUserLogic(liffProfile) {
        diag("同步雲端用戶...");
        try {
            const { data: user, error } = await supabaseClient
                .from('users').select('*').eq('line_uid', liffProfile.userId).maybeSingle();

            if (error) throw error;

            // [移植閘門邏輯] 若為新用戶或名字未設，強導向 ProfileSetup
            if (!user || user.real_name === "User") {
                renderProfileSetup(liffProfile);
                return;
            }

            appState.currentUser = user;

            diag("讀取所屬球隊...");
            const { data: members, error: mError } = await supabaseClient
                .from('team_members').select('*, teams(*)').eq('user_id', user.id);

            if (mError) throw mError;

            // [移植閘門邏輯] 若無任何球隊，強導向 ProfileSetup (加入球隊頁面)
            if (!members || members.length === 0) {
                renderProfileSetup(liffProfile);
                return;
            }

            appState.myTeams = members.map(m => m.teams).filter(t => t !== null);
            appState.activeTeam = appState.myTeams[0];
            appState.isSessionLoaded = true;

            hideLoading(liffProfile.pictureUrl);
            switchTab(0);
        } catch (err) { diag(`同步失敗: ${err.message}`); }
    }

    // --- 核心導覽閘門 (步驟 1 核心) ---
    function switchTab(index) {
        // [移植攔截邏輯] 如果 activeTeam 為空，除非是去管理分頁，否則一律跳轉分頁 3
        if (!appState.activeTeam && index !== 3) {
            index = 3;
            diag("請先加入或建立一個球隊");
        }

        appState.currentTab = index;
        updateTabUI(index);

        const container = document.getElementById('page-container');
        container.innerHTML = '';
        document.getElementById('header-title').innerText = appState.activeTeam ? appState.activeTeam.name : "我的球隊";

        switch(index) {
            case 0: renderEvents(); break;
            case 1: renderLeaderboard(); break;
            case 2: renderHistory(); break;
            case 3: renderTeams(); break;
        }
    }

    // --- 下拉球隊切換器 ---
    async function selectTeam(teamId) {
        const team = appState.myTeams.find(t => t.id === teamId);
        if (team) {
            appState.activeTeam = team;
            toggleTeamMenu();
            switchTab(appState.currentTab); // 立即觸發當前分頁重繪 (模擬 Recomposition)
        }
    }

    // --- 輔助 UI 函式 ---
    function hideLoading(picUrl) {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('page-container').classList.remove('hidden');
        if (picUrl) {
            const avatar = document.getElementById('user-avatar');
            avatar.src = picUrl; avatar.classList.remove('hidden');
        }
    }

    function updateTabUI(index) {
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach((item, i) => {
            const indicator = item.querySelector('.tab-indicator');
            if (i === index) { item.classList.add('active-tab'); indicator.classList.remove('hidden'); }
            else { item.classList.remove('active-tab'); indicator.classList.add('hidden'); }
        });
    }

    function toggleTeamMenu() {
        const menu = document.getElementById('team-menu');
        menu.classList.toggle('hidden');
        if (!menu.classList.contains('hidden')) {
            const container = document.getElementById('team-list-container');
            container.innerHTML = appState.myTeams.map(t => `
                <div class="p-4 border-b border-gray-50 flex justify-between items-center cursor-pointer ${appState.activeTeam?.id === t.id ? 'bg-emerald-50 text-[#133B2B]' : ''}" onclick="selectTeam('${t.id}')">
                    <span class="font-bold">${t.name}</span>
                    ${appState.activeTeam?.id === t.id ? '<span>✅</span>' : ''}
                </div>
            `).join('');
        }
    }

    // 暫存佔位函式 (待後續步驟補完)
    function renderEvents() { diag("載入賽事..."); }
    function renderLeaderboard() { diag("載入排行..."); }
    function renderHistory() { diag("載入歷史..."); }
    function renderTeams() { diag("球隊管理..."); }
    function renderProfileSetup(profile) { hideLoading(profile.pictureUrl); document.getElementById('page-container').innerHTML = "<div class='p-10 text-center'>請完成初次設定</div>"; }

    window.addEventListener('load', initApp);
</script>
</body>
</html>
